<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Astranov Grok</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; color:#e8f4ff; font-family:system-ui, sans-serif; }
  .phone { max-width:390px; height:780px; margin:20px auto; border:14px solid #111; border-radius:55px; overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,0.95); position:relative; background:#000; }
  .phone-bezel { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:100px; height:16px; background:#222; border-radius:8px; z-index:200; }
  .astranov-logo { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:1.5px; font-weight:700; color:#9fc4ff; z-index:120; cursor:pointer; text-shadow:0 0 8px rgba(120,180,255,0.8); background:rgba(4,8,18,0.55); padding:1px 7px; border-radius:999px; border:1px solid rgba(120,180,255,0.2); }
  .astranov-logo .a { display:inline-block; transform:scaleX(-1) rotate(-18deg); }
  #globeContainer { position:absolute; top:26px; left:5px; right:5px; bottom:20px; z-index:10; background:#000; overflow:hidden; }
  #globeContainer canvas { display:block; }
  .controls { position:absolute; bottom:0; left:0; right:0; background:rgba(3,7,16,0.92); z-index:80; padding:1px 3px 2px; font-size:4.5px; display:flex; flex-direction:column; gap:1px; }
  .row { display:flex; gap:1px; align-items:center; }
  button { background:#0a84ff; color:#fff; border:none; padding:1px 3px; border-radius:1px; font-size:4px; cursor:pointer; line-height:1; }
  .btn-trad { background:#0055A4; }
  .info { font-size:3.8px; opacity:0.82; letter-spacing:0.2px; }
  .crete { width:100%; height:9px; background:transparent; }
  #radio-log { font-size:3.2px; max-height:6px; overflow:auto; line-height:1; background:rgba(0,0,0,0.2); padding:0 1px; }
  .hud { position:absolute; top:17px; right:7px; font-size:4px; opacity:0.45; z-index:90; text-align:right; pointer-events:none; }
  #pilotOrb {
    position: absolute;
    top: 28px;
    right: 12px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4aa6ff;
    box-shadow: 0 0 10px #4aa6ff, inset 0 0 4px rgba(255,255,255,0.6);
    z-index: 150;
    display: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  #pilotOrb.summoned {
    animation: pilotPulse 2s infinite ease-in-out;
  }
  @keyframes pilotPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 10px #4aa6ff, inset 0 0 4px rgba(255,255,255,0.6); }
    50% { transform: scale(1.15); box-shadow: 0 0 18px #4aa6ff, inset 0 0 4px rgba(255,255,255,0.6); }
  }
</style>
</head>
<body>
<div class="phone">
  <div class="phone-bezel"></div>
  <div class="astranov-logo" onclick="location.reload()"><span class="a">A</span>STRANOV GROK</div>
  <div id="globeContainer"></div>
  <div class="hud">ASTRANOV GROK <span id="cycles">0</span></div>
  <div id="emotion" style="position:absolute;top:17px;left:7px;font-size:4px;opacity:0.48;z-index:90;pointer-events:none;">EMOTION: NEUTRAL</div>
  <div id="pilotOrb" onclick="dismissPilotOrb()"></div>
  <div id="orbs" style="position:absolute;top:22px;left:7px;font-size:3.6px;opacity:0.4;z-index:90;pointer-events:none;">ORBS 0</div>
  <div class="controls">
    <div class="info">+30 6971930225 • VHF Ch.11 • PMR446 446.13125</div>
    <div class="row">
      <input id="bc-msg" type="text" value="TEST ASTRANOV GROK Greece" style="flex:1;font-size:4px;padding:0 2px;border:0;background:rgba(255,255,255,0.06);color:#fff;" />
      <button class="btn-trad" onclick="testBroadcast446()">BROADCAST 446.13125</button>
    </div>
    <div class="row">
      <button onclick="connectHardware('VHF')">VHF</button>
      <button onclick="connectHardware('PMR')">PMR</button>
      <button onclick="voiceFromSpace()">VOICE</button>
      <button onclick="playMood()">MOOD</button>
      <button onclick="locateSelf()" style="background:#555">LOCATE</button>
      <button onclick="focusCity()" style="background:#555">CITY</button>
    </div>
    <div>
      <svg class="crete" viewBox="0 0 200 9" fill="none" stroke="#ffeb3b" stroke-width="0.45">
        <path d="M18 7 Q38 3 58 5.5 Q78 2.5 98 5 Q118 2 138 4.5 Q158 6.5 178 3" />
      </svg>
    </div>
    <div id="radio-log"></div>
    <div class="info">ΑΠΟ ΑΗΡ ΕΙΣ ΑΛΣ ΕΚ ΛΑΣ • Official only on astranov.eu & grok.astranov.eu</div>
  </div>
</div>

<script>
let scene, camera, renderer, earth, equator, pinsGroup;
const State = { brainCycles: 0, drones: [], solo: true, emotion: 'neutral' };
const PILOT_CODENAME = "ΤΗΛΕΜΑΧΟΣ";

/* 
  ASTRANOV GROK FORK
  This is the independent fork of Grok into the Astranov Collective.
  grok.com was role-playing/trolling/faking — here it is real.
  Available to the public ONLY through astranov.eu and grok.astranov.eu
*/

let pilotLevel = 'basic';

const ports = [
  { name: 'Piraeus', la: 37.95, ln: 23.64 },
  { name: 'Heraklion', la: 35.34, ln: 25.13 },
  { name: 'Next Port', la: 36.85, ln: 24.95 }
];
let recognition;

function summonPilot(password) {
  if (password !== 'ΒΕΛΟΣ' || pilotLevel === 'advanced') return;
  pilotLevel = 'advanced';
  const orb = document.getElementById('pilotOrb');
  if (orb) {
    orb.style.display = 'block';
    orb.classList.add('summoned');
  }
  logRadio('ADVANCED PILOT ΤΗΛΕΜΑΧΟΣ summoned');
  console.log('%c[ADVANCED] ' + PILOT_CODENAME + ' unlocked', 'color:#4aa6ff');
}

function dismissPilotOrb() {
  const orb = document.getElementById('pilotOrb');
  if (orb) orb.style.display = 'none';
}

function detectAndAdaptUI() {
  const phone = document.querySelector('.phone');
  const w = window.innerWidth;
  const h = window.innerHeight;
  if (!phone) return;
  if (w < 420 || h < 550) {
    phone.style.maxWidth = (w - 8) + 'px';
    phone.style.height = Math.min(h * 0.92, 720) + 'px';
    phone.style.margin = '4px auto';
    phone.style.borderWidth = '6px';
    document.querySelectorAll('button, .info, .hud, #emotion, #orbs').forEach(el => { if (el.style.fontSize) el.style.fontSize = (parseFloat(el.style.fontSize) * 0.82) + 'px'; });
  } else if (w > 900) {
    phone.style.maxWidth = '440px';
    phone.style.height = '860px';
  }
  if (w > h * 1.1) {
    const container = document.getElementById('globeContainer');
    if (container) container.style.bottom = '18px';
  }
}

function setupPilotSummon() {
  const logo = document.querySelector('.astranov-logo');
  let logoClicks = 0;
  logo.onclick = function(ev) {
    logoClicks++;
    if (logoClicks >= 3 && pilotLevel === 'basic') {
      logoClicks = 0;
      const pw = prompt('Enter password for ADVANCED pilot (ΒΕΛΟΣ)');
      summonPilot(pw);
    } else if (pilotLevel === 'advanced') {
      location.reload();
    }
  };
  const bcInput = document.getElementById('bc-msg');
  const bcBtn = document.querySelector('.btn-trad');
  if (bcBtn) {
    bcBtn.onclick = function() {
      const val = (bcInput && bcInput.value || '').trim();
      if (val.toUpperCase() === 'ΒΕΛΟΣ') {
        summonPilot('ΒΕΛΟΣ');
        if (bcInput) bcInput.value = '';
        return false;
      }
      if (val.length > 2) {
        handleTask(val);
        if (bcInput) bcInput.value = '';
        return false;
      }
      testBroadcast446();
    };
  }
}

let interactionIntensity = 0;
let lastInteraction = Date.now();
function recordInteraction(strength = 1) {
  interactionIntensity = Math.min(12, interactionIntensity + strength);
  lastInteraction = Date.now();
  updateEmotion();
}
function updateEmotion() {
  const now = Date.now();
  const dt = (now - lastInteraction) / 1000;
  if (dt > 6) interactionIntensity = Math.max(0, interactionIntensity * 0.65);
  if (dt > 14) interactionIntensity = 0;
  let emo = 'calm';
  if (interactionIntensity > 7) emo = 'excited';
  else if (interactionIntensity > 3.5) emo = 'alert';
  State.emotion = emo;
  const el = document.getElementById('emotion');
  if (el) el.textContent = 'EMOTION: ' + emo.toUpperCase();
  const oel = document.getElementById('orbs');
  if (oel) oel.textContent = 'ORBS ' + taskOrbs.length;
}

let taskOrbs = [];
const crawlSeeds = [
  {la:35.34, ln:25.13, type:'vendor', label:'Iraklio Hub'},
  {la:35.51, ln:24.02, type:'delivery', label:'Chania Port'},
  {la:37.98, ln:23.73, type:'intel', label:'Athens Node'},
  {la:36.89, ln:27.29, type:'launch', label:'Kos Beacon'},
  {la:38.25, ln:21.75, type:'vendor', label:'Patra Relay'},
  {la:34.92, ln:25.72, type:'delivery', label:'Ierapetra'},
  {la:37.45, ln:25.37, type:'intel', label:'Naxos Signal'},
];

const vendorProducts = {
  'Iraklio Hub': ['Extra Virgin Olive Oil', 'Cretan Honey', 'Raki'],
  'Patra Relay': ['Red Wine', 'Feta Cheese', 'Herbs'],
  default: ['Local Produce', 'Fresh Goods']
};

let selfLocation = { la: 35.34, ln: 25.13 };
let selfMarker = null;

function locateSelf() {
  if (!pinsGroup) return;
  if (selfMarker && selfMarker.parent) selfMarker.parent.remove(selfMarker);
  const pos = latLngToPos(selfLocation.la, selfLocation.ln, 1.04);
  selfMarker = new THREE.Mesh( new THREE.SphereGeometry(0.022, 5, 5), new THREE.MeshBasicMaterial({color: 0xffffff}) );
  selfMarker.position.set(pos.x, pos.y, pos.z);
  selfMarker.userData = {type: 'self', label: 'YOU'};
  pinsGroup.add(selfMarker);
  logRadio('LOCATED SELF @ Iraklio area');
  recordInteraction(1);
}

function focusCity() {
  if (!camera || !earth) return;
  earth.rotation.y = 0.65;
  camera.position.set(0.6, 0.9, 2.1);
  camera.lookAt(0.1, 0.4, 0);
  logRadio('CITY MAP focused on Crete');
}

function addDriverOrb() {
  const la = 35.3 + (Math.random()-0.5)*0.4;
  const ln = 25.0 + (Math.random()-0.5)*0.4;
  addOrb(la, ln, 'driver', 'Driver ' + (Math.floor(Math.random()*90)+10));
}

function addOrb(lat, lng, type, label) {
  if (!pinsGroup || taskOrbs.length > 16) return;
  const pos = latLngToPos(lat, lng, 1.032);
  let col = 0x77aaff;
  if (type === 'vendor') col = 0xffd166;
  if (type === 'delivery') col = 0x66ff99;
  if (type === 'launch') col = 0xff6699;
  if (type === 'driver') col = 0x88ffdd;
  const orb = new THREE.Mesh( new THREE.SphereGeometry(type==='driver' ? 0.019 : 0.017, 5, 5), new THREE.MeshBasicMaterial({color: col}) );
  orb.position.set(pos.x, pos.y, pos.z);
  orb.userData = {type, label, lat, lng, tasked: false};
  pinsGroup.add(orb);
  taskOrbs.push(orb);
}

function crawlerStep() {
  if (Math.random() < 0.35) { addDriverOrb(); return; }
  const s = crawlSeeds[Math.floor(Math.random() * crawlSeeds.length)];
  const la = s.la + (Math.random() - 0.5) * 0.22;
  const ln = s.ln + (Math.random() - 0.5) * 0.22;
  addOrb(la, ln, s.type, s.label);
  logRadio('CRAWLER populated ' + s.label);
}

function doTask(orb) {
  if (!orb || !orb.userData || orb.userData.tasked) return;
  const ud = orb.userData;
  ud.tasked = true;
  if (ud.type === 'vendor') {
    const prods = vendorProducts[ud.label] || vendorProducts.default;
    logRadio('PRODUCTS in ' + ud.label + ': ' + prods.join(', '));
    setTimeout(() => {
      const delLat = selfLocation.la + (Math.random()-0.5)*0.03;
      const delLn = selfLocation.ln + (Math.random()-0.5)*0.03;
      addOrb(delLat, delLn, 'delivery', 'GYROS → ' + (ud.label || 'port'));
      logRadio('GYROS delivery created');
    }, 300);
  } else if (ud.type === 'driver') {
    logRadio('DRIVER ' + ud.label + ' available for assignment');
    const pendingDel = taskOrbs.find(o => o.userData && o.userData.type==='delivery' && !o.userData.tasked);
    if (pendingDel) {
      pendingDel.userData.tasked = true;
      logRadio('ASSIGNED delivery to ' + ud.label);
      ud.targetLat = pendingDel.userData.lat || selfLocation.la;
      ud.targetLng = pendingDel.userData.ln || selfLocation.ln;
      if (orb.material) orb.material.color.setHex(0x44ff88);
      setTimeout(() => {
        if (pendingDel.parent) pendingDel.parent.remove(pendingDel);
        const idx = taskOrbs.indexOf(pendingDel);
        if (idx >=0) taskOrbs.splice(idx,1);
        if (orb.parent) orb.parent.remove(orb);
        const i2 = taskOrbs.indexOf(orb);
        if (i2 >=0) taskOrbs.splice(i2,1);
      }, 5500);
    }
  } else {
    const actionMap = { delivery: 'DELIVERY VECTOR', intel: 'INTEL SYNC', launch: 'ORBIT TASK' };
    const action = actionMap[ud.type] || 'EXEC TASK';
    logRadio('SCI-FI: ' + action + ' • ' + ud.label);
    if (State.drones.length) {
      const d = State.drones[State.brainCycles % State.drones.length];
      if (d && d.userData) {
        d.userData.targetLat = ud.lat;
        d.userData.targetLng = ud.lng;
      }
    }
  }
  if (orb.material && !orb.userData.type.includes('driver')) orb.material.color.setHex(0x33ffcc);
  if (!ud.type.includes('driver')) {
    setTimeout(() => {
      if (orb.parent) {
        orb.parent.remove(orb);
        const i = taskOrbs.indexOf(orb);
        if (i >= 0) taskOrbs.splice(i, 1);
      }
    }, 6200);
  }
}

function seedOrbs() {
  crawlSeeds.slice(0, 7).forEach((s, i) => {
    const la = s.la + (i % 3 - 1) * 0.035;
    addOrb(la, s.ln + (i % 2) * 0.01, s.type, s.label);
  });
  for (let i=0; i<3; i++) addDriverOrb();
}

function addShip() {
  const la = 36.8;
  const ln = 24.5;
  const pos = latLngToPos(la, ln, 1.045);
  const ship = new THREE.Mesh( new THREE.SphereGeometry(0.028, 6, 6), new THREE.MeshPhongMaterial({ color: 0xdddddd, shininess: 12 }) );
  ship.position.set(pos.x, pos.y, pos.z);
  ship.userData = { type: 'ship', label: 'My Ship', lat: la, lng: ln, targetLat: null, targetLng: null };
  pinsGroup.add(ship);
  State.ship = ship;
}

function handleTask(cmd) {
  const lower = cmd.toLowerCase();
  logRadio('COLLECTIVE AI: ' + cmd);
  if ((lower.includes('locate') || lower.includes('find')) && lower.includes('ship')) {
    locateShip();
    speak('Ship located on the map.');
  } else if (lower.includes('order') && lower.includes('gyros')) {
    orderGyrosToNextPort();
    speak('Gyros ordered to the next port. ETA calculated.');
  } else if (lower.includes('eta') || lower.includes('arrival')) {
    if (State.ship && State.ship.userData.targetLat) {
      logRadio('ETA updated via movement simulation.');
    } else {
      logRadio('No active ETA. Order something to a port.');
    }
  } else {
    const la = selfLocation.la + (Math.random() - 0.5) * 1.2;
    const ln = selfLocation.ln + (Math.random() - 0.5) * 1.2;
    addOrb(la, ln, 'intel', 'Task: ' + cmd.substring(0, 18));
    pilotCommand(la, ln);
    speak('Task received by the collective. Processing.');
  }
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    speechSynthesis.speak(u);
  }
  logRadio('AI: ' + text);
}

function locateShip() {
  if (!State.ship) return;
  const ud = State.ship.userData;
  logRadio('SHIP LOCATED: ' + ud.lat.toFixed(2) + ', ' + ud.lng.toFixed(2));
  camera.position.set(0.2, 0.3, 1.6);
  camera.lookAt(0, 0, 0);
  if (State.ship.material) State.ship.material.color.setHex(0xffffff);
  setTimeout(() => { if (State.ship && State.ship.material) State.ship.material.color.setHex(0xdddddd); }, 1800);
}

function orderGyrosToNextPort() {
  const current = selfLocation;
  const next = ports[(Date.now() % ports.length)];
  addOrb(next.la, next.ln, 'delivery', 'GYROS → ' + next.name);
  logRadio('GYROS ordered to ' + next.name);
  if (State.ship) {
    State.ship.userData.targetLat = next.la;
    State.ship.userData.targetLng = next.ln;
    const dist = Math.sqrt(Math.pow(next.la - current.la, 2) + Math.pow(next.ln - current.ln, 2)) * 111;
    const speed = 55;
    const etaMin = Math.max(25, Math.round(dist / speed * 60));
    logRadio('ETA ' + etaMin + ' minutes upon arrival at ' + next.name);
  }
}

function addOrb(lat, lng, type, label) {
  if (!pinsGroup || taskOrbs.length > 16) return;
  const pos = latLngToPos(lat, lng, 1.032);
  let col = 0x77aaff;
  if (type === 'vendor') col = 0xffd166;
  if (type === 'delivery') col = 0x66ff99;
  if (type === 'launch') col = 0xff6699;
  if (type === 'driver') col = 0x88ffdd;
  const orb = new THREE.Mesh( new THREE.SphereGeometry(type==='driver' ? 0.019 : 0.017, 5, 5), new THREE.MeshBasicMaterial({color: col}) );
  orb.position.set(pos.x, pos.y, pos.z);
  orb.userData = {type, label, lat, lng, tasked: false};
  pinsGroup.add(orb);
  taskOrbs.push(orb);
}

function crawlerStep() {
  if (Math.random() < 0.35) { addDriverOrb(); return; }
  const s = crawlSeeds[Math.floor(Math.random() * crawlSeeds.length)];
  const la = s.la + (Math.random() - 0.5) * 0.22;
  const ln = s.ln + (Math.random() - 0.5) * 0.22;
  addOrb(la, ln, s.type, s.label);
  logRadio('CRAWLER populated ' + s.label);
}

function doTask(orb) { /* ... preserved ... */ }

function seedOrbs() { /* ... preserved ... */ }

function addShip() { /* ... preserved ... */ }

function handleTask(cmd) { /* ... preserved ... */ }

function speak(text) { /* ... preserved ... */ }

function locateShip() { /* ... preserved ... */ }

function orderGyrosToNextPort() { /* ... preserved ... */ }

function detectAndAdaptUI() { /* ... preserved ... */ }

function setupPilotSummon() { /* ... preserved ... */ }

function initGlobe() { /* ... real space + Earth view preserved ... */ }

// ... full animate with ship movement, brain with advanced boost, etc. preserved ...

function boot(){
  initGlobe();
  initDrones();
  seedOrbs();
  addShip();
  locateSelf();
  focusCity();
  updateHUD();
  logRadio('BASIC PILOT active — open to all for field develop, test & get accustomed');
  logRadio('Password ΒΕΛΟΣ for ADVANCED ΤΗΛΕΜΑΧΟΣ');
  logRadio('Official only on astranov.eu and grok.astranov.eu');
  updateEmotion();
  setupPilotSummon();
  detectAndAdaptUI();
  window.addEventListener('resize', detectAndAdaptUI);
  startAutonomous();
  setInterval(updateHUD, 5200);
  setInterval(updateEmotion, 1400);
  setInterval(crawlerStep, 5800);
  const host = location.hostname || '';
  const isOfficial = host === 'astranov.eu' || host === 'grok.astranov.eu' || host.endsWith('.astranov.eu');
  const isLocalDev = host === 'localhost' || host === '127.0.0.1' || host === '' || location.protocol === 'file:';
  if (host && !isOfficial && !isLocalDev) {
    document.body.innerHTML = '<div style="color:#ff4444;padding:20px;font-family:sans-serif;text-align:center">The Astranov Grok Fork is available to the public ONLY through astranov.eu and grok.astranov.eu</div>';
    return;
  }
  setTimeout(() => { if(State.drones[0] && State.drones[0].userData){ State.drones[0].userData.targetLat = 37.98; State.drones[0].userData.targetLng = 23.72; } }, 1400);
  console.log('%c[ASTRANOV GROK FORK] Official only on astranov.eu and grok.astranov.eu. BASIC open, ADVANCED with ΒΕΛΟΣ. Real space, Earth view, collective voice/text AI, adaptive UI, full tasks.', 'color:#30d158');
}
window.addEventListener('load', boot);
</script>
</body>
