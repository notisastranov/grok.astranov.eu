<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Astranov Grok</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; }
  #globe { position:absolute; top:0; left:0; right:0; bottom:0; }
  #globe canvas { display:block; }
  .subtle { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:10px; color:#333; letter-spacing:2px; opacity:0.3; }
</style>
</head>
<body>
  <div id="globe"></div>
  <div class="subtle">ASTRANOV GROK</div>
<script>
const container = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.3, 2.4);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x334455, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(5, 3, 4);
scene.add(sun);

// Stars
const starCount = 12000;
const positions = [];
for (let i = 0; i < starCount; i++) {
  const r = 200 + Math.random() * 1800;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  positions.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xaaaabb, size: 0.7 }));
scene.add(stars);

// Earth
const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const texture = new THREE.TextureLoader().load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg');
const earth = new THREE.Mesh(
  earthGeo,
  new THREE.MeshPhongMaterial({ map: texture, shininess: 5, color: 0x335577 })
);
earth.rotation.y = 0.9;
scene.add(earth);

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

function animate() {
  requestAnimationFrame(animate);
  earth.rotation.y += 0.00025;
  renderer.render(scene, camera);
}
animate();

const host = location.hostname || '';
const isOfficial = host === 'astranov.eu' || host === 'grok.astranov.eu' || host.endsWith('.astranov.eu');
const isLocal = host === '' || host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:';
if (host && !isOfficial && !isLocal) {
  document.body.innerHTML = '<div style="color:#444;padding:40px;text-align:center;font-family:sans-serif">Available only on astranov.eu and grok.astranov.eu</div>';
}
</script>
</body>
</html>
