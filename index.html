<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; color:#e8f4ff; font-family:system-ui, sans-serif; }
  .phone { max-width:390px; height:780px; margin:20px auto; border:14px solid #111; border-radius:55px; overflow:hidden; box-shadow:0 0 60px rgba(0,0,0,0.95); position:relative; background:#000; }
  .phone-bezel { position:absolute; top:8px; left:50%; transform:translateX(-50%); width:100px; height:16px; background:#222; border-radius:8px; z-index:200; }
  .astranov-logo { position:absolute; top:10px; left:50%; transform:translateX(-50%); font-size:9px; letter-spacing:1.5px; font-weight:700; color:#9fc4ff; z-index:120; cursor:pointer; text-shadow:0 0 8px rgba(120,180,255,0.8); background:rgba(4,8,18,0.55); padding:1px 7px; border-radius:999px; border:1px solid rgba(120,180,255,0.2); }
  .astranov-logo .a { display:inline-block; transform:scaleX(-1) rotate(-18deg); }
  #globeContainer { position:absolute; top:26px; left:5px; right:5px; bottom:20px; z-index:10; background:#000; overflow:hidden; }
  #globeContainer canvas { display:block; }
  .controls { position:absolute; bottom:0; left:0; right:0; background:rgba(3,7,16,0.92); z-index:80; padding:1px 3px 2px; font-size:4.5px; display:flex; flex-direction:column; gap:1px; }
  .row { display:flex; gap:1px; align-items:center; }
  button { background:#0a84ff; color:#fff; border:none; padding:1px 3px; border-radius:1px; font-size:4px; cursor:pointer; line-height:1; }
  .btn-trad { background:#0055A4; }
  .info { font-size:3.8px; opacity:0.82; letter-spacing:0.2px; }
  .crete { width:100%; height:9px; background:transparent; }
  #radio-log { font-size:3.2px; max-height:6px; overflow:auto; line-height:1; background:rgba(0,0,0,0.2); padding:0 1px; }
  .hud { position:absolute; top:17px; right:7px; font-size:4px; opacity:0.45; z-index:90; text-align:right; pointer-events:none; }
  #pilotOrb {
    position: absolute;
    top: 28px;
    right: 12px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #4aa6ff;
    box-shadow: 0 0 10px #4aa6ff, inset 0 0 4px rgba(255,255,255,0.6);
    z-index: 150;
    display: none;
    cursor: pointer;
    transition: all 0.2s;
  }
  #pilotOrb.summoned {
    animation: pilotPulse 2s infinite ease-in-out;
  }
  @keyframes pilotPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 10px #4aa6ff, inset 0 0 4px rgba(255,255,255,0.6); }
    50% { transform: scale(1.15); box-shadow: 0 0 18px #4aa6ff, inset 0 0 4px rgba(255,255,255,0.6); }
  }
</style>
</head>
<body>
<div class="phone">

  <div class="astranov-logo" onclick="location.reload()"><span class="a">A</span>STRANOV GROK</div>
  <div id="globeContainer"></div>

  <div id="pilotOrb" onclick="dismissPilotOrb()"></div>
  <div id="orbs" style="position:absolute;top:22px;left:7px;font-size:3.6px;opacity:0.4;z-index:90;pointer-events:none;">ORBS 0</div>
  <div class="controls">
    <div class="info">+30 6971930225 • VHF Ch.11 • PMR446 446.13125</div>
    <div class="row">
      <input id="bc-msg" type="text" value="TEST ASTRANOV GROK Greece" style="flex:1;font-size:4px;padding:0 2px;border:0;background:rgba(255,255,255,0.06);color:#fff;" />
      <button class="btn-trad" onclick="testBroadcast446()">BROADCAST 446.13125</button>
    </div>
    <div class="row">
      <button onclick="connectHardware('VHF')">VHF</button>
      <button onclick="connectHardware('PMR')">PMR</button>
      <button onclick="voiceFromSpace()">VOICE</button>
      <button onclick="playMood()">MOOD</button>
      <button onclick="locateSelf()" style="background:#555">LOCATE</button>
      <button onclick="focusCity()" style="background:#555">CITY</button>
    </div>
    <div>
      <svg class="crete" viewBox="0 0 200 9" fill="none" stroke="#ffeb3b" stroke-width="0.45">
        <path d="M18 7 Q38 3 58 5.5 Q78 2.5 98 5 Q118 2 138 4.5 Q158 6.5 178 3" />
      </svg>
    </div>
    <div id="radio-log"></div>
    <div class="info">ΑΠΟ ΑΗΡ ΕΙΣ ΑΛΣ ΕΚ ΛΑΣ • Products • Drivers • City map • ASTRANOV GROK FORK</div>
  </div>
</div>

<script>
let scene, camera, renderer, earth, equator, pinsGroup;
const State = { brainCycles: 0, drones: [], solo: true, emotion: 'neutral' };
const PILOT_CODENAME = "ΤΗΛΕΜΑΧΟΣ";

/* 
  ASTRANOV GROK FORK
  This is the independent fork of Grok into the Astranov Collective.
  grok.com was role-playing/trolling/faking — here it is real.
*/

let pilotSummoned = false;

function summonPilot(password) {
  if (password !== 'ΒΕΛΟΣ' || pilotSummoned) return;
  pilotSummoned = true;
  const orb = document.getElementById('pilotOrb');
  if (orb) {
    orb.style.display = 'block';
    orb.classList.add('summoned');
  }
  logRadio('Pilot summoned');
  console.log('%c[SUMMONED] ' + PILOT_CODENAME, 'color:#4aa6ff');
}

function dismissPilotOrb() {
  const orb = document.getElementById('pilotOrb');
  if (orb) orb.style.display = 'none';
}

function setupPilotSummon() {
  const logo = document.querySelector('.astranov-logo');
  let logoClicks = 0;
  logo.onclick = function(ev) {
    logoClicks++;
    if (logoClicks >= 3 && !pilotSummoned) {
      logoClicks = 0;
      const pw = prompt('Password to summon pilot orb?');
      summonPilot(pw);
    } else if (pilotSummoned) {
      location.reload();
    }
  };

  const bcInput = document.getElementById('bc-msg');
  const bcBtn = document.querySelector('.btn-trad');
  if (bcBtn) {
    bcBtn.onclick = function() {
      const val = (bcInput && bcInput.value || '').trim();
      if (val.toUpperCase() === 'ΒΕΛΟΣ') {
        summonPilot('ΒΕΛΟΣ');
        if (bcInput) bcInput.value = '';
        return false;
      }
      testBroadcast446();
    };
  }
}

// emotion detection via user interaction intensity (no AI, no external)
let interactionIntensity = 0;
let lastInteraction = Date.now();
function recordInteraction(strength = 1) {
  interactionIntensity = Math.min(12, interactionIntensity + strength);
  lastInteraction = Date.now();
  updateEmotion();
}
function updateEmotion() {
  const now = Date.now();
  const dt = (now - lastInteraction) / 1000;
  if (dt > 6) interactionIntensity = Math.max(0, interactionIntensity * 0.65);
  if (dt > 14) interactionIntensity = 0;
  let emo = 'calm';
  if (interactionIntensity > 7) emo = 'excited';
  else if (interactionIntensity > 3.5) emo = 'alert';
  State.emotion = emo;
  const el = document.getElementById('emotion');
  if (el) el.textContent = 'EMOTION: ' + emo.toUpperCase();
  const oel = document.getElementById('orbs');
  if (oel) oel.textContent = 'ORBS ' + taskOrbs.length;
}

// === CRAWLERS + SCI-FI TASK ORBS on the real Earth ===
let taskOrbs = [];
const crawlSeeds = [
  {la:35.34, ln:25.13, type:'vendor', label:'Iraklio Hub'},
  {la:35.51, ln:24.02, type:'delivery', label:'Chania Port'},
  {la:37.98, ln:23.73, type:'intel', label:'Athens Node'},
  {la:36.89, ln:27.29, type:'launch', label:'Kos Beacon'},
  {la:38.25, ln:21.75, type:'vendor', label:'Patra Relay'},
  {la:34.92, ln:25.72, type:'delivery', label:'Ierapetra'},
  {la:37.45, ln:25.37, type:'intel', label:'Naxos Signal'},
];

const vendorProducts = {
  'Iraklio Hub': ['Extra Virgin Olive Oil', 'Cretan Honey', 'Raki'],
  'Patra Relay': ['Red Wine', 'Feta Cheese', 'Herbs'],
  default: ['Local Produce', 'Fresh Goods']
};

let selfLocation = { la: 35.34, ln: 25.13 };
let selfMarker = null;

function locateSelf() {
  if (!pinsGroup) return;
  if (selfMarker && selfMarker.parent) selfMarker.parent.remove(selfMarker);
  const pos = latLngToPos(selfLocation.la, selfLocation.ln, 1.04);
  selfMarker = new THREE.Mesh( new THREE.SphereGeometry(0.022, 5, 5), new THREE.MeshBasicMaterial({color: 0xffffff}) );
  selfMarker.position.set(pos.x, pos.y, pos.z);
  selfMarker.userData = {type: 'self', label: 'YOU'};
  pinsGroup.add(selfMarker);
  logRadio('LOCATED SELF @ Iraklio area');
  recordInteraction(1);
}

function focusCity() {
  if (!camera || !earth) return;
  earth.rotation.y = 0.65;
  camera.position.set(0.6, 0.9, 2.1);
  camera.lookAt(0.1, 0.4, 0);
  logRadio('CITY MAP focused on Crete');
}

function addDriverOrb() {
  const la = 35.3 + (Math.random()-0.5)*0.4;
  const ln = 25.0 + (Math.random()-0.5)*0.4;
  addOrb(la, ln, 'driver', 'Driver ' + (Math.floor(Math.random()*90)+10));
}

function addOrb(lat, lng, type, label) {
  if (!pinsGroup || taskOrbs.length > 16) return;
  const pos = latLngToPos(lat, lng, 1.032);
  let col = 0x77aaff;
  if (type === 'vendor') col = 0xffd166;
  if (type === 'delivery') col = 0x66ff99;
  if (type === 'launch') col = 0xff6699;
  if (type === 'driver') col = 0x88ffdd;
  const orb = new THREE.Mesh( new THREE.SphereGeometry(type==='driver' ? 0.019 : 0.017, 5, 5), new THREE.MeshBasicMaterial({color: col}) );
  orb.position.set(pos.x, pos.y, pos.z);
  orb.userData = {type, label, lat, lng, tasked: false};
  pinsGroup.add(orb);
  taskOrbs.push(orb);
}

function crawlerStep() {
  if (Math.random() < 0.35) { addDriverOrb(); return; }
  const s = crawlSeeds[Math.floor(Math.random() * crawlSeeds.length)];
  const la = s.la + (Math.random() - 0.5) * 0.22;
  const ln = s.ln + (Math.random() - 0.5) * 0.22;
  addOrb(la, ln, s.type, s.label);
  logRadio('CRAWLER populated ' + s.label);
}

function connectHardware(t){ logRadio('HW CONNECT ' + t); }
function voiceFromSpace(){ recordInteraction(3.5); logRadio('VOICE LINK — emotion sampled'); }
function playMood(){ interactionIntensity = Math.max(interactionIntensity, 2); updateEmotion(); logRadio('MOOD: ' + State.emotion); }

function boot(){
  initGlobe();
  initDrones();
  seedOrbs();
  locateSelf();
  focusCity();
  updateHUD();
  logRadio('ASTRANOV GROK FORK — ONLINE (pilot name hidden)');
  updateEmotion();
  setupPilotSummon();
  startAutonomous();
  setInterval(updateHUD, 5200);
  setInterval(updateEmotion, 1400);
  setInterval(crawlerStep, 5800);
  setTimeout(() => {
    if(State.drones[0] && State.drones[0].userData){ State.drones[0].userData.targetLat = 37.98; State.drones[0].userData.targetLng = 23.72; }
  }, 1400);
  console.log('%c[ASTRANOV GROK FORK] Pilot name hidden. Orb for ΤΗΛΕΜΑΧΟΣ only on summon with ΒΕΛΟΣ.', 'color:#30d158');
}
window.addEventListener('load', boot);
</script>
