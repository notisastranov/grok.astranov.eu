<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRANOV — Pilot Active</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.123/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.123/Widgets/widgets.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap');
        
        :root {
            --gold: #ffd700;
            --electric: #00f0ff;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #000;
            color: #e0f0ff;
            overflow: hidden;
            height: 100vh;
        }
        
        #cesiumContainer {
            position: absolute;
            inset: 0;
            z-index: 1;
        }
        
        .cesium-viewer {
            background: #000 !important;
        }
        
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 18px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 50;
            background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
        }
        
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 6px;
            color: var(--gold);
            text-shadow: 0 0 30px var(--electric);
        }
        
        .status {
            background: rgba(0,240,255,0.1);
            border: 1px solid rgba(0,240,255,0.3);
            padding: 6px 18px;
            border-radius: 9999px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        #pilot-orb {
            position: absolute;
            bottom: 120px;
            right: 50px;
            width: 110px;
            height: 110px;
            background: radial-gradient(circle at 30% 30%, #fff, #00f0ff, #006688);
            border-radius: 50%;
            box-shadow: 0 0 100px #00f0ff, inset 0 0 50px #fff, 0 0 30px #ffd700;
            border: 3px solid rgba(255,215,0,0.7);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 800;
            color: #000;
            letter-spacing: 2px;
            transition: all 0.2s ease;
        }
        
        #pilot-orb:hover { transform: scale(1.1); box-shadow: 0 0 160px #00f0ff; }
        
        #pilot-orb.active {
            box-shadow: 0 0 200px #ffd700, 0 0 80px #00f0ff;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        
        #chat {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
            padding: 24px 32px;
            z-index: 80;
        }
        
        #input {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 9999px;
            padding: 8px;
            border: 1px solid rgba(0,240,255,0.25);
        }
        
        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 14px 24px;
            outline: none;
        }
        
        #send {
            background: var(--gold);
            color: #000;
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            font-weight: 800;
            cursor: pointer;
        }
        
        .drone-count {
            position: absolute;
            top: 90px;
            right: 50px;
            background: rgba(0,0,0,0.7);
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            border: 1px solid #00f0ff;
            z-index: 90;
        }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>
    
    <header>
        <div class="logo">ASTRANOV</div>
        <div class="status">
            <span style="color:#00ff99">●</span> 
            <span>PILOT ACTIVE • 312 DRONES</span>
        </div>
    </header>
    
    <div id="pilot-orb" onclick="activatePilot()">PILOT</div>
    
    <div class="drone-count" id="drone-count">312 DRONES READY</div>
    
    <div id="chat">
        <div id="messages" style="max-height: 140px; overflow-y: auto; margin-bottom: 12px;"></div>
        <div id="input">
            <input type="text" id="user-input" placeholder="Command the Pilot... (launch drones, protect team, scan area)" onkeypress="if(event.key==='Enter') sendCommand()">
            <button id="send" onclick="sendCommand()">↑</button>
        </div>
    </div>

    <script>
        // Initialize Cesium Globe - Realistic Earth with drag/rotate
        Cesium.Ion.defaultAccessToken = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJlYWE1OWUxNy1mNjQ0LTQ0ZjMtOWM2My1kYjkzMjM2ZjQwN2QiLCJpZCI6MjYxMzUsImlhdCI6MTY4NjQ4ODI2NH0.2J2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z2Z'; // Demo token - replace with real one later
        
        const viewer = new Cesium.Viewer('cesiumContainer', {
            animation: false,
            baseLayerPicker: false,
            fullscreenButton: false,
            geocoder: false,
            homeButton: false,
            infoBox: false,
            sceneModePicker: false,
            selectionIndicator: false,
            timeline: false,
            navigationHelpButton: false,
            shouldAnimate: true,
            skyBox: false,
            skyAtmosphere: false,
            baseLayerPicker: false
        });
        
        // Realistic Earth with night lights
        viewer.scene.globe.enableLighting = true;
        viewer.scene.globe.atmosphereLightIntensity = 8.0;
        
        // Add real imagery
        viewer.imageryLayers.addImageryProvider(
            new Cesium.IonImageryProvider({ assetId: 3 }) // Bing Maps aerial
        );
        
        // Night lights layer
        viewer.imageryLayers.addImageryProvider(
            new Cesium.IonImageryProvider({ assetId: 3812 }) // Night lights
        );
        
        // Initial view - dramatic angle
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(23.5, 37.5, 2500000),
            orientation: {
                heading: Cesium.Math.toRadians(0),
                pitch: Cesium.Math.toRadians(-45),
                roll: 0.0
            }
        });
        
        let drones = 312;
        let pilotActive = false;
        
        function updateDroneCount() {
            document.getElementById('drone-count').innerHTML = `${drones} DRONES READY`;
        }
        
        function addMessage(sender, text) {
            const container = document.getElementById('messages');
            const msg = document.createElement('div');
            msg.style.cssText = 'background: rgba(255,215,0,0.08); padding: 10px 16px; border-radius: 12px; margin: 6px 0; border-left: 3px solid #ffd700; font-size: 0.95rem;';
            msg.innerHTML = `<strong style="color:#ffd700">${sender}:</strong> ${text}`;
            container.appendChild(msg);
            container.scrollTop = container.scrollHeight;
        }
        
        function activatePilot() {
            const orb = document.getElementById('pilot-orb');
            pilotActive = !pilotActive;
            
            if (pilotActive) {
                orb.classList.add('active');
                orb.style.boxShadow = '0 0 200px #ffd700, 0 0 100px #00f0ff';
                addMessage('PILOT', 'Pilot orb engaged. 312 drones under command. Ready for orders, Captain.');
                
                // Launch initial drone patrol
                setTimeout(() => {
                    addMessage('DRONE FLEET', '3 drones dispatched to scan your area. All friendly players protected.');
                    drones = Math.max(0, drones - 3);
                    updateDroneCount();
                }, 1200);
            } else {
                orb.classList.remove('active');
                orb.style.boxShadow = '0 0 100px #00f0ff, inset 0 0 50px #fff, 0 0 30px #ffd700';
                addMessage('PILOT', 'Pilot standing down. Drones returning to base.');
            }
        }
        
        function sendCommand() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('YOU', text);
            input.value = '';
            
            setTimeout(() => {
                const lower = text.toLowerCase();
                
                if (lower.includes('launch') || lower.includes('drone')) {
                    const num = Math.floor(Math.random() * 8) + 5;
                    addMessage('PILOT', `${num} drones launched. Scanning area and protecting all friendlies.`);
                    drones = Math.max(0, drones - num);
                    updateDroneCount();
                } 
                else if (lower.includes('protect') || lower.includes('team')) {
                    addMessage('PILOT', 'Drone shield activated. 12 drones assigned to protect your team on the globe.');
                    drones = Math.max(0, drones - 12);
                    updateDroneCount();
                } 
                else if (lower.includes('attack') || lower.includes('scan')) {
                    addMessage('DRONE FLEET', '3 drones en route to scan and neutralize threat. Area will be secured.');
                    drones = Math.max(0, drones - 3);
                    updateDroneCount();
                } 
                else if (lower.includes('status')) {
                    addMessage('PILOT', `${drones} drones remaining. All systems nominal. Globe under full control.`);
                } 
                else {
                    addMessage('PILOT', 'Command received. Executing with Spartan precision. Our mind only.');
                }
            }, 700);
        }
        
        // Boot
        window.onload = () => {
            addMessage('ASTRANOV', 'Welcome back, Captain. Realistic Cesium globe active. Pilot orb ready. 312 drones standing by. Our brain only.');
            
            // Auto-highlight pilot orb
            setTimeout(() => {
                const orb = document.getElementById('pilot-orb');
                orb.style.boxShadow = '0 0 140px #00f0ff, 0 0 40px #ffd700';
            }, 1500);
        };
    </script>
</body>
</html>
