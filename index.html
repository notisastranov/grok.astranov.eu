<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#020713"/>
<title>Astranov</title>
<script>window.CESIUM_BASE_URL="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/";</script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/Widgets/widgets.css">
<script src="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/Cesium.js"></script>
<style>
:root{
  --blue:#1e5cff;--deepblue:#0f3cff;--ice:#eefcff;--ink:#020713;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body,#app,#cesium{width:100%;height:100%;margin:0;overflow:hidden;background:#020713;color:#eefcff;font-family:Inter,ui-sans-serif,system-ui,Segoe UI,Roboto,Arial,sans-serif;touch-action:none}
body{position:fixed;inset:0}

/* SPLASH LOADING */
#splash{position:fixed;inset:0;z-index:1000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#020713}
#splash.hidden{opacity:0;pointer-events:none;transition:opacity .35s ease}
#splash .logo{font-weight:950;font-size:clamp(24px,7vw,34px);letter-spacing:.42em;text-transform:uppercase;color:#f3fcff;text-shadow:0 0 14px #1e5cff,0 0 32px #0f3cff;margin-bottom:22px}
#splash .loader{width:38px;height:38px;border:3px solid rgba(30,92,255,.25);border-top-color:#1e5cff;border-radius:50%;animation:spin 0.95s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#cesium{position:absolute;inset:0;z-index:2}
.cesium-viewer,.cesium-viewer-cesiumWidgetContainer,.cesium-widget,.cesium-widget canvas{width:100%;height:100%}
.cesium-viewer *{display:none!important}

/* BRAND - DEEP BLUE GLOWING */
#brand{position:absolute;top:calc(14px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);z-index:300;
  color:#f3fcff;font-weight:950;font-size:clamp(16px,4.4vw,26px);letter-spacing:.38em;text-transform:uppercase;
  text-shadow:0 0 10px #1e5cff,0 0 26px #0f3cff,0 0 48px #0a2cff;
  user-select:none;pointer-events:auto;padding:9px 14px 10px 20px;border-radius:999px;cursor:pointer}

#stageFlash{position:absolute;left:50%;top:50%;width:90px;height:90px;border-radius:999px;z-index:140;pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.5);border:1px solid rgba(30,92,255,.5);box-shadow:0 0 30px rgba(30,92,255,.6)}
#stageFlash.go{animation:flash .8s ease forwards}
@keyframes flash{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}30%{opacity:.9}100%{opacity:0;transform:translate(-50%,-50%) scale(2.4)}}

.wake{position:absolute;z-index:280;opacity:0;pointer-events:none;transform:translateY(8px) scale(.98);transition:opacity .2s ease,transform .2s ease;display:none}
.wake.show{display:flex;opacity:1;pointer-events:auto;transform:translateY(0) scale(1)}

#contextCard{left:50%;bottom:calc(16px + env(safe-area-inset-bottom));width:min(92vw,420px);transform:translate(-50%,8px) scale(.98);flex-direction:column;gap:9px;
  border:1px solid rgba(112,224,255,.25);border-radius:22px;padding:12px;background:rgba(5,18,40,.78);backdrop-filter:blur(16px)}
#contextCard.show{transform:translate(-50%,0) scale(1)}

#composer{left:50%;bottom:calc(14px + env(safe-area-inset-bottom));width:min(94vw,580px);transform:translate(-50%,8px) scale(.98);align-items:end;gap:8px;
  border:1px solid rgba(112,224,255,.25);border-radius:20px;padding:8px;background:rgba(5,18,40,.82);backdrop-filter:blur(16px)}
#composer.show{transform:translate(-50%,0) scale(1)}
#composerInput{flex:1;min-height:42px;max-height:110px;resize:none;border:0;outline:0;border-radius:14px;background:rgba(255,255,255,.07);color:#eefcff;padding:11px 12px;font-size:15px}
#sendBtn{min-width:52px;height:42px;border:0;border-radius:14px;font-weight:900;color:#031323;background:linear-gradient(180deg,#bdf7ff,#5ccaff 55%,#278dff)}

@media(max-width:560px){#contextCard{bottom:calc(10px + env(safe-area-inset-bottom))}}
</style>
</head>
<body>

<!-- SPLASH LOADING SCREEN -->
<div id="splash">
  <div class="logo">ASTRANOV</div>
  <div class="loader"></div>
</div>

<div id="app">
  <div id="cesium"></div>
  <div id="stageFlash"></div>
  <div id="brand" role="button">ASTRANOV</div>

  <div id="statusRibbon" class="wake"></div>
  <div id="wallet" class="wake" style="right:10px;top:calc(58px + env(safe-area-inset-top));flex-direction:column;gap:2px;padding:9px 11px;border-radius:16px;border:1px solid rgba(112,224,255,.25);background:rgba(5,18,40,.7);backdrop-filter:blur(14px);text-align:right">
    <small style="font-size:10px;color:rgba(229,249,255,.7)">Astran balance</small>
    <strong id="balanceText" style="font-size:15px">0.00</strong>
  </div>

  <section id="contextCard" class="wake">
    <div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start">
      <div>
        <div id="cardTitle" style="font-size:15px;font-weight:800"></div>
        <div id="cardMeta" style="font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:rgba(224,248,255,.7);margin-top:3px"></div>
      </div>
      <button id="closeCard" style="width:30px;height:30px;border:1px solid rgba(112,224,255,.3);background:rgba(10,35,78,.6);color:#eefcff;border-radius:999px;font-size:18px;line-height:1">×</button>
    </div>
    <div id="cardDetail" style="font-size:12px;line-height:1.35;color:rgba(237,250,255,.85);padding:8px 9px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(112,224,255,.12)"></div>
    <div id="cardActions" style="display:flex;flex-wrap:wrap;gap:7px"></div>
  </section>

  <form id="composer" class="wake" autocomplete="off">
    <textarea id="composerInput" rows="1" placeholder="Type command" style="flex:1;min-height:40px;max-height:100px;resize:none;border:0;outline:0;border-radius:13px;background:rgba(255,255,255,.07);color:#eefcff;padding:10px 11px;font-size:15px"></textarea>
    <button id="sendBtn" type="submit" style="min-width:50px;height:40px;border:0;border-radius:13px;font-weight:900;color:#031323;background:linear-gradient(180deg,#bdf7ff,#5ccaff 55%,#278dff)">AI</button>
  </form>
</div>

<script>
(function(){
'use strict';

const $=id=>document.getElementById(id);
const splash=$('splash');
const ui={ brand:$('brand'), status:$('statusRibbon'), flash:$('stageFlash'), card:$('contextCard'), cardTitle:$('cardTitle'), cardMeta:$('cardMeta'), cardDetail:$('cardDetail'), actions:$('cardActions'), close:$('closeCard'), composer:$('composer'), input:$('composerInput'), send:$('sendBtn'), wallet:$('wallet'), balance:$('balanceText') };

const state={ selected:null, cityAnchor:null, cityEntities:[], hasCity:false };

function wake(el,on=true){el.classList.toggle('show',!!on)}
function speak(t,ms=2000){ui.status.textContent=t;wake(ui.status,true);clearTimeout(speak.t);speak.t=setTimeout(()=>wake(ui.status,false),ms)}
function hideAll(){ wake(ui.card,false); wake(ui.composer,false); wake(ui.wallet,false); }

function goGlobalView(){ hideAll(); if(ui.flash) ui.flash.classList.add('go'); setTimeout(()=>ui.flash&&ui.flash.classList.remove('go'),900); const t=state.cityAnchor||{lon:28.222,lat:36.441}; if(window.viewer){ window.viewer.camera.flyTo({ destination:Cesium.Cartesian3.fromDegrees(t.lon,t.lat,26000000), orientation:{heading:0,pitch:Cesium.Math.toRadians(-90),roll:0}, duration:1.3 }); } }

function hardResetToGlobal(){ splash.classList.remove('hidden'); setTimeout(()=>{ const url=new URL(location.href); url.searchParams.set('_r',Date.now()); location.href=url.toString(); },120); }

// LOGO: Single click = Empty cache hard reload + Global view
ui.brand.onclick=hardResetToGlobal;

// Double click = quick global view without reload
ui.brand.ondblclick=()=>{ goGlobalView(); };

if(!window.Cesium){ splash.style.display='none'; return; }

const Cesium=window.Cesium;
let viewer;
try{
  viewer=new Cesium.Viewer('cesium',{
    animation:false,timeline:false,geocoder:false,homeButton:false,sceneModePicker:false,baseLayerPicker:false,navigationHelpButton:false,fullscreenButton:false,vrButton:false,infoBox:false,selectionIndicator:false,shadows:false,requestRenderMode:false,
    terrainProvider:new Cesium.EllipsoidTerrainProvider(),
    imageryProvider:new Cesium.UrlTemplateImageryProvider({url:'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',maximumLevel:19})
  });
  window.viewer=viewer;
}catch(e){ splash.style.display='none'; return; }

viewer.scene.globe.baseColor=Cesium.Color.fromCssColorString('#071b45');
viewer.scene.globe.enableLighting=false;
viewer.scene.skyAtmosphere.show=true;
viewer.scene.fog.enabled=false;
viewer.scene.screenSpaceCameraController.inertiaSpin=.9;
viewer.scene.screenSpaceCameraController.minimumZoomDistance=600;
viewer.scene.screenSpaceCameraController.maximumZoomDistance=260000000;
viewer.camera.setView({ destination:Cesium.Cartesian3.fromDegrees(21.5,28,24000000), orientation:{heading:0,pitch:Cesium.Math.toRadians(-90),roll:0} });

// Hide splash when ready
function hideSplash(){ splash.classList.add('hidden'); setTimeout(()=>splash.remove(),500); }
viewer.scene.globe.tileLoadProgressEvent.addEventListener(q=>{ if(q<6) hideSplash(); });
setTimeout(hideSplash,4500);

// Simple signals
['Rhodes','London','New York','Tokyo'].forEach((name,i)=>{
  const lon=[28.22,-0.13,-74,139.65][i]; const lat=[36.44,51.51,40.71,35.68][i];
  viewer.entities.add({ position:Cesium.Cartesian3.fromDegrees(lon,lat,160000), point:{pixelSize:10,color:Cesium.Color.fromCssColorString('#60d7ff'),outlineColor:Cesium.Color.WHITE.withAlpha(.7),outlineWidth:1.2}, label:{text:name,font:'600 11px Inter',fillColor:Cesium.Color.WHITE,outlineColor:Cesium.Color.fromCssColorString('#0f3cff'),outlineWidth:2,pixelOffset:new Cesium.Cartesian2(0,-20)} });
});

// Basic pick for context
new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas).setInputAction((m)=>{
  const p=viewer.scene.pick(m.position);
  if(p&&p.id){ const pos={lon:28.22,lat:36.44,title:p.id._label?.text||'Object'}; state.selected=pos; ui.cardTitle.textContent=pos.title; ui.cardMeta.textContent='World object'; ui.cardDetail.textContent='Tap logo to reset.'; ui.actions.innerHTML=''; const b=document.createElement('button'); b.textContent='Global View'; b.onclick=goGlobalView; b.style.cssText='padding:8px 14px;border-radius:999px;background:#1e5cff;color:white;border:0'; ui.actions.appendChild(b); wake(ui.card,true); }
},Cesium.ScreenSpaceEventType.LEFT_CLICK);

setTimeout(()=>speak('Ready. Tap ASTRANOV to reset.'),4800);

})();
</script>
</body>
</html>
