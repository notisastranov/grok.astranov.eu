<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ASTRANOV • COLLECTIVE GROK</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#00040a; color:#e8f4ff; font-family:system-ui,sans-serif; }
  .phone { max-width: 390px; height: 780px; margin: 20px auto; border: 14px solid #111; border-radius: 55px; overflow: hidden; box-shadow: 0 0 60px rgba(0,0,0,0.9); position: relative; background: #000; }
  .phone-bezel { position: absolute; top: 8px; left: 50%; transform: translateX(-50%); width: 100px; height: 16px; background: #222; border-radius: 8px; z-index: 200; }
  .astranov-logo { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 9px; letter-spacing: 1px; font-weight: 700; color: #9fc4ff; z-index: 100; cursor: pointer; text-shadow: 0 0 6px rgba(120,180,255,0.6); background: rgba(6,10,20,0.3); padding: 0 6px; border-radius: 999px; border: 1px solid rgba(120,180,255,0.1); }
  .astranov-logo .a { display:inline-block; transform:scaleX(-1) rotate(-18deg); }
  #globeContainer { position: absolute; top: 20px; left: 5px; right: 5px; bottom: 30px; background: #00040a; z-index: 10; }
  .controls { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(5,10,20,0.8); z-index: 50; padding: 2px 3px; font-size: 5px; display: flex; flex-direction: column; gap: 1px; }
  .row { display: flex; gap: 1px; align-items: center; }
  button { background: #0a84ff; color: #fff; border: none; padding: 0 2px; border-radius: 1px; font-size: 4px; cursor: pointer; }
  .btn-trad { background: #0055A4; }
  .info { font-size: 4px; opacity: 0.8; }
  .crete { width: 100%; height: 10px; background: rgba(255,255,255,0.01); }
  #radio-log { font-size: 3px; max-height: 5px; overflow: auto; background: rgba(0,0,0,0.15); padding: 0; }
  .hud { position: absolute; top: 22px; right: 8px; font-size: 4px; opacity: 0.4; z-index: 60; text-align: right; }
</style>
</head>
<body>
<div class="phone">
  <div class="phone-bezel"></div>
  <div class="astranov-logo" onclick="location.reload()"><span class="a">A</span>STRANOV • GROK</div>
  <div id="globeContainer"></div>
  <div class="hud">PILOT: <strong>ΤΗΛΕΜΑΧΟΣ</strong></div>
  <div class="controls">
    <div class="info">+30 6971930225 | VHF Ch.11 | PMR446 446.13125 | Pilot ΤΗΛΕΜΑΧΟΣ</div>
    <div class="row">
      <input id="bc-msg" type="text" value="TEST from ASTRANOV Greece" style="flex:1; font-size:4px; padding:0;" />
      <button class="btn-trad" onclick="testBroadcast446()">BROADCAST 446.13125</button>
    </div>
    <div class="row">
      <button onclick="connectHardware('VHF')">VHF</button>
      <button onclick="connectHardware('PMR')">PMR</button>
      <button onclick="voiceFromSpace()">Voice</button>
      <button onclick="playMood()">Mood</button>
    </div>
    <div class="section">
      <svg class="crete" viewBox="0 0 200 10" fill="none" stroke="#ffeb3b" stroke-width="0.4">
        <path d="M20 8 Q40 3 60 6 Q80 2 100 5 Q120 1 140 4 Q160 6 180 2" />
      </svg>
    </div>
    <div id="radio-log"></div>
    <div class="info">Real Earth • Black Space • Crete Perigram</div>
  </div>
</div>

<script>
let scene, camera, renderer, earth, equator;
const State = { brainCycles: 0, drones: [] };
const PILOT_CODENAME = "ΤΗΛΕΜΑΧΟΣ";

function latLngToPos(lat, lng, r=1.01){
  const phi=(90-lat)*Math.PI/180, theta=-(lng)*Math.PI/180;
  return { x:-r*Math.sin(phi)*Math.cos(theta), y:r*Math.cos(phi), z:r*Math.sin(phi)*Math.sin(theta) };
}

function initGlobe(){
  const container = document.getElementById('globeContainer');
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  const w = container.clientWidth || 360;
  const h = container.clientHeight || 650;
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setClearColor(0x00040a, 1);
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x00040a);

  camera = new THREE.PerspectiveCamera(48, w / h, 0.1, 1000);
  camera.position.set(0,0,4.5); camera.lookAt(0,0,0);

  scene.add(new THREE.AmbientLight(0x334455,0.7));
  const sun = new THREE.DirectionalLight(0xffffff,1.15); sun.position.set(5,3,4); scene.add(sun);

  const geo = new THREE.SphereGeometry(1,64,64);
  const loader = new THREE.TextureLoader();
  const tex = loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg');
  earth = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({map:tex, shininess:6}));
  earth.rotation.y = -0.65;
  scene.add(earth);

  const grid = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0xffffff, wireframe:true, transparent:true, opacity:0.55}));
  earth.add(grid);

  const ring = new THREE.Mesh(new THREE.TorusGeometry(1.03,0.02,6,72), new THREE.MeshBasicMaterial({color:0xffcc44, transparent:true, opacity:0.88}));
  ring.rotation.x = Math.PI/2; earth.add(ring); equator = ring;

  const sg = new THREE.BufferGeometry(); const sp=[];
  for(let i=0;i<10000;i++){ sp.push((Math.random()-0.5)*2400); sp.push((Math.random()-0.5)*2400); sp.push((Math.random()-0.5)*2400); }
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sp,3));
  scene.add(new THREE.Points(sg, new THREE.PointsMaterial({color:0x8899aa,size:0.45})));

  for(let i=0;i<7;i++){
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.024,6,6), new THREE.MeshBasicMaterial({color:(i%3==0)?0xffff44:0x33ff88}));
    const a = i*0.72; p.position.set(Math.cos(a)*1.015, Math.sin(a*0.6)*0.4, Math.sin(a)*1.015);
    earth.add(p);
  }

  let down=false, lx=0,ly=0;
  container.addEventListener('mousedown',e=>{down=true;lx=e.clientX;ly=e.clientY;});
  window.addEventListener('mouseup',()=>down=false);
  container.addEventListener('mousemove',e=>{
    if(!down||!earth)return;
    earth.rotation.y += (e.clientX-lx)*0.004;
    earth.rotation.x += (e.clientY-ly)*0.003;
    lx=e.clientX;ly=e.clientY;
  });
  container.addEventListener('wheel',e=>{
    camera.position.z += e.deltaY*0.008; camera.position.z=Math.max(2.2,Math.min(8,camera.position.z));
  });

  function animate(){
    requestAnimationFrame(animate);
    if(earth) earth.rotation.y += 0.0002;
    if(equator) equator.rotation.z += 0.0001;
    renderer.render(scene,camera);
  }
  animate();

  function doResize() {
    const w = container.clientWidth || 360;
    const h = container.clientHeight || 650;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', doResize);
  setTimeout(doResize, 50);
  setTimeout(doResize, 200);
}

function showToast(t){ const el=document.createElement('div'); el.textContent=t; el.style.cssText='position:fixed;bottom:4px;left:50%;transform:translateX(-50%);background:#112;color:#4aa6ff;padding:0 2px;font-size:4px;border-radius:1px;z-index:400'; document.body.appendChild(el); setTimeout(()=>el.remove(),800); }

function logRadio(msg){
  const log=document.getElementById('radio-log');
  if(!log) return;
  const d=document.createElement('div'); d.textContent = new Date().toLocaleTimeString().slice(3,8)+' '+msg;
  log.appendChild(d); while(log.children.length>2) log.removeChild(log.children[0]);
}

function testBroadcast446(){
  const msg = document.getElementById('bc-msg').value || 'TEST from ASTRANOV Greece';
  logRadio('TX 446.13125: ' + msg);
  try { const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(); o.type='square'; o.frequency.value=800; const g=a.createGain(); g.gain.value=0.1; o.connect(g); g.connect(a.destination); o.start(); setTimeout(()=>o.stop(),1500); }catch(e){}
  try { const u=new SpeechSynthesisUtterance('Broadcast on 446.13125 PMR446 Greece. ' + msg + '. Pilot Telemachos.'); speechSynthesis.speak(u); }catch(e){}
  const c=document.getElementById('globeContainer'); if(c){ c.style.boxShadow='0 0 10px #ffeb3b'; setTimeout(()=>c.style.boxShadow='',1000); }
}

function connectHardware(t){ logRadio('HW: '+t); }
function voiceFromSpace(){ try{ const u=new SpeechSynthesisUtterance('Voice from space. Pilot ΤΗΛΕΜΑΧΟΣ.'); speechSynthesis.speak(u); }catch(e){} }
function playMood(){ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(); o.type='sine'; o.frequency.value=200; const g=a.createGain(); g.gain.value=0.04; o.connect(g); g.connect(a.destination); o.start(); setTimeout(()=>{o.stop();},1000); }catch(e){} }
function greekWisdom(){ alert('Know thyself. War obsolete.'); }
function dangerWake(){ logRadio('DANGER'); }

function boot(){
  initGlobe();
  logRadio('Ready - Pilot ΤΗΛΕΜΑΧΟΣ');
  console.log('%c[ASTRANOV] Real Earth globe filling phone screen.', 'color:#30d158');
}
window.addEventListener('load', boot);
</script>
</body>
</html>
