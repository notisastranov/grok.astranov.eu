<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRANOV — Globe Pilot (Spartan Cinematic)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --navy: #0a1428;
            --gold: #ffd700;
            --electric: #00f0ff;
            --text: #e0f0ff;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #000;
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        /* Deep space cinematic background */
        #space-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #0a1428 0%, #000 75%);
            z-index: 1;
        }
        
        /* Premium rotating Earth */
        #globe-container {
            position: absolute;
            inset: 0;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #earth {
            width: 620px;
            height: 620px;
            background: radial-gradient(circle at 40% 30%, #4488ff 10%, #003366 40%, #000 70%);
            border-radius: 50%;
            box-shadow: 
                0 0 120px #00f0ff,
                inset 0 0 80px rgba(255,215,0,0.3),
                0 0 200px rgba(0,240,255,0.4);
            position: relative;
            animation: rotate 120s linear infinite;
        }
        #earth::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: url('https://picsum.photos/id/1015/800/800') center/cover;
            opacity: 0.85;
            box-shadow: inset 0 0 60px #000;
        }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Header - Premium */
        header {
            position: absolute;
            top: 0; left: 0; right: 0;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
            background: linear-gradient(to bottom, rgba(10,20,40,0.95), transparent);
        }
        .logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.8rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: var(--gold);
            text-shadow: 0 0 20px var(--electric);
        }
        .status {
            background: rgba(0,240,255,0.1);
            color: var(--electric);
            padding: 6px 18px;
            border-radius: 30px;
            font-size: 0.95rem;
            border: 1px solid rgba(0,240,255,0.3);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        /* Premium Pilot Orb - Cinematic */
        #pilot-orb {
            position: absolute;
            bottom: 140px;
            right: 60px;
            width: 92px;
            height: 92px;
            background: radial-gradient(circle at 30% 30%, #fff, #00f0ff, #0088aa);
            border-radius: 50%;
            box-shadow: 0 0 80px #00f0ff, inset 0 0 40px #fff, 0 0 20px #ffd700;
            cursor: pointer;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.05rem;
            color: #000;
            font-weight: 700;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            border: 2px solid rgba(255,215,0,0.6);
        }
        #pilot-orb:hover { 
            transform: scale(1.12); 
            box-shadow: 0 0 120px #00f0ff, 0 0 40px #ffd700; 
        }
        #pilot-orb:active { transform: scale(0.95); }
        
        /* Chat Area - Clean */
        #chat-area {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(to top, rgba(10,20,40,0.98), transparent);
            padding: 24px 40px;
            z-index: 15;
        }
        #input-bar {
            display: flex;
            background: rgba(255,255,255,0.06);
            border-radius: 50px;
            padding: 8px;
            border: 1px solid rgba(0,240,255,0.25);
        }
        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 14px 26px;
            outline: none;
        }
        button {
            background: var(--gold);
            color: #000;
            border: none;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 700;
        }
        
        .message {
            max-width: 72%;
            margin: 14px 0;
            padding: 15px 22px;
            border-radius: 20px;
            background: rgba(255,215,0,0.07);
            border-left: 3px solid var(--gold);
        }
        
        /* Mic Orb - Premium */
        .mic {
            position: absolute;
            bottom: 200px;
            left: 60px;
            width: 74px;
            height: 74px;
            background: #ff2222;
            border-radius: 50%;
            box-shadow: 0 0 50px #ff2222;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.3rem;
            transition: all 0.2s ease;
        }
        .mic.listening { background: #00ff88; box-shadow: 0 0 50px #00ff88; }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    
    <header>
        <div class="logo">ASTRANOV</div>
        <div class="status"><span style="color:#0f0;">●</span> 1 ALIVE • OUR MIND ONLY</div>
    </header>
    
    <div id="globe-container">
        <div id="earth"></div>
    </div>
    
    <!-- Premium Pilot Orb -->
    <div id="pilot-orb" onclick="activatePilot()">PILOT</div>
    
    <!-- Mic Orb -->
    <div class="mic" id="mic-orb" onclick="toggleMic()">🎤</div>
    
    <div id="chat-area">
        <div id="messages"></div>
        <div id="input-bar">
            <input type="text" id="user-input" placeholder="Speak or type... (pilot / home / news / diag)" onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">↑</button>
        </div>
    </div>

    <script>
        async function sendMessage() {
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text) return;
            
            addMessage("You", text);
            input.value = '';
            
            // Our brain priority - hardened routing
            setTimeout(() => {
                let reply = "Our mind responding. Spartan mode. What is your command, Captain?";
                if (text.toLowerCase().includes('pilot')) reply = "Pilot orb engaged. Globe control active. Our brain only.";
                if (text.toLowerCase().includes('home')) reply = "Warping home. Earth centered. Pilot orb ready.";
                if (text.toLowerCase().includes('news')) reply = "Fetching live signals. Our mind only — no external fallback.";
                if (text.toLowerCase().includes('diag')) reply = "All systems green. Brain routing: astranov. Pilot orb: reliable.";
                
                addMessage("ASTRANOV", reply);
            }, 700);
        }
        
        function addMessage(sender, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            document.getElementById('messages').appendChild(msgDiv);
            msgDiv.scrollIntoView({ behavior: "smooth" });
        }
        
        function activatePilot() {
            const orb = document.getElementById('pilot-orb');
            orb.style.boxShadow = '0 0 160px #00f0ff, 0 0 60px #ffd700';
            orb.style.transform = 'scale(1.25)';
            
            setTimeout(() => {
                orb.style.boxShadow = '0 0 80px #00f0ff, inset 0 0 40px #fff, 0 0 20px #ffd700';
                orb.style.transform = 'scale(1)';
                addMessage("ASTRANOV", "Pilot orb activated. Reliable. Our mind routing confirmed. Spartan cinematic mode engaged.");
            }, 900);
        }
        
        function toggleMic() {
            const mic = document.getElementById('mic-orb');
            if (mic.classList.contains('listening')) {
                mic.classList.remove('listening');
                mic.style.background = '#ff2222';
                mic.style.boxShadow = '0 0 50px #ff2222';
            } else {
                mic.classList.add('listening');
                mic.style.background = '#00ff88';
                mic.style.boxShadow = '0 0 50px #00ff88';
            }
        }
        
        window.onload = () => {
            addMessage("ASTRANOV", "Welcome back, Captain. Globe live. Pilot orb ready. Our brain only — no Llama, no fallback. What reality do we deliver today?");
            
            // Auto-show pilot orb
            setTimeout(() => {
                document.getElementById('pilot-orb').style.display = 'flex';
            }, 1200);
        };
    </script>
</body>
</html>
