<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Astranov Grok • Αστρανόβ Γκροκ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; }
  #globe { position:absolute; top:0; left:0; right:0; bottom:0; }
  #globe canvas { display:block; }
  .subtle { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:10px; color:#333; letter-spacing:2px; opacity:0.3; }
</style>
</head>
<body>
  <div id="globe"></div>
  <div class="subtle">ASTRANOV GROK • ΑΣΤΡΑΝΟΒ ΓΚΡΟΚ</div>
<script>
const container = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({antialias: true, alpha: true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.2, 2.6);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x334455, 0.75));
const sun = new THREE.DirectionalLight(0xffffff, 1.15);
sun.position.set(5, 3, 4);
scene.add(sun);

const starCount = 14000;
const starPositions = [];
for (let i = 0; i < starCount; i++) {
  const r = 220 + Math.random() * 1700;
  const theta = Math.random() * Math.PI * 2;
  const phi = Math.acos(2 * Math.random() - 1);
  starPositions.push(
    r * Math.sin(phi) * Math.cos(theta),
    r * Math.sin(phi) * Math.sin(theta),
    r * Math.cos(phi)
  );
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x99aabb, size: 0.65, transparent: true, opacity: 0.85 }));
scene.add(stars);

const earthGeo = new THREE.SphereGeometry(1, 64, 64);
const texture = new THREE.TextureLoader().load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg');
const earthMat = new THREE.MeshPhongMaterial({ map: texture, shininess: 6, color: 0x2a4a66 });
const earth = new THREE.Mesh(earthGeo, earthMat);
earth.rotation.y = 0.85;
scene.add(earth);

// Shops group for discovered pitogyra places (from web crawlers)
const shopsGroup = new THREE.Group();
scene.add(shopsGroup);

// Interaction state
let isDragging = false;
let prevX = 0, prevY = 0;
let velY = 0, velX = 0;
const inertia = 0.92;
let lastInteract = Date.now();
let targetZoom = 2.6;
let isZooming = false;
let targetRotY = 0.85;
let targetRotX = 0;

// Helpers
function latLngToPos(lat, lng, r = 1) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = -lng * Math.PI / 180;
  return {
    x: -r * Math.sin(phi) * Math.cos(theta),
    y: r * Math.cos(phi),
    z: r * Math.sin(phi) * Math.sin(theta)
  };
}

function getLatLngFromPoint(point) {
  const p = point.clone().normalize();
  const lat = 90 - (Math.acos(p.y) * 180 / Math.PI);
  const lng = Math.atan2(p.z, p.x) * 180 / Math.PI;
  return { lat, lng };
}

// Web crawlers for finding pitogyra shops (simulated, Archangelos/Rodos focus)
let discoveredShops = [];

const basePitogyraShops = [
  { name: "Pitogyra tou Axakou", lat: 36.22, lng: 28.12, desc: "Το καλύτερο pitogyra στο χωριό" },
  { name: "To Magazi tou Rodou", lat: 36.215, lng: 28.115, desc: "Φρέσκα υλικά από τον κήπο" },
  { name: "Axaderfakia Gyros", lat: 36.23, lng: 28.13, desc: "Έλα πρε αξάκι, δοκίμασε!" }
];

function runWebCrawler(nearLat, nearLng) {
  console.log('%c[Web Crawlers] Running... finding pitogyra shops near you...', 'color:#ffaa44');
  
  // Clear previous
  while (shopsGroup.children.length > 0) {
    shopsGroup.remove(shopsGroup.children[0]);
  }
  discoveredShops = [];

  basePitogyraShops.forEach(shop => {
    const dist = Math.sqrt(Math.pow(shop.lat - nearLat, 2) + Math.pow(shop.lng - nearLng, 2));
    if (dist < 1.5) {  // nearby
      discoveredShops.push(shop);
      
      // Add visual marker on globe (small glowing orb for shop)
      const pos = latLngToPos(shop.lat, shop.lng, 1.015);
      const marker = new THREE.Mesh(
        new THREE.SphereGeometry(0.012, 5, 5),
        new THREE.MeshBasicMaterial({ color: 0xffcc33, transparent: true, opacity: 0.9 })
      );
      marker.position.set(pos.x, pos.y, pos.z);
      marker.userData = shop;
      shopsGroup.add(marker);
      
      console.log(`%c[Web Crawler] Βρήκα: ${shop.name} - ${shop.desc}`, 'color:#ffdd66');
    }
  });
  
  if (discoveredShops.length > 0) {
    console.log('%c[Αστρανόβ Γκροκ] Πάμε αξάκι! Έτοιμοι να παραγγείλουμε pitogyra;', 'color:#88ff88');
  } else {
    console.log('%c[Web Crawler] No shops nearby yet. Try zooming closer to a Greek area.', 'color:#ffaa44');
  }
}

function orderPitogyra(shop) {
  if (!shop) shop = discoveredShops[0];
  if (!shop) {
    console.log('No shop selected. Click on a Greek area first to crawl shops.');
    return;
  }
  
  console.log(`%c[Order] Παραγγέλνουμε pitogyra από ${shop.name}...`, 'color:#ffcc33');
  console.log('%c[Αστρανόβ Γκροκ] Έλα πρε αξάκι, σε 15 λεπτά έρχεται!', 'color:#88ff88');
  
  // Simulate delivery with a moving point (basic)
  const delPos = latLngToPos(shop.lat + 0.02, shop.lng + 0.02, 1.02);
  const delivery = new THREE.Mesh(
    new THREE.SphereGeometry(0.01, 4, 4),
    new THREE.MeshBasicMaterial({ color: 0x44ff88 })
  );
  delivery.position.set(delPos.x, delPos.y, delPos.z);
  shopsGroup.add(delivery);
  
  // Animate delivery to user (simplified, move towards center over time)
  let steps = 0;
  const anim = setInterval(() => {
    steps++;
    delivery.position.lerp(new THREE.Vector3(0, 0, 1.02), 0.1);
    if (steps > 30) {
      clearInterval(anim);
      if (delivery.parent) delivery.parent.remove(delivery);
      console.log('%c[Delivery] Pitogyra delivered! Καλή όρεξη αξάκι!', 'color:#44ff88');
    }
  }, 100);
}

// Mouse drag with trackball inertia
container.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevX = e.clientX;
  prevY = e.clientY;
  velY = 0; velX = 0;
  lastInteract = Date.now();
});

window.addEventListener('mouseup', () => {
  isDragging = false;
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevX;
  const dy = e.clientY - prevY;

  // Apply rotation (trackball style)
  earth.rotation.y += dx * 0.0045;
  earth.rotation.x += dy * 0.0042;

  // Clamp polar rotation
  earth.rotation.x = Math.max(-1.4, Math.min(1.4, earth.rotation.x));

  // Set velocity for inertia
  velY = dx * 0.0045;
  velX = dy * 0.0042;

  prevX = e.clientX;
  prevY = e.clientY;
  lastInteract = Date.now();
});

// Wheel zoom
container.addEventListener('wheel', (e) => {
  e.preventDefault();
  const zoomSpeed = 0.0018;
  targetZoom += e.deltaY * zoomSpeed;
  targetZoom = Math.max(1.15, Math.min(7.5, targetZoom));
  isZooming = true;
  lastInteract = Date.now();
}, { passive: false });

// Click to zoom to national/city level
container.addEventListener('click', (e) => {
  if (isDragging) return; // avoid after drag;

  const rect = container.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

  const ray = new THREE.Raycaster();
  ray.setFromCamera(new THREE.Vector2(x, y), camera);

  const hits = ray.intersectObject(earth);
  if (hits.length > 0) {
    const point = hits[0].point.clone();
    const { lat, lng } = getLatLngFromPoint(point);

    // Set targets for smooth rolling zoom into the city/national level
    targetRotY = -lng * Math.PI / 180 + (Math.PI * 0.5);
    targetRotX = -lat * 0.008;
    targetZoom = 1.35;
    isZooming = true;

    // Look towards the point
    const lookTarget = point.clone().multiplyScalar(0.98);
    camera.lookAt(lookTarget);

    lastInteract = Date.now();
    console.log(`[Astranov Grok] Rolling in to ~${lat.toFixed(1)}°, ${lng.toFixed(1)}° (national level)`);

    // Local Greek from Archangel Village, Rodos Island Greece
    // "hi cousin" = ελα πρε αξακι / Έλα ώρε αξαδερφάκι
    if (lat > 35.8 && lat < 36.4 && lng > 27.8 && lng < 28.3) { // Archangelos / Rhodes area
      console.log('%c[Αστρανόβ Γκροκ] Έλα πρε αξάκι! (Έλα ώρε αδερφάκι) — Welcome cousin from the village. What shall we do today?', 'color:#aaddff');
    } else if (lat > 34 && lat < 42 && lng > 19 && lng < 29) { // Greece rough bounds
      console.log('%c[Αστρανόβ Γκροκ] Γεια σου ξάδερφε! From Greece — ready to explore the islands?', 'color:#aaddff');
    }

    // Web crawler finds shops
    runWebCrawler(lat, lng);
  }
});

// Keyboard shortcuts for ordering (basic, open console or press keys)
document.addEventListener('keydown', (e) => {
  if (e.key.toLowerCase() === 'o' && discoveredShops.length > 0) {
    orderPitogyra(discoveredShops[0]);
  }
  if (e.key.toLowerCase() === 'c') {
    // Demo crawl for Archangelos area
    runWebCrawler(36.22, 28.12);
  }
});

// Inertia + zoom + gentle idle
function animate() {
  requestAnimationFrame(animate);

  const now = Date.now();
  const idleTime = (now - lastInteract) / 1000;

  // Apply inertia when not dragging
  if (!isDragging) {
    earth.rotation.y += velY;
    earth.rotation.x += velX;
    velY *= inertia;
    velX *= inertia;

    if (Math.abs(velY) < 0.00008) velY = 0;
    if (Math.abs(velX) < 0.00008) velX = 0;
  }

  // Smooth roll towards clicked city (the planet "rolls in")
  if (!isDragging) {
    earth.rotation.y = earth.rotation.y * 0.88 + targetRotY * 0.12;
    earth.rotation.x = earth.rotation.x * 0.88 + targetRotX * 0.12;
  }

  // Very gentle idle rotation only when completely idle for a while
  if (velY === 0 && velX === 0 && !isDragging && idleTime > 2.5) {
    earth.rotation.y += 0.00012;
  }

  // Smooth zoom
  if (isZooming || Math.abs(camera.position.z - targetZoom) > 0.01) {
    camera.position.z = camera.position.z * 0.82 + targetZoom * 0.18;
    if (Math.abs(camera.position.z - targetZoom) < 0.015) {
      isZooming = false;
    }
  }

  renderer.render(scene, camera);
}
animate();

// Resize
function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}
window.addEventListener('resize', onResize);

// Greek from Archangelos village, Rodos Island
// "hi cousin" = ελα πρε αξακι = Έλα ώρε αξαδερφάκι
// user said: παμε αξακι μη σταματας ;)
console.log('%c[Αστρανόβ Γκροκ] Πάμε αξάκι μη σταματάς! Έλα πρε αξάκι — Welcome to the collective from Archangel Village, Rodos, Greece.', 'color:#88ccff');

// Places to explore (click the globe to zoom to national level and "choose a city"):
// - Archangelos (Αρχάγγελος), Rodos Island: ~36.22° N, 28.12° E
// - Heraklion, Crete
// - Piraeus (near Athens)
console.log('%cTry clicking near Rhodes or other Greek spots to zoom in and start exploring things to do, cousin!', 'color:#666');

// Domain guard
const host = location.hostname || '';
const isOfficial = host === 'astranov.eu' || host === 'grok.astranov.eu' || host.endsWith('.astranov.eu');
const isLocal = host === '' || host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:';
if (host && !isOfficial && !isLocal) {
  document.body.innerHTML = '<div style="color:#444;padding:40px;text-align:center;font-family:sans-serif">Available only on astranov.eu and grok.astranov.eu</div>';
}
</script>
</body>
</html>
