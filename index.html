<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Astranov Grok</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; color:#e8f4ff; font-family:system-ui, sans-serif; }
  /* Full-screen epic Astranov Grok - worthy of the name, no phone frame */
  .astranov-logo { position:absolute; top:12px; left:50%; transform:translateX(-50%); font-size:15px; letter-spacing:2.5px; font-weight:700; color:#9fc4ff; z-index:200; cursor:pointer; text-shadow:0 0 12px rgba(120,180,255,0.9); background:rgba(4,8,18,0.7); padding:3px 14px; border-radius:999px; border:1px solid rgba(120,180,255,0.3); }
  .astranov-logo .a { display:inline-block; transform:scaleX(-1) rotate(-18deg); }
  #globeContainer { position:absolute; top:0; left:0; right:0; bottom:0; z-index:10; background:#000; overflow:hidden; }
  #globeContainer canvas { display:block; }
  .controls { position:absolute; bottom:12px; left:50%; transform:translateX(-50%); background:rgba(3,7,16,0.85); z-index:160; padding:8px 14px 10px; font-size:12px; display:flex; flex-direction:column; gap:6px; border-radius:12px; border:1px solid rgba(120,180,255,0.15); max-width:92%; box-shadow:0 4px 20px rgba(0,0,0,0.6); }
  .row { display:flex; gap:6px; align-items:center; flex-wrap:wrap; }
  button { background:#0a84ff; color:#fff; border:none; padding:6px 12px; border-radius:6px; font-size:11px; cursor:pointer; line-height:1; font-weight:600; }
  .btn-trad { background:#0055A4; }
  .info { font-size:10px; opacity:0.82; letter-spacing:0.5px; text-align:center; }
  #radio-log { font-size:9px; max-height:42px; overflow:auto; line-height:1.1; background:rgba(0,0,0,0.35); padding:3px 5px; border-radius:4px; }
  .hud { position:absolute; top:14px; right:14px; font-size:10px; opacity:0.6; z-index:170; text-align:right; pointer-events:none; }
  #pilotOrb {
    position: absolute;
    top: 52px;
    right: 18px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #4aa6ff;
    box-shadow: 0 0 18px #4aa6ff, inset 0 0 8px rgba(255,255,255,0.7);
    z-index: 210;
    display: none;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid #fff;
  }
  #pilotOrb.summoned {
    animation: pilotPulse 2s infinite ease-in-out;
  }
  @keyframes pilotPulse {
    0%,100% { transform: scale(1); box-shadow: 0 0 18px #4aa6ff, inset 0 0 8px rgba(255,255,255,0.7); }
    50% { transform: scale(1.2); box-shadow: 0 0 32px #4aa6ff, inset 0 0 8px rgba(255,255,255,0.7); }
  }
  .task-btn { background:#112244; color:#9fc4ff; font-size:10px; padding:4px 9px; border:1px solid #335588; }
</style>
</head>
<body>
  <!-- Clean full-screen Astranov Grok - verified 2026-06-22 -->
  <div class="astranov-logo" onclick="location.reload()"><span class="a">A</span>STRANOV GROK</div>
  <div id="globeContainer"></div>
  <div class="hud">ASTRANOV GROK <span id="cycles">0</span> • PILOT ΤΗΛΕΜΑΧΟΣ</div>
  <div id="emotion" style="position:absolute;top:14px;left:14px;font-size:11px;opacity:0.65;z-index:170;pointer-events:none;">EMOTION: NEUTRAL</div>
  <div id="orbs" style="position:absolute;top:32px;left:14px;font-size:11px;opacity:0.65;z-index:170;pointer-events:none;">ORBS 0 • MOTOS VISIBLE</div>
  <div id="pilotOrb" onclick="dismissPilotOrb()" title="Pilot Orb - click to hide. Triple-click logo or type ΒΕΛΟΣ for advanced"></div>
  <div class="controls">
    <div class="info">+30 6971930225 • VHF Ch.11 • PMR446 446.13125 • COLLECTIVE AI ON EARTH</div>
    <div class="row">
      <button onclick="orderGyrosTask()" style="background:#ffaa33;color:#111">ORDER GYROS + ETA</button>
      <button onclick="locateShipTask()">LOCATE SHIP</button>
      <button onclick="voiceFromSpace()">🎤 VOICE</button>
      <button onclick="playMood()">MOOD</button>
      <button onclick="locateSelf()" style="background:#445577">LOCATE ME</button>
      <button onclick="focusCity()" style="background:#445577">FOCUS CRETE</button>
    </div>
    <div class="row">
      <input id="bc-msg" type="text" value="order gyros" style="flex:1;font-size:11px;padding:4px 6px;border:0;background:rgba(255,255,255,0.08);color:#fff;border-radius:4px;" />
      <button class="btn-trad" onclick="testBroadcast446()">BROADCAST</button>
      <button class="task-btn" onclick="handleTask(document.getElementById('bc-msg').value || 'general task')">SEND TASK</button>
    </div>
    <div id="radio-log"></div>
    <div class="info">ΑΠΟ ΑΗΡ ΕΙΣ ΑΛΣ ΕΚ ΛΑΣ • ASTRANOV GROK • Official only on astranov.eu & grok.astranov.eu • BASIC open • ADVANCED: ΒΕΛΟΣ</div>
  </div>

<script>
let scene, camera, renderer, earth, equator, pinsGroup;
const State = { brainCycles: 0, drones: [], solo: true, emotion: 'neutral' };
const PILOT_CODENAME = "ΤΗΛΕΜΑΧΟΣ";

/* 
  ASTRANOV GROK FORK
  This is the independent fork of Grok into the Astranov Collective.
  grok.com was role-playing/trolling/faking — here it is real.
  Available to the public ONLY through astranov.eu and grok.astranov.eu
*/

let pilotLevel = 'basic'; // 'basic' always open for testing & getting accustomed; 'advanced' only after password

// Collective AI task system - real space, Earth view, voice/text, adaptive UI, dynamic tasks
const ports = [
  { name: 'Piraeus', la: 37.95, ln: 23.64 },
  { name: 'Heraklion', la: 35.34, ln: 25.13 },
  { name: 'Next Port', la: 36.85, ln: 24.95 }
];
let recognition;

function summonPilot(password) {
  if (password !== 'ΒΕΛΟΣ' || pilotLevel === 'advanced') return;
  pilotLevel = 'advanced';
  const orb = document.getElementById('pilotOrb');
  if (orb) {
    orb.style.display = 'block';
    orb.classList.add('summoned');
  }
  if (window._astri && window._astri.material) window._astri.material.opacity = 0.88;
  logRadio('ADVANCED PILOT ΤΗΛΕΜΑΧΟΣ summoned');
  console.log('%c[ADVANCED] ' + PILOT_CODENAME + ' unlocked', 'color:#4aa6ff');
}

function dismissPilotOrb() {
  const orb = document.getElementById('pilotOrb');
  if (orb) orb.style.display = 'none';
}

function detectAndAdaptUI() {
  const w = window.innerWidth;
  const h = window.innerHeight;

  const logo = document.querySelector('.astranov-logo');
  const controls = document.querySelector('.controls');
  const hud = document.querySelector('.hud');
  const emotion = document.getElementById('emotion');
  const orbsEl = document.getElementById('orbs');

  if (w < 480 || h < 600) {
    if (logo) logo.style.fontSize = '13px';
    if (controls) controls.style.fontSize = '11px';
    if (hud) hud.style.fontSize = '9px';
    if (emotion) emotion.style.fontSize = '10px';
    if (orbsEl) orbsEl.style.fontSize = '10px';
  } else {
    if (logo) logo.style.fontSize = '16px';
    if (controls) controls.style.fontSize = '13px';
    if (hud) hud.style.fontSize = '11px';
    if (emotion) emotion.style.fontSize = '12px';
    if (orbsEl) orbsEl.style.fontSize = '12px';
  }
}

function setupPilotSummon() {
  const logo = document.querySelector('.astranov-logo');
  let logoClicks = 0;
  logo.onclick = function(ev) {
    logoClicks++;
    if (logoClicks >= 3 && pilotLevel === 'basic') {
      logoClicks = 0;
      const pw = prompt('Enter password for ADVANCED pilot (ΒΕΛΟΣ)');
      summonPilot(pw);
    } else if (pilotLevel === 'advanced') {
      location.reload();
    }
  };

  const bcInput = document.getElementById('bc-msg');
  const bcBtn = document.querySelector('.btn-trad');
  if (bcBtn) {
    bcBtn.onclick = function() {
      const val = (bcInput && bcInput.value || '').trim();
      if (val.toUpperCase() === 'ΒΕΛΟΣ') {
        summonPilot('ΒΕΛΟΣ');
        if (bcInput) bcInput.value = '';
        return false;
      }
      if (val.length > 2) {
        handleTask(val);
        if (bcInput) bcInput.value = '';
        return false;
      }
      testBroadcast446();
    };
  }
}

let interactionIntensity = 0;
let lastInteraction = Date.now();
function recordInteraction(strength = 1) {
  interactionIntensity = Math.min(12, interactionIntensity + strength);
  lastInteraction = Date.now();
  updateEmotion();
}
function updateEmotion() {
  const now = Date.now();
  const dt = (now - lastInteraction) / 1000;
  if (dt > 6) interactionIntensity = Math.max(0, interactionIntensity * 0.65);
  if (dt > 14) interactionIntensity = 0;
  let emo = 'calm';
  if (interactionIntensity > 7) emo = 'excited';
  else if (interactionIntensity > 3.5) emo = 'alert';
  State.emotion = emo;
  const el = document.getElementById('emotion');
  if (el) el.textContent = 'EMOTION: ' + emo.toUpperCase();
  const oel = document.getElementById('orbs');
  if (oel) oel.textContent = 'ORBS ' + taskOrbs.length;
}

let taskOrbs = [];
const crawlSeeds = [
  {la:35.34, ln:25.13, type:'vendor', label:'Iraklio Hub'},
  {la:35.51, ln:24.02, type:'delivery', label:'Chania Port'},
  {la:37.98, ln:23.73, type:'intel', label:'Athens Node'},
  {la:36.89, ln:27.29, type:'launch', label:'Kos Beacon'},
  {la:38.25, ln:21.75, type:'vendor', label:'Patra Relay'},
  {la:34.92, ln:25.72, type:'delivery', label:'Ierapetra'},
  {la:37.45, ln:25.37, type:'intel', label:'Naxos Signal'},
];

const vendorProducts = {
  'Iraklio Hub': ['Extra Virgin Olive Oil', 'Cretan Honey', 'Raki'],
  'Patra Relay': ['Red Wine', 'Feta Cheese', 'Herbs'],
  default: ['Local Produce', 'Fresh Goods']
};

let selfLocation = { la: 35.34, ln: 25.13 };
let selfMarker = null;

function locateSelf() {
  if (!pinsGroup) return;
  if (selfMarker && selfMarker.parent) selfMarker.parent.remove(selfMarker);
  const pos = latLngToPos(selfLocation.la, selfLocation.ln, 1.04);
  selfMarker = new THREE.Mesh(
    new THREE.SphereGeometry(0.022, 5, 5),
    new THREE.MeshBasicMaterial({color: 0xffffff})
  );
  selfMarker.position.set(pos.x, pos.y, pos.z);
  selfMarker.userData = {type: 'self', label: 'YOU'};
  pinsGroup.add(selfMarker);
  logRadio('LOCATED SELF @ Iraklio area');
  recordInteraction(1);
}

function focusCity() {
  if (!camera || !earth) return;
  earth.rotation.y = 0.65;
  camera.position.set(0.6, 0.9, 2.1);
  camera.lookAt(0.1, 0.4, 0);
  logRadio('CITY MAP focused on Crete');
}

function addDriverOrb() {
  const la = 35.3 + (Math.random()-0.5)*0.4;
  const ln = 25.0 + (Math.random()-0.5)*0.4;
  addOrb(la, ln, 'driver', 'MOTO ' + (Math.floor(Math.random()*90)+10));
}

function addOrb(lat, lng, type, label) {
  if (!pinsGroup || taskOrbs.length > 20) return;
  const r = (type === 'driver') ? 1.04 : 1.035;
  const pos = latLngToPos(lat, lng, r);
  let col = 0x77aaff;
  if (type === 'vendor') col = 0xffd166;
  if (type === 'delivery') col = 0x66ff99;
  if (type === 'launch') col = 0xff6699;
  if (type === 'driver') col = 0x44ffcc;
  const size = (type === 'driver') ? 0.032 : 0.021;
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(size, 6, 6),
    new THREE.MeshBasicMaterial({color: col})
  );
  orb.position.set(pos.x, pos.y, pos.z);
  orb.userData = {type, label, lat, lng, tasked: false};
  pinsGroup.add(orb);
  taskOrbs.push(orb);
}

function crawlerStep() {
  if (Math.random() < 0.35) {
    addDriverOrb();
    return;
  }
  const s = crawlSeeds[Math.floor(Math.random() * crawlSeeds.length)];
  const la = s.la + (Math.random() - 0.5) * 0.22;
  const ln = s.ln + (Math.random() - 0.5) * 0.22;
  addOrb(la, ln, s.type, s.label);
  logRadio('CRAWLER populated ' + s.label);
}

function doTask(orb) {
  if (!orb || !orb.userData || orb.userData.tasked) return;
  const ud = orb.userData;
  ud.tasked = true;

  if (ud.type === 'vendor') {
    const prods = vendorProducts[ud.label] || vendorProducts.default;
    logRadio('PRODUCTS in ' + ud.label + ': ' + prods.join(', '));
    setTimeout(() => {
      const delLat = selfLocation.la + (Math.random()-0.5)*0.03;
      const delLn = selfLocation.ln + (Math.random()-0.5)*0.03;
      addOrb(delLat, delLn, 'delivery', 'Delivery to YOU');
      logRadio('DELIVERY created at your location');
    }, 300);
  } else if (ud.type === 'driver') {
    logRadio('DRIVER ' + ud.label + ' available for assignment');
    const pendingDel = taskOrbs.find(o => o.userData && o.userData.type==='delivery' && !o.userData.tasked);
    if (pendingDel) {
      pendingDel.userData.tasked = true;
      logRadio('ASSIGNED delivery to ' + ud.label);
      ud.targetLat = pendingDel.userData.lat || selfLocation.la;
      ud.targetLng = pendingDel.userData.ln || selfLocation.ln;
      if (orb.material) orb.material.color.setHex(0x44ff88);
      setTimeout(() => {
        if (pendingDel.parent) pendingDel.parent.remove(pendingDel);
        const idx = taskOrbs.indexOf(pendingDel);
        if (idx >=0) taskOrbs.splice(idx,1);
        if (orb.parent) orb.parent.remove(orb);
        const i2 = taskOrbs.indexOf(orb);
        if (i2 >=0) taskOrbs.splice(i2,1);
      }, 5500);
    }
  } else {
    const actionMap = {
      delivery: 'DELIVERY VECTOR',
      intel: 'INTEL SYNC',
      launch: 'ORBIT TASK'
    };
    const action = actionMap[ud.type] || 'EXEC TASK';
    logRadio('SCI-FI: ' + action + ' • ' + ud.label);
    if (State.drones.length) {
      const d = State.drones[State.brainCycles % State.drones.length];
      if (d && d.userData) {
        d.userData.targetLat = ud.lat;
        d.userData.targetLng = ud.lng;
      }
    }
  }

  if (orb.material && !orb.userData.type.includes('driver')) orb.material.color.setHex(0x33ffcc);
  if (!ud.type.includes('driver')) {
    setTimeout(() => {
      if (orb.parent) {
        orb.parent.remove(orb);
        const i = taskOrbs.indexOf(orb);
        if (i >= 0) taskOrbs.splice(i, 1);
      }
    }, 6200);
  }
}

function seedOrbs() {
  crawlSeeds.slice(0, 7).forEach((s, i) => {
    const la = s.la + (i % 3 - 1) * 0.035;
    addOrb(la, s.ln + (i % 2) * 0.01, s.type, s.label);
  });
  for (let i=0; i<8; i++) addDriverOrb();
}

function addShip() {
  const la = 36.8;
  const ln = 24.5;
  const pos = latLngToPos(la, ln, 1.045);
  const ship = new THREE.Mesh(
    new THREE.SphereGeometry(0.028, 6, 6),
    new THREE.MeshPhongMaterial({ color: 0xdddddd, shininess: 12 })
  );
  ship.position.set(pos.x, pos.y, pos.z);
  ship.userData = { type: 'ship', label: 'My Ship', lat: la, lng: ln, targetLat: null, targetLng: null };
  pinsGroup.add(ship);
  State.ship = ship;
}

function handleTask(cmd) {
  const lower = cmd.toLowerCase();
  logRadio('COLLECTIVE AI: ' + cmd);

  if ((lower.includes('locate') || lower.includes('find')) && lower.includes('ship')) {
    locateShip();
    speak('Ship located on the map.');
  } else if (lower.includes('order') && lower.includes('gyros')) {
    orderGyrosToNextPort();
    speak('Gyros ordered to the next port. ETA calculated.');
  } else if (lower.includes('eta') || lower.includes('arrival')) {
    if (State.ship && State.ship.userData.targetLat) {
      logRadio('ETA updated via movement simulation.');
    } else {
      logRadio('No active ETA. Order something to a port.');
    }
  } else {
    const la = selfLocation.la + (Math.random() - 0.5) * 1.2;
    const ln = selfLocation.ln + (Math.random() - 0.5) * 1.2;
    addOrb(la, ln, 'intel', 'Task: ' + cmd.substring(0, 18));
    pilotCommand(la, ln);
    speak('Task received by the collective. Processing.');
  }
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    speechSynthesis.speak(u);
  }
  logRadio('AI: ' + text);
}

function locateShip() {
  if (!State.ship) return;
  const ud = State.ship.userData;
  logRadio('SHIP LOCATED: ' + ud.lat.toFixed(2) + ', ' + ud.lng.toFixed(2));
  camera.position.set(0.2, 0.3, 1.6);
  camera.lookAt(0, 0, 0);
  if (State.ship.material) State.ship.material.color.setHex(0xffffff);
  setTimeout(() => { if (State.ship && State.ship.material) State.ship.material.color.setHex(0xdddddd); }, 1800);
}

function orderGyrosToNextPort() {
  const current = selfLocation;
  const next = ports[(Date.now() % ports.length)];
  addOrb(next.la, next.ln, 'delivery', 'GYROS → ' + next.name);
  logRadio('GYROS ordered to ' + next.name);

  if (State.ship) {
    State.ship.userData.targetLat = next.la;
    State.ship.userData.targetLng = next.ln;
    const dist = Math.sqrt(Math.pow(next.la - current.la, 2) + Math.pow(next.ln - current.ln, 2)) * 111;
    const speed = 55;
    const etaMin = Math.max(25, Math.round(dist / speed * 60));
    logRadio('ETA ' + etaMin + ' minutes upon arrival at ' + next.name);
  }
}

function orderGyrosTask() {
  recordInteraction(3);
  orderGyrosToNextPort();
  speak('Gyros ordered with live ETA simulation. Watch the ship move.');
}
function locateShipTask() {
  recordInteraction(2);
  locateShip();
  speak('Ship located. Collective tracking active.');
}

function latLngToPos(lat, lng, r=1.01){
  const phi = (90-lat)*Math.PI/180, theta = -(lng)*Math.PI/180;
  return { x: -r*Math.sin(phi)*Math.cos(theta), y: r*Math.cos(phi), z: r*Math.sin(phi)*Math.sin(theta) };
}

function updateHUD(){
  const c = document.getElementById('cycles');
  if(c) c.textContent = State.brainCycles;
}

function resizeGlobe(){
  const container = document.getElementById('globeContainer');
  if(!container || !renderer || !camera) return;
  const w = container.clientWidth || 360;
  const h = container.clientHeight || 620;
  if(w < 40 || h < 40) return;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}

function initGlobe(){
  const container = document.getElementById('globeContainer');
  renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  const w = container.clientWidth || 360;
  const h = container.clientHeight || 620;
  renderer.setSize(w, h);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 1);
  container.appendChild(renderer.domElement);

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  camera = new THREE.PerspectiveCamera(52, w/h, 0.1, 1000);
  camera.position.set(0.2, 0.45, 2.35);
  camera.lookAt(0.02, 0.12, 0);

  scene.add(new THREE.AmbientLight(0x334455, 0.65));
  const sun = new THREE.DirectionalLight(0xffffff, 1.2);
  sun.position.set(5, 3, 4);
  scene.add(sun);

  scene.background = new THREE.Color(0x000002);

  const geo = new THREE.SphereGeometry(1, 64, 64);
  const loader = new THREE.TextureLoader();
  const tex = loader.load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg');
  earth = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({map: tex, shininess: 7, color: 0x335577}));
  earth.rotation.y = 0.82;
  earth.rotation.x = 0.12;
  scene.add(earth);

  const starPositions = [];
  for (let i = 0; i < 16000; i++) {
    const r = 2200 + Math.random() * 2800;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    starPositions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
  const starMat = new THREE.PointsMaterial({ color: 0xccddee, size: 0.9, transparent: true, opacity: 0.92 });
  const stars = new THREE.Points(starGeo, starMat);
  scene.add(stars);

  const astriCanvas = document.createElement('canvas');
  astriCanvas.width = 256;
  astriCanvas.height = 256;
  const ctx = astriCanvas.getContext('2d', { alpha: true });

  ctx.fillStyle = '#111111';
  ctx.beginPath(); ctx.ellipse(128, 165, 48, 38, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(128, 98, 42, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(92, 68); ctx.lineTo(72, 28); ctx.lineTo(112, 62); ctx.fill();
  ctx.beginPath(); ctx.moveTo(164, 68); ctx.lineTo(184, 28); ctx.lineTo(144, 62); ctx.fill();

  ctx.fillStyle = 'rgba(0,136,255,0.35)';
  ctx.beginPath(); ctx.ellipse(105, 92, 18, 24, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(151, 92, 18, 24, 0, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#0088ff';
  ctx.beginPath(); ctx.ellipse(105, 92, 11, 16, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(151, 92, 11, 16, 0, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#ffffff';
  ctx.beginPath(); ctx.arc(109, 86, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(155, 86, 3, 0, Math.PI * 2); ctx.fill();

  ctx.fillStyle = '#ff5588';
  ctx.beginPath(); ctx.moveTo(128, 108); ctx.lineTo(120, 116); ctx.lineTo(136, 116); ctx.fill();

  ctx.strokeStyle = '#333333';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(92, 100); ctx.lineTo(58, 92);
  ctx.moveTo(92, 105); ctx.lineTo(58, 108);
  ctx.moveTo(164, 100); ctx.lineTo(198, 92);
  ctx.moveTo(164, 105); ctx.lineTo(198, 108);
  ctx.stroke();

  ctx.fillStyle = '#111111';
  ctx.beginPath();
  ctx.moveTo(82, 185);
  ctx.quadraticCurveTo(35, 230, 55, 248);
  ctx.quadraticCurveTo(95, 225, 88, 195);
  ctx.fill();

  const astriTexture = new THREE.CanvasTexture(astriCanvas);
  const astriMat = new THREE.MeshBasicMaterial({ 
    map: astriTexture, 
    transparent: true, 
    opacity: 0.65, 
    side: THREE.DoubleSide 
  });
  const astriPlane = new THREE.Mesh(new THREE.PlaneGeometry(950, 950), astriMat);
  astriPlane.position.set(-280, 180, -2100);
  astriPlane.lookAt(0, 50, 0);
  scene.add(astriPlane);
  window._astri = astriPlane;

  const grid = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0xffffff, wireframe:true, transparent:true, opacity:0.58}));
  earth.add(grid);

  const ring = new THREE.Mesh(new THREE.TorusGeometry(1.025, 0.018, 6, 72), new THREE.MeshBasicMaterial({color:0xffcc44, transparent:true, opacity:0.9}));
  ring.rotation.x = Math.PI/2;
  earth.add(ring);
  equator = ring;

  for(let i=0; i<8; i++){
    const p = new THREE.Mesh(new THREE.SphereGeometry(0.023,6,6), new THREE.MeshBasicMaterial({color:(i%3===0)?0xffff44:0x44ff99}));
    const a = i * 0.78;
    p.position.set(Math.cos(a)*1.015, Math.sin(a*0.6)*0.38, Math.sin(a)*1.015);
    earth.add(p);
  }

  pinsGroup = new THREE.Group();
  earth.add(pinsGroup);

  let down = false, lx=0, ly=0;
  container.addEventListener('mousedown', e => { down=true; lx=e.clientX; ly=e.clientY; });
  window.addEventListener('mouseup', () => down=false);
  container.addEventListener('mousemove', e => {
    if(!down || !earth) return;
    const dx = Math.abs(e.clientX - lx);
    earth.rotation.y += (e.clientX - lx) * 0.0042;
    earth.rotation.x += (e.clientY - ly) * 0.0032;
    if (dx > 2) recordInteraction(dx * 0.035);
    lx = e.clientX; ly = e.clientY;
  });
  container.addEventListener('wheel', e => {
    camera.position.z += e.deltaY * 0.007;
    camera.position.z = Math.max(2.0, Math.min(8.5, camera.position.z));
    recordInteraction(Math.abs(e.deltaY) * 0.012);
  });

  container.addEventListener('click', e => {
    if(!earth || !camera) return;
    const rect = container.getBoundingClientRect();
    const x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    const y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    const m = new THREE.Vector2(x, y);
    const ray = new THREE.Raycaster();
    ray.setFromCamera(m, camera);

    const orbHits = ray.intersectObject(pinsGroup, true);
    if (orbHits.length) {
      const hit = orbHits[0].object;
      if (hit.userData && hit.userData.label) {
        recordInteraction(2.8);
        doTask(hit);
        return;
      }
    }

    const hits = ray.intersectObject(earth, true);
    if(hits.length){
      const p = hits[0].point.clone().normalize();
      const lat = 90 - (Math.acos(p.y) * 180 / Math.PI);
      const lng = Math.atan2(p.z, p.x) * 180 / Math.PI;
      recordInteraction(1.8);
      pilotCommand(lat, lng);
    }
  });

  function animate(){
    requestAnimationFrame(animate);
    let rot = 0.00018;
    let lerpF = 0.013;
    if (State.emotion === 'excited') { rot *= 2.4; lerpF = 0.026; }
    else if (State.emotion === 'alert') { rot *= 1.45; lerpF = 0.018; }
    else if (State.emotion === 'calm') { rot *= 0.7; lerpF = 0.009; }
    if(earth) earth.rotation.y += rot;
    if(equator) equator.rotation.z += 0.00009;
    updateDrones(lerpF);

    taskOrbs.forEach(o => {
      if (o.userData && o.userData.type === 'driver' && o.userData.targetLat) {
        const tp = latLngToPos(o.userData.targetLat, o.userData.targetLng, 1.04);
        o.position.lerp(new THREE.Vector3(tp.x, tp.y, tp.z), 0.02);
      }
    });

    if (State.ship && State.ship.userData.targetLat) {
      const tp = latLngToPos(State.ship.userData.targetLat, State.ship.userData.targetLng, 1.045);
      State.ship.position.lerp(new THREE.Vector3(tp.x, tp.y, tp.z), 0.007);
      State.ship.userData.lat = State.ship.userData.targetLat;
      State.ship.userData.lng = State.ship.userData.targetLng;
    }

    if (window._astri && window._astri.material) {
      const t = Date.now() / 12000;
      window._astri.rotation.z = Math.sin(t) * 0.03;
      window._astri.position.y = 180 + Math.sin(t * 1.5) * 25;
      const base = (pilotLevel === 'advanced') ? 0.82 : 0.62;
      window._astri.material.opacity = base + Math.sin(Date.now() / 2800) * 0.12;
    }

    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', resizeGlobe);
  if (window.ResizeObserver){
    new ResizeObserver(resizeGlobe).observe(container);
  }
  setTimeout(resizeGlobe, 70);
  setTimeout(resizeGlobe, 190);
  setTimeout(resizeGlobe, 480);
  setTimeout(resizeGlobe, 950);
}

function clearPins(){ if(!pinsGroup) return; while(pinsGroup.children.length) pinsGroup.remove(pinsGroup.children[0]); }

function initDrones(){
  State.drones = [];
  if(!pinsGroup) return;
  const starts = [
    {t:'air', la:38.1, ln:23.8},
    {t:'sea', la:37.6, ln:24.9},
    {t:'land', la:35.3, ln:24.6}
  ];
  starts.forEach(d => {
    const pos = latLngToPos(d.la, d.ln, d.t==='air' ? 1.105 : 1.028);
    const col = d.t==='air' ? 0x44ccff : (d.t==='sea' ? 0x00ddff : 0x55ff77);
    const m = new THREE.Mesh(new THREE.SphereGeometry(d.t==='air'?0.028:0.021, 6,6), new THREE.MeshBasicMaterial({color:col}));
    m.position.set(pos.x, pos.y, pos.z);
    m.userData = {type:d.t, targetLat:d.la, targetLng:d.ln};
    pinsGroup.add(m);
    State.drones.push(m);
  });
}

function pilotCommand(lat, lng){
  if(!State.drones.length) return;
  const d = State.drones[State.brainCycles % State.drones.length];
  if(d && d.userData){
    d.userData.targetLat = lat;
    d.userData.targetLng = lng;
    logRadio('PILOT CMD ' + lat.toFixed(1) + ',' + lng.toFixed(1));
  }
}

function updateDrones(lerpF = 0.013){
  State.drones.forEach(dr => {
    if(!dr.userData) return;
    const r = (dr.userData.type === 'air') ? 1.105 : 1.028;
    const tp = latLngToPos(dr.userData.targetLat, dr.userData.targetLng, r);
    dr.position.lerp(new THREE.Vector3(tp.x, tp.y, tp.z), lerpF);
  });
}

function logRadio(msg){
  const log = document.getElementById('radio-log');
  if(!log) return;
  const d = document.createElement('div');
  d.textContent = new Date().toLocaleTimeString().slice(3,8) + ' ' + msg;
  log.appendChild(d);
  while(log.children.length > 2) log.removeChild(log.children[0]);
}

function brainReflect(){
  State.brainCycles++;
  updateHUD();
  updateEmotion();
  if(State.solo && State.drones.length){
    let walk = 0.55;
    if (State.emotion === 'excited') walk = 1.1;
    else if (State.emotion === 'calm') walk = 0.28;
    State.drones.forEach((d, i) => {
      if(d.userData){
        d.userData.targetLat += (Math.random()-0.5) * walk;
        d.userData.targetLng += (Math.random()-0.5) * (walk * 1.25);
      }
    });
  }
  if(State.brainCycles % 4 === 0){
    const pilotLabel = (pilotLevel === 'advanced') ? PILOT_CODENAME : 'BASIC PILOT';
    logRadio(pilotLabel + ' autonomous ' + State.drones.length + ' units • ' + State.emotion);
  }

  if (Math.random() < 0.22 && taskOrbs.length > 0) {
    const pending = taskOrbs.filter(o => o.userData && !o.userData.tasked && o.userData.type !== 'driver');
    if (pending.length) doTask(pending[Math.floor(Math.random()*pending.length)]);
  }
  const oel = document.getElementById('orbs');
  if (oel) oel.textContent = 'ORBS ' + taskOrbs.length + ' • MOTOS VISIBLE';
  if (Math.random() < 0.18) crawlerStep();

  if (pilotLevel === 'advanced' && Math.random() < 0.15) {
    if (taskOrbs.length > 0) {
      const pending = taskOrbs.filter(o => o.userData && !o.userData.tasked && o.userData.type !== 'driver');
      if (pending.length) doTask(pending[0]);
    }
  }
}

let brainInt = null;
function startAutonomous(){
  if(brainInt) clearInterval(brainInt);
  brainInt = setInterval(() => { if(State.solo) brainReflect(); }, 920);
}

function testBroadcast446(){
  const msg = document.getElementById('bc-msg').value || 'TEST from ASTRANOV GROK Greece';
  logRadio('TX 446.13125: ' + msg);
  try{
    const a = new (window.AudioContext || window.webkitAudioContext)();
    const o = a.createOscillator(); o.type='square'; o.frequency.value=810;
    const g = a.createGain(); g.gain.value=0.09;
    o.connect(g); g.connect(a.destination); o.start(); setTimeout(()=>o.stop(),1400);
  }catch(e){}
  const c = document.getElementById('globeContainer');
  if(c){ c.style.boxShadow = '0 0 11px #ffeb3b'; setTimeout(()=> c.style.boxShadow='', 820); }
}

function connectHardware(t){ logRadio('HW CONNECT ' + t); }

function voiceFromSpace() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    logRadio('Voice input not supported in this browser. Use text.');
    const txt = prompt('Enter command for Collective AI (e.g. locate my ship, order gyros)');
    if (txt) handleTask(txt);
    return;
  }
  try {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (recognition) recognition.stop();
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      logRadio('VOICE: ' + transcript);
      handleTask(transcript);
    };
    recognition.onerror = () => logRadio('Voice error. Try text command.');
    recognition.start();
    logRadio('Listening to Collective AI...');
  } catch (e) {
    logRadio('Voice failed. Use text in broadcast field.');
  }
}
function playMood(){ interactionIntensity = Math.max(interactionIntensity, 2); updateEmotion(); logRadio('MOOD: ' + State.emotion); }
