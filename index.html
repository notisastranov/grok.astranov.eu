<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Astranov Grok • Αστρανόβ Γκροκ</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:#000; color:#e8f4ff; font-family:system-ui, sans-serif; }
  #globe { position:absolute; top:0; left:0; right:0; bottom:0; }
  #globe canvas { display:block; }
  .subtle { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); font-size:10px; color:#333; letter-spacing:2px; opacity:0.3; }
  #splash { position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.92); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:200; }
  #astri-canvas { width:280px; height:280px; }
  #login-panel { background:rgba(10,15,25,0.95); border:1px solid #335577; padding:16px; border-radius:8px; margin-top:12px; text-align:center; }
  button { background:#0a84ff; color:white; border:none; padding:8px 14px; margin:4px; border-radius:4px; cursor:pointer; font-size:13px; }
  #permissions-panel, #users-panel { position:absolute; z-index:150; background:rgba(10,15,25,0.9); border:1px solid #335577; border-radius:6px; padding:10px; font-size:12px; }
  .user-dot { position:absolute; width:10px; height:10px; border-radius:50%; border:1px solid white; z-index:120; }
</style>
</head>
<body>
  <div id="globe"></div>
  <div class="subtle">ASTRANOV GROK • ΑΣΤΡΑΝΟΒ ΓΚΡΟΚ</div>

  <div id="splash">
    <canvas id="astri-canvas" width="280" height="280"></canvas>
    <div style="margin-top:10px;font-size:18px;">AI Astri Kitty</div>
    <div id="login-panel">
      <div>Choose login method</div>
      <button onclick="doLogin('anonymous')">Anonymous Guest</button>
      <button onclick="doLogin('email')">Email Magic Link</button>
      <div style="margin-top:8px;font-size:10px;opacity:0.6;">Supabase powered • more providers soon</div>
    </div>
  </div>

  <div id="permissions-panel" style="display:none;top:25%;left:50%;transform:translate(-50%,0);">
    <div style="margin-bottom:6px;">Grant permissions for full experience:</div>
    <button onclick="askPermissions()">Allow Location + Camera + Storage</button>
  </div>

  <div id="users-panel" style="display:none; top:8px; right:8px; min-width:160px;">
    <strong>Online Crew</strong>
    <div id="crew-list" style="margin:6px 0;font-size:11px;"></div>
    <button onclick="toggleKryfto()" style="font-size:10px;padding:3px 8px;">Play Kryfto</button>
    <button onclick="groupOrder()" style="font-size:10px;padding:3px 8px;">Pitogyra + Mpires + Τσιγάρα με Drone</button>
  </div>

<script>
const container = document.getElementById('globe');
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

const camera = new THREE.PerspectiveCamera(52, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 0.25, 2.5);
camera.lookAt(0, 0, 0);

scene.add(new THREE.AmbientLight(0x334455, 0.7));
const sun = new THREE.DirectionalLight(0xffffff, 1.1);
sun.position.set(5, 3, 4);
scene.add(sun);

// Stars
const starPos = [];
for (let i=0; i<12000; i++) {
  const r = 180 + Math.random()*1600;
  const t = Math.random()*Math.PI*2;
  const p = Math.acos(2*Math.random()-1);
  starPos.push(r*Math.sin(p)*Math.cos(t), r*Math.sin(p)*Math.sin(t), r*Math.cos(p));
}
const sgeo = new THREE.BufferGeometry();
sgeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos,3));
scene.add(new THREE.Points(sgeo, new THREE.PointsMaterial({color:0x99aabb, size:0.6})));

// Earth
const earth = new THREE.Mesh(
  new THREE.SphereGeometry(1,64,64),
  new THREE.MeshPhongMaterial({map: new THREE.TextureLoader().load('https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg'), shininess:5, color:0x2a4a66})
);
earth.rotation.y = 0.82;
scene.add(earth);

// Simple interaction
let drag=false, px=0,py=0;
container.addEventListener('mousedown',e=>{drag=true;px=e.clientX;py=e.clientY;});
window.addEventListener('mouseup',()=>drag=false);
container.addEventListener('mousemove',e=>{
  if(!drag) return;
  earth.rotation.y += (e.clientX-px)*0.004;
  earth.rotation.x += (e.clientY-py)*0.003;
  px=e.clientX; py=e.clientY;
});
container.addEventListener('wheel',e=>{
  camera.position.z += e.deltaY*0.002;
  camera.position.z = Math.max(1.2, Math.min(7, camera.position.z));
});

// Astri Kitty
function drawAstri() {
  const c = document.getElementById('astri-canvas');
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,280,280);
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.ellipse(140,170,50,42,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(140,100,46,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(100,68);ctx.lineTo(78,30);ctx.lineTo(120,62);ctx.fill();
  ctx.beginPath(); ctx.moveTo(180,68);ctx.lineTo(202,30);ctx.lineTo(160,62);ctx.fill();
  ctx.fillStyle='rgba(0,140,255,0.35)'; ctx.beginPath(); ctx.ellipse(118,94,17,23,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(162,94,17,23,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#0088ff'; ctx.beginPath(); ctx.ellipse(118,94,10,15,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(162,94,10,15,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(122,88,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(166,88,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#ff5588'; ctx.beginPath(); ctx.moveTo(140,112);ctx.lineTo(132,120);ctx.lineTo(148,120);ctx.fill();
  ctx.strokeStyle='#444'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.moveTo(108,108); ctx.lineTo(68,100);
  ctx.moveTo(108,115); ctx.lineTo(68,118);
  ctx.moveTo(192,108); ctx.lineTo(232,100);
  ctx.moveTo(192,115); ctx.lineTo(232,118);
  ctx.stroke();
}

// Flow
let me = null;
let others = [];
let hidden = false;

setTimeout(() => {
  const s = document.getElementById('splash');
  if (s) {
    s.style.display = 'flex';
    drawAstri();
  }
}, 13000);

function doLogin(type) {
  me = { id: 'u' + Date.now(), name: type==='anonymous' ? 'Αξάκι Guest' : 'Αξάκι User' };
  document.getElementById('splash').style.display = 'none';
  document.getElementById('permissions-panel').style.display = 'block';
}

async function askPermissions() {
  const p = document.getElementById('permissions-panel');
  p.innerHTML = 'Requesting...';

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      placeMe(pos.coords.latitude, pos.coords.longitude);
    }, () => placeMe(36.22, 28.12));
  }

  try { await navigator.mediaDevices.getUserMedia({ video: true }); } catch(e){}

  if (navigator.storage?.persist) await navigator.storage.persist();

  p.style.display = 'none';
  showUsers();
  showOtherUsers();
}

function placeMe(lat, lng) {
  if (window._meMarker && window._meMarker.parent) window._meMarker.parent.remove(window._meMarker);
  const pos = latLngToPos(lat, lng, 1.03);
  const m = new THREE.Mesh(new THREE.SphereGeometry(0.02,5,5), new THREE.MeshBasicMaterial({color:0x00ffcc}));
  m.position.set(pos.x, pos.y, pos.z);
  m.userData = {type:'me', name: me ? me.name : 'You'};
  scene.add(m);
  window._meMarker = m;
  camera.position.set(pos.x*0.6, pos.y*0.6 + 0.4, 1.6);
  camera.lookAt(pos.x*0.2, pos.y*0.2, 0);
  console.log('%c[Map] You are here (green dot).', 'color:#0f0');
}

function showUsers() {
  const panel = document.getElementById('users-panel');
  panel.style.display = 'block';
  updateCrewList();
}

function updateCrewList() {
  const el = document.getElementById('crew-list');
  if (!el) return;
  el.innerHTML = `<div style="color:#0f0">🟢 ${me ? me.name : 'You'} (you)</div>`;
  others.forEach(u => {
    el.innerHTML += `<div>🟡 ${u.name} ${u.hidden ? '(hidden)' : ''}</div>`;
  });
}

function showOtherUsers() {
  others = [
    {id:'o1', name:'Μαρία Αξα', lat:36.21, lng:28.11, hidden:false},
    {id:'o2', name:'Σταύρος', lat:36.18, lng:28.09, hidden:false},
  ];
  others.forEach(u => {
    const pos = latLngToPos(u.lat, u.lng, 1.025);
    const m = new THREE.Mesh(new THREE.SphereGeometry(0.015,5,5), new THREE.MeshBasicMaterial({color: u.hidden ? 0x555 : 0xffaa33}));
    m.position.set(pos.x, pos.y, pos.z);
    m.userData = u;
    scene.add(m);
  });
  updateCrewList();
}

function toggleKryfto() {
  if (!window._meMarker) return;
  hidden = !hidden;
  window._meMarker.visible = !hidden;
  console.log(hidden ? 'Hidden for kryfto!' : 'Visible again');
  updateCrewList();
}

function groupOrder() {
  console.log('%c[Order] Ζητάω pitogyra + μπίρες + τσιγάρα με drone...', 'color:#ffaa33');
  
  // Εμφάνισε τον Πιλότο ΤΗΛΕΜΑΧΟΣ να κάνει την δουλειά
  showPilotTelemachos();
  
  // Drone delivery animation (ο πιλότος αναλαμβάνει)
  const drone = new THREE.Mesh(
    new THREE.SphereGeometry(0.013, 5, 5),
    new THREE.MeshBasicMaterial({ color: 0x44ccff })
  );
  drone.position.set(0.35, 0.15, 1.15);
  scene.add(drone);
  
  let steps = 0;
  const anim = setInterval(() => {
    steps++;
    drone.position.lerp(new THREE.Vector3(0.05, 0.02, 1.02), 0.07);
    
    if (steps > 28) {
      clearInterval(anim);
      if (drone.parent) drone.parent.remove(drone);
      console.log('%c[Drone Arrival - Πιλότος ΤΗΛΕΜΑΧΟΣ] Pitogyra, μπίρες & τσιγάρα παραδόθηκαν! Καλή απόλαυση αξά <3', 'color:#44ff88');
    }
  }, 70);
}

function showPilotTelemachos() {
  // Εμφάνισε τον Πιλότο ΤΗΛΕΜΑΧΟΣ (drone pilot)
  if (window._pilot && window._pilot.parent) window._pilot.parent.remove(window._pilot);
  
  const pos = latLngToPos(36.2, 28.1, 1.04); // πάνω από περιοχή Ρόδου / Αρχάγγελο
  const pilot = new THREE.Mesh(
    new THREE.SphereGeometry(0.016, 6, 6),
    new THREE.MeshBasicMaterial({ color: 0x66aaff, transparent: true, opacity: 0.85 })
  );
  pilot.position.set(pos.x, pos.y, pos.z);
  pilot.userData = { type: 'pilot', name: 'ΤΗΛΕΜΑΧΟΣ' };
  scene.add(pilot);
  window._pilot = pilot;
  
  console.log('%c[Πιλότος ΤΗΛΕΜΑΧΟΣ] Αναλαμβάνω την παράδοση με drone! Pitogyra + μπίρες + τσιγάρα on the way.', 'color:#66aaff');
}

function latLngToPos(lat, lng, r = 1) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = -lng * Math.PI / 180;
  return { x: -r * Math.sin(phi) * Math.cos(theta), y: r * Math.cos(phi), z: r * Math.sin(phi) * Math.sin(theta) };
}

// Domain guard
const host = location.hostname || '';
const isOfficial = host === 'astranov.eu' || host === 'grok.astranov.eu' || host.endsWith('.astranov.eu');
const isLocal = host === '' || host === 'localhost' || host === '127.0.0.1' || location.protocol === 'file:';
if (host && !isOfficial && !isLocal) {
  document.body.innerHTML = '<div style="color:#444;padding:40px;text-align:center;font-family:sans-serif">Available only on astranov.eu and grok.astranov.eu</div>';
}
</script>
</body>
</html>
