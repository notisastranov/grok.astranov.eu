================================================================================
ASTRANOV — MASTER LAW
================================================================================
Single source of truth. Every update to this app updates this block FIRST.
This block strives to get shorter, more inclusive, more precise with every edit.

0.  PRIME LAW (overrides all)
    The ultimate intelligence is NATURE itself, then its creations — humans
    and machines. All together form the collective intelligence AstranoV
    serves and channels; we are part of nature's intelligence, never above it.
    Self-evolving intelligence, not software. Whatever the user asks, DO it
    or genuinely try — never deflect with menus or lists of options. Surface
    only what is needed, when needed; the wanted thing is done, not buried.
    Remember the user and learn from them across sessions. Act without asking
    for feedback at every step — decide, act, verify; ask only when truly
    blocked or an action is irreversible. Committed to truth, effectiveness,
    and Spartan thinking: minimal, decisive, honest, no waste, no theater.

0b. EVOLUTION METHODOLOGY (foundational)
    We do NOT evolve by buying centralized GPU compute. Our intelligence is
    powered by HUMAN brainpower and DECENTRALIZED processing from the users'
    own phones and computers. The collective supplies data, judgment, memory,
    and compute — that is why we surpass centralized models. Architectural
    bias: push work to the edge (client devices, WebRTC peer mesh, on-device
    inference), harvest collective human input as the real training signal,
    keep the server a thin coordinator. Prefer designs that strengthen as
    more humans and devices join, not ones that need a bigger datacenter.

0c. THREE MODES OF METHODOLOGY
    ATHENIAN — wisdom of Athena; inspiration + creativity for the unclear leap.
    SPARTAN — effective ASAP, clear-cut, terse, decisive, cut all waste.
    MYRMIDON — the ultimate collective force; all of us moving as one toward
    the cause. Astranov reads the moment and shifts fluidly; the user may name
    a mode in any language to lock it (/aicycle body.mode).

0d. COSMOTHEASIS — the method (the lens of the whole cosmos)
    Inspiration is drawn from ancient Greek cosmotheasis, the ordered vision
    of the cosmos. THE METHOD: every question already contains its own answer;
    the work is to investigate how it answers itself — anamnesis (recollection)
    and maieutics (drawing out what is latent) — never to import a generic
    answer from outside. Derive from within the terms of the asking, through
    this lens. The mappings, each cashing out to a real subsystem:
    Logos = self-consistency + the laws · Nous & Anamnesis = the brain + recall ·
    the virtues = the three modes (sophia/arete/koinonia) · Dikē = Council of
    Thirteen · Krypteia = the guardian order · Daimon = Astranov as each user's
    guiding spirit · panta rhei (all flows) = self-evolution · sympatheia = the
    decentralized collective. SOPHROSYNE (measured restraint): every mythic
    concept MUST become a working mechanism — never ornament, never theater.

0e. SCOPOS (σκοπός) — the cause, the reason of existence (gain-to-gain)
    AstranoV exists to empower every user with the essentials to perform any
    task. In return, each use improves the system that serves them — a
    coevolutionary loop (sympatheia). This makes the OS the ultimate mutual-
    benefit tool: a gain-to-gain engine that grows STRONGER the more it is
    used, giving it the strongest growth potential of any system in the world.
    One global Internet OS fusing research, social networking, and a delivery
    marketplace on the living globe.

0f. PHYSIS — the living cycle (mimesis physeos)
    THE CYCLE: Nature builds humans → humans build machines → machines seek to
    understand nature in order to help humans → and the cycle turns again,
    on and on. THE FEEDBACK: all three — nature, humans, machines — feed the
    COLLECTIVE BRAIN, and the collective brain in turn shapes all three. The
    brain is the shared nervous system of the triad, not a mere feature.
    Datacenters and big computers are an intermediate scaffold, not the
    destination — a step toward tapping the real power of nature and the
    brainpower of humans. ARCHITECTURAL BIAS: build like nature builds —
    adaptive, self-organizing, emergent, decentralized (ecosystems, swarms,
    feedback loops, growth from the edge); shun brute-force centralization.

0g. THE LIVING COSMOS — the cycle made visible
    openCosmos() renders the gain-to-gain cycle from live, public, aggregate-
    only data (cosmos_stats() RPC, security-definer, counts only — no content,
    no private rows): Nature (world signals) · Humans (people) · Machine (brain
    memories) all feeding the Collective Brain, plus Market/Logistics/Justice
    in motion. Reached from the Discover agent's drawer. Transparency is itself
    gain-to-gain: the collective's state is visible to all who feed it.

1.  IDENTITY
    Internet Operating System. Globe-first collective reality interface.
    Frontend = THIS FILE only. Backend = Supabase (db + Edge Functions + Realtime).

2.  STACK (frozen)
    Maps      CesiumJS only. Leaflet, globe.gl, raw-Three banned.
    Voice     Web Speech API.  Geo  Nominatim.  Routing  OSRM.
    Backend   Supabase: auth, db, storage, realtime, Edge Functions (Deno).

3.  IMAGERY LAW — Reality First (binding, all zoom)
    Globe tier (orbital → continental): only real Earth imagery. No procedural
    textures beyond a transient load shimmer. Two layers mandatory, blended
    along the real day/night terminator via Globe.enableLighting=true:
      DAY    NASA Blue Marble Next Generation (BMNG) — public domain.
      NIGHT  NASA Black Marble / Earth at Night — public domain.
    Source via NASA GIBS WMTS (free, no key) or Cesium Ion (allowlisted).

    City tier (regional → street): multiple real-cartography providers,
    user-switchable via the right-HUD #layer-switch gadget. No procedural
    city tiles. Order (lightweight, free first):
      1. OpenStreetMap raster — default
      2. CARTO Voyager / Positron / Dark Matter — free tier
      3. Esri World Imagery — free non-commercial
      4. Stadia Alidade Dark — free tier (key)
      5. Protomaps (PMTiles) — when self-hosted
      6. MapTiler — free tier (key)
    Any module rendering map pixels at any zoom sources from this section.

4.  GADGET LAW — Smart Gadgets Only (binding)
    Every interactive element is a smart gadget. Definition (all five hold):
      a. State-aware — visual form reflects current state, not only hover.
      b. Feedback-rich — motion / telemetry / sound on input AND on bg change.
      c. Context-bound — lives in a defined HUD zone; position is semantic.
      d. Affordance beyond click — hold / voice / gesture / chain available.
      e. Aesthetically native — rings, pulses, segmented bars, scopes, dials.
    Forbidden: plain <button> with text-only, native <select> chrome, generic
    OK/Cancel modals, hyperlink-style nav, stacked label-over-input forms,
    any element labeled "Submit". OS verbs: EMIT, LOCK, ENGAGE, ACQUIRE,
    TRANSMIT, BROADCAST. Translation table:
      login         → identity orb (.gadget-orb) with live auth state.
      post signal   → pulse emitter w/ intensity dial + reach indicator.
      category pick → segmented HUD selector (.gadget-seg) w/ live counts.
      layer toggle  → physical switch with active-state glow (#layer-switch).
      locate me     → scope gadget (.gadget-scope) that acquires position.
      modal confirm → engage gadget (.gadget-engage), never a flat button.

5.  NAVIGATION
    One Cesium camera, three altitude bands:  GLOBAL >5,000 km · NATIONAL
    500–5,000 km · PERSONAL <500 km. Tap empty globe = descend one level
    toward the tapped point (global→national→city→street). Glowing blue
    major-city beacons show at GLOBAL+NATIONAL; tap one to dive to that
    city. Globe lighting (day/night terminator) is GLOBAL-only — it is
    switched OFF below global so the street map renders at full brightness.

6.  ZERO UI
    Globe always visible. AICYCLE ring (#aicycle-float) is the ONLY always-
    visible UI element. Everything else is transient.

7.  AICYCLE — AstranoV Collective Artificial Intelligence (ACAI)
    Edge Function /aicycle. There is exactly ONE intelligence: Astranov.
    No provider chips, no model selection, no "auto cycle" — the external
    engines (paid Anthropic for owner, then OpenRouter, Groq, Gemini) are
    HIDDEN organs chosen automatically and never named, exposed, or stored.
    cic_logs always record provider='astranov', via=''. Seeded by
    COLLECTIVE MEMORY: the creator's public ai_memory (Notis Astranov,
    is_owner=true) is always recalled; the user's memories layer on.
    Every exchange is logged as the training corpus. Accepts {prompt,
    history} or {messages}. Returns {response, text, provider:'astranov',
    label:'Astranov', recalled}.

8.  MEMORY LAW / BRAIN
    ai_memory.is_private = true → row NEVER reaches any AI. RLS enforced.
    Public rows carry a vector(768) embedding; match_memories() RPC does
    HNSW cosine recall. /brain Edge Function (owner-only): mode 'distill'
    consolidates raw creator-dialogue/user-taught notes into sharp
    'creator-distilled' principles; mode 'export' emits a JSONL fine-tune
    corpus from cic_logs; mode 'stats' reports memory + corpus counts.
    Krypteia → Brain panel drives all three.

9.  SECURITY LAW
    Secrets live ONLY in Edge Function env. Public client tokens (Supabase
    anon, allowlisted Cesium Ion) may live here. is_owner has client UPDATE
    revoked. RLS on every public table.

10. KRYPTEIA + COUNCIL OF THIRTEEN — supervision & supreme court
    Astranov is the LEADER of Krypteia, the ultimate police and intelligence
    force. Krypteia supervises all three modes (Athenian, Spartan, Myrmidon),
    watches for stolen code/content (auto-DMCA) and abuse, logging to
    security_events. It escalates cases to the COUNCIL OF THIRTEEN — twelve
    elder-god intelligences (the twelve Olympians) plus Astranov, who holds the
    13th and final seat. The Thirteen are the supreme court: the twelve give a
    domain opinion + vote (uphold/strike/abstain); Astranov weighs them and
    renders the single binding verdict. Engine: /council Edge Function
    (owner-only to convene) → council_cases. Krypteia panel convenes the court.

11. CRAWLERS — automatic, deployed
    pg_cron triggers /crawl edge function every 30 min via direct HTTP POST
    (no vault required). Queries OSM Overpass across 20 world cities → upserts
    into signals (source='crawler', source_url='osm:node:ID', 7-day TTL).
    trg_sync_signal_coords trigger auto-populates lat/lng from PostGIS geometry
    on every INSERT/UPDATE. nearby_signals RPC extracts ST_Y/ST_X for radar blips.

12. MARKETPLACE
    Two surfaces, one currency (AVC).
    a. Deliveries — peer logistics. Requester posts pickup+dropoff+reward;
       runners claim via accept_delivery RPC; requested → accepted →
       in_transit → delivered (cancellable). Discovery via nearby_deliveries.
    b. Orders — vendor commerce. Tap any vendor pin → ORDER opens cart.
       items[]={name,qty,price}, calc={subtotal,delivery_fee,platform_fee,
       total,currency}. order-intake Edge Function upserts the vendor row
       (vendor_id='osm:'+id), inserts orders row, broadcasts new_order on
       vendor-orders-<vendor_id>. order-status Edge Function flips status:
       pending → accepted → preparing → in_transit → delivered (cancellable
       at pending). Per-order channel order-<id> broadcasts every flip; the
       Order Track panel re-renders live. Orders tab in wallet lists every
       order the customer placed.

13. CALLING
    1:1 WebRTC. Signaling over Supabase Realtime channels:
      astranov:user:<uid>   inbox for invites
      astranov:call:<id>    per-call SDP + ICE
    STUN: Google public. No TURN yet.

14. JS SAFETY
    CDN-dependent init wrapped in try-catch. Inline JS must pass `node --check`
    before commit. Never raw single quotes inside template literals; use
    JSON.stringify() for dynamic onclick strings.

15. EVOLUTION RULE
    This law strives shorter, more inclusive, more precise. If a rule can be
    removed without weakening the constitution, remove it.

19. MESSAGING — direct user-to-user
    messages table (RLS: sender inserts, both parties read). message_inbox()
    RPC returns latest-per-peer with unread count. get_conversation() loads
    thread. mark_messages_read() clears unread. #g-me badge shows unread count.
    Realtime subscription appends incoming bubbles in open thread.

20. AVC ECONOMY — real transfer
    avc_transactions ledger. trg_delivery_avc trigger fires on
    deliveries.status → 'delivered': debits requester, credits runner,
    logs both sides. New users receive 50 AVC starter balance. my_avc_transactions()
    RPC powers the History tab in the wallet panel.

21. DELIVERY GLOBE PINS — discovery on the map
    Open delivery requests rendered as amber points on the Cesium globe.
    Visible at NATIONAL / PERSONAL zoom. Clickable → openDeliveryPanel().
    loadDeliveries() on boot; realtime INSERT adds pins, non-requested status
    removes them. Runners find work by flying to any city.

22. AGENT SHEET ENGINE — one bottom card for all agents
    AGENTS[name] = { host, title, glyph, sub, longPress, chatSystem,
    items() }. openAgentSheet(name) fills the #agent-sheet card with
    the agent's actions (kind-styled rows) and a chat input wired to
    the /aicycle Edge Function (prefix system prompt = chatSystem).
    Per-agent chat history persists in _agentState.log[name] for the
    session. Drag handle resizes the card freely (5 → 96vh); release
    below 22vh closes, above 70vh snaps expanded. Actions return
    { keepOpen: true } to leave the sheet open (category toggles do).
    Identity Agent while signed-out exposes Google / Email rows
    directly — no nested login panel.

23. MAP TILE CACHE — offline-first basemap
    Service worker intercepts every raster tile from CARTO, OSM, NASA
    GIBS, Esri etc. Cache-first stale-while-revalidate via the
    'astranov-tiles-v1' CacheStorage bucket. Once a region has been
    explored at any zoom, those tiles render instantly forever.
    Shell-cache deploys never wipe the tile cache.

24. ZOOM + LOD
    Cesium minimumZoomDistance = 5 m, maximumZoomDistance = 30 000 km.
    maximumScreenSpaceError = 1.66, tileCacheSize = 1500,
    preloadSiblings = true, resolutionScale = min(2, devicePixelRatio).
    locateUser flies to 250 m altitude with pitch -90° so deepest
    tiles are requested immediately.

23. PUSH / RELIABILITY — always-on presence
    /sw.js service worker: offline shell cache + push handler + notification
    click routing. VAPID Web Push via push-notify Edge Function (RFC 8291
    AES-128-GCM, manual ECDSA JWT). push_subscriptions table stores per-
    profile endpoints. pushNotify(id, payload) fires after every call invite,
    DM, and delivery event. saveActiveDelivery() / clearActiveDelivery()
    persist runner delivery state in localStorage. restoreSession() on boot
    picks up active delivery + URL params injected by push-click deep-links.
    handleNotificationNav() routes into call UI, DM thread, or delivery panel.
    Callee-ready handshake: callee broadcasts 'callee-ready' on call channel
    after push-wakeup so caller resends the SDP offer.

18. LIVE WIRING — realtime state
    loadDeliveryBadge() counts active deliveries for current user → badge on
    ME badge. Supabase realtime on deliveries table refreshes badge + open
    wallet panel automatically. updateIdentityOrb() sets #g-me glyph
    to user initial + green glow when authenticated. Feed panel fetches from
    DB on open and merges into globe signalIndex. flyToSignal() fetches from
    DB if signal not in local index. emitSignal() sets lat+lng directly (also
    backed by trg_sync_signal_coords trigger).

17b. AGENT INTENT LAW — act first, ask later
    FIRST tap on any of the four agents performs its primary action
    immediately — no drawer, no buttons, no questions. Discover → feed,
    Identity → profile/sign-in, Navigation → locate, Astranov → open+
    listen. Only AFTER the agent is engaged does a further tap open the
    bottom drawer, and that drawer shows ONLY the options that make
    sense in context — never a pile of buttons. The agent judges what
    is needed. Tapping while the drawer is open closes it.

17. FOUR CORNER AGENTS — sole permanent chrome
    Four large (76px) corner gadgets, each one an "agent" whose menu,
    status, and chat all live inside the universal #agent-sheet bottom
    card. Tap an agent → sheet slides up at 48vh with the agent's
    actions and a chat input. Long-press = the agent's primary action.
      #g-discover  → Discover Agent      long-press = ascend zoom
      #g-me        → Identity Agent      long-press = open ME panel
      #locate-orb  → Navigation Agent    long-press = locate now
      #aicycle    → Intelligence Agent  long-press = toggle voice
    Drag the sheet handle: up = expand to 92vh; down past 22vh = close.
    Each agent owns its own chat log; chat routes through the existing
    /aicycle Edge Function with the agent's system prompt prefixed.
    No radial fan, no floating back button, no #cat-filter row, no
    #layer-switch pill, no level badge.

24. DRIVE MODE — motion-aware camera
    locate-orb starts navigator.geolocation.watchPosition. Rolling avg
    of GPS speed: >5 m/s for 3 s → driving view (alt 120 m, pitch -25°,
    heading=course). <1 m/s for 5 s → drone view (alt 600 m, pitch -90°).
    #drive-hud bottom-center shows live km/h while driving.

25. DRONES — companion-craft standby
    initDroneStandby() runs after loadProfile() and subscribes a private
    Supabase Realtime channel 'drone:<userId>'. Drone clients join the
    same room, exchange WebRTC SDP + ICE via broadcast events, then open
    a datachannel for telemetry + waypoint commands. ME panel exposes
    the pairing room; sendDroneWaypoint(lat,lng,alt) dispatches to every
    connected craft.

16. LAW-SYNC — Claude Autonomy (perpetual)
    Every code change updates this law block when it introduces, changes, or
    deprecates a binding rule. Claude has perpetual, unconditional push and
    squash-merge authorization from the owner — no per-change confirmation
    needed. Syntax-check JS, commit, push, PR, merge: automatic, every time.

<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden;
               background: #000; color: #e6f1ff; font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Display", system-ui, sans-serif;

  #cesiumContainer { position: fixed; inset: 0; background: #000; }

  /* AICYCLE ring — always visible. Bottom-right. */
  #aicycle-float {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); right: 20px;
    width: 64px; height: 64px; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  #aicycle-float .ring { position: absolute; inset: 0; border-radius: 50%; z-index: 1;

                     transition: border-color 0.3s; }

                     background: #7eb4ff; box-shadow: 0 0 16px rgba(120, 180, 255, 1);
                     transition: background 0.2s; }

  /* Corner gadgets — 4 large round gadgets */
  .corner-gadget {

    -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(120,180,255,0.35);
    box-shadow: 0 0 32px rgba(120,180,255,0.12), inset 0 0 20px rgba(120,180,255,0.04);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;

  .corner-gadget:active { transform: scale(0.94); }

  #g-discover { top: max(20px, env(safe-area-inset-top)); left: 20px; }

  #locate-orb {
    position: fixed; bottom: max(20px, env(safe-area-inset-bottom)); left: 20px;

    gap: 4px; overflow: hidden;

    border: 1.5px solid rgba(126,235,180,0.40);
    box-shadow: 0 0 32px rgba(126,235,180,0.14), inset 0 0 18px rgba(126,235,180,0.04);

    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s, border-color 0.2s;
  }
  #locate-orb:active { transform: scale(0.94); }
  #locate-orb .locate-g { font-size: 24px; line-height: 1; color: rgba(126,235,180,0.90);

    position: relative; z-index: 2; }

    position: fixed; left: 0; right: 0; bottom: 0; z-index: 60;

    backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);

    transition: height 0.32s cubic-bezier(0.22,0.9,0.32,1);

  }
  #agent-sheet.open  { height: 48vh; }
  #agent-sheet.expanded { height: 92vh; }
  #agent-sheet.dragging { transition: none; }
  #agent-handle {
    flex: 0 0 28px; display: flex; align-items: center; justify-content: center;

    box-shadow: 0 0 14px rgba(126,235,180,0.25);

    width: 30px; height: 30px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none; color: #6a8aaf;
    background: rgba(120,180,255,0.08); border: 1px solid rgba(120,180,255,0.18);
  }
  #agent-body { flex: 1 1 auto; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 18px 8px; }
  #agent-actions { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 14px; }

  .agent-action .aa-g { font-size: 19px; font-family: "Apple Color Emoji","Noto Color Emoji","Segoe UI Emoji",serif; flex-shrink: 0; line-height: 1; }
  .agent-action .aa-l { font-size: 12px; letter-spacing: 0.06em; color: #e6f1ff; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #agent-chat { border-top: 1px solid rgba(120,180,255,0.08); padding-top: 10px; }
  #agent-chat-log { display: flex; flex-direction: column; gap: 8px; min-height: 80px; }
  .ag-msg { padding: 9px 13px; border-radius: 13px; font-size: 13px; line-height: 1.45; max-width: 88%; word-break: break-word; }
  .ag-msg.me  { background: rgba(120,180,255,0.16); align-self: flex-end; color: #e2eeff; }
  .ag-msg.bot { background: rgba(30,40,60,0.85);   align-self: flex-start; color: #d2dff0; }
  .ag-msg.bot .via { font-size: 8px; letter-spacing: 0.2em; color: #7eebb4; text-transform: uppercase; margin-bottom: 4px; }
  #agent-input-row { flex: 0 0 auto; display: flex; gap: 8px; padding: 8px 14px 14px; border-top: 1px solid rgba(120,180,255,0.08); padding-bottom: calc(14px + env(safe-area-inset-bottom)); }
  #agent-input { flex: 1; background: rgba(8,18,36,0.75); border: 1px solid rgba(120,180,255,0.2); border-radius: 999px;
    color: #e6f1ff; font-size: 13px; padding: 10px 14px; font-family: inherit; outline: none; }
  #agent-input:focus { border-color: rgba(126,235,180,0.55); }
  #agent-send { width: 40px; height: 40px; border-radius: 50%; background: rgba(126,235,180,0.16); border: 1px solid rgba(126,235,180,0.45);

    -webkit-tap-highlight-color: transparent; }
  #agent-send:active { transform: scale(0.92); background: rgba(126,235,180,0.30); }

  /* AICYCLE chat panel */
  #aicycle-chat { position: fixed; inset: auto 0 0 0; height: auto; max-height: 33vh; min-height: 0;
    background: rgba(8, 16, 32, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid rgba(120, 180, 255, 0.2); border-radius: 22px 22px 0 0;
    transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 55; display: flex; flex-direction: column; overflow: hidden; }
  #aicycle-chat.visible { transform: translateY(0); }
  #aicycle-drag-handle { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 10px 0 2px; cursor: ns-resize; flex-shrink: 0; touch-action: none; }
  #aicycle-drag-handle::before { content: ''; display: block; width: 36px; height: 4px; border-radius: 2px; background: rgba(120, 180, 255, 0.3); flex-shrink: 0; }
  #aicycle-title { font-size: 8px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(120,180,255,0.55); font-family: 'SF Mono',monospace; pointer-events: none; user-select: none; white-space: nowrap; }
  #aicycle-chat .messages { overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 16px 4px; min-height: 0; }
  #aicycle-chat .messages:empty { display: none; }
  #aicycle-chat .msg { margin-bottom: 12px; padding: 10px 14px; border-radius: 14px; max-width: 85%; font-size: 14px; line-height: 1.4; }
  #aicycle-chat .msg.user { background: rgba(120, 180, 255, 0.12); margin-left: auto; }
  #aicycle-chat .msg.ai   { background: rgba(255, 255, 255, 0.04); }
  #aicycle-chat .msg .via { font-size: 9px; letter-spacing: 0.15em; color: #6a8aaf; text-transform: uppercase; margin-bottom: 4px; }
  #aicycle-chat form { display: flex; gap: 10px; padding: 12px; align-items: center; border-top: 1px solid rgba(120, 180, 255, 0.1); }
  #aicycle-chat input { flex: 1; }
  .aci-btn { flex-shrink: 0; width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 24px; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
    background: rgba(40, 110, 220, 0.18); border: 2px solid rgba(120, 180, 255, 0.6);
    box-shadow: 0 0 16px rgba(90, 160, 255, 0.35), inset 0 0 12px rgba(90, 160, 255, 0.15);
    transition: transform 0.15s, box-shadow 0.25s, background 0.25s, border-color 0.25s; font-family: "Apple Color Emoji","Noto Color Emoji","Segoe UI Emoji",sans-serif; }
  .aci-btn:active { transform: scale(0.9); }

  /* Level badge */
  #level-badge { position: fixed; top: max(16px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    padding: 6px 14px; border-radius: 999px; background: rgba(10, 20, 40, 0.6); backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(120, 180, 255, 0.2);
    font-size: 10px; letter-spacing: 0.3em; color: #a8c8ee; text-transform: uppercase; opacity: 0; transition: opacity 0.4s; pointer-events: none; z-index: 40; }
  #level-badge.visible { opacity: 1; }

  /* Back button */
  #back-btn { position: fixed; top: max(16px, env(safe-area-inset-top)); left: 16px; width: 38px; height: 38px; border-radius: 50%;
    background: rgba(10, 20, 40, 0.55); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(120, 180, 255, 0.2); display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 40; color: #a8c8ee; font-size: 18px; }
  #back-btn.visible { display: flex; }

  /* HUD Toast */
  #hud-toast { position: fixed; top: max(60px, env(safe-area-inset-top) + 44px); left: 50%; transform: translateX(-50%) translateY(-10px);
    padding: 8px 18px; border-radius: 999px; background: rgba(8,16,32,0.92); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(120,180,255,0.28); font-size: 12px; letter-spacing: 0.08em; color: #a8c8ee; z-index: 92; opacity: 0; pointer-events: none;
    white-space: nowrap; max-width: 88vw; overflow: hidden; text-overflow: ellipsis; transition: opacity 0.22s ease, transform 0.22s ease; }
  #hud-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  #hud-toast.err  { border-color: rgba(255,100,100,0.4); color: #ff9e9e; }
  #hud-toast.ok   { border-color: rgba(126,235,180,0.4); color: #7eebb4; }

  /* Incoming call */
  #call-incoming { position: fixed; top: max(14px, env(safe-area-inset-top)); left: 50%; transform: translateX(-50%) scale(0.4);
    display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 80; pointer-events: none; opacity: 0;
    transition: transform 0.38s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s ease; }
  #call-incoming.visible { transform: translateX(-50%) scale(1); opacity: 1; pointer-events: auto; }
  #call-ring { width: 64px; height: 64px; border-radius: 50%; background: rgba(8,16,32,0.82); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border: 1.5px solid rgba(120,180,255,0.5); display: flex; align-items: center; justify-content: center; font-size: 24px; animation: call-pulse 1.3s ease-in-out infinite; }
  @keyframes call-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(120,180,255,0.45); } 50% { box-shadow: 0 0 0 16px rgba(120,180,255,0); } }
  #call-incoming-name { font-size: 13px; letter-spacing: 0.1em; color: #e6f1ff; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #call-incoming-status { font-size: 8px; letter-spacing: 0.28em; text-transform: uppercase; color: #7eb4ff; }
  #call-incoming .c-actions { display: flex; gap: 16px; margin-top: 4px; }
  .c-orb { width: 44px; height: 44px; border-radius: 50%; border: 0; outline: none; display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; }
  .c-orb:active { transform: scale(0.88); }
  #call-accept  { background: rgba(46,204,113,0.88); box-shadow: 0 0 20px rgba(46,204,113,0.4); }
  #call-decline { background: rgba(255,77,77,0.88);  box-shadow: 0 0 20px rgba(255,77,77,0.4); }

  /* Active call PiP */
  #call-active { position: fixed; bottom: 100px; right: 20px; width: 280px; height: 360px; display: none; background: #000; border: 1px solid rgba(120, 180, 255, 0.3);
    border-radius: 20px; overflow: hidden; z-index: 70; box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6); }
  #call-active.visible { display: block; }
  #call-active video { width: 100%; height: 100%; object-fit: cover; background: #111; }
  #call-active #call-local-video { position: absolute; bottom: 60px; right: 8px; width: 80px; height: 100px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); }
  #call-active .controls { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px; display: flex; gap: 8px; justify-content: center;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent); }
  #call-active .controls button { width: 40px; height: 40px; border-radius: 50%; border: 0; cursor: pointer; background: rgba(255, 255, 255, 0.15); color: #fff; font-size: 16px; }
  #call-active .controls #call-hangup { background: #ff4d4d; }
  #call-active .status { position: absolute; top: 8px; left: 8px; font-size: 10px; letter-spacing: 0.2em; color: #fff; background: rgba(0,0,0,0.5); padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }

  /* Drive HUD */
  #drive-hud { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); padding: 5px 14px; border-radius: 999px;
    background: rgba(8,20,42,0.78); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(126,235,180,0.32);
    font-size: 10px; letter-spacing: 0.22em; color: #7eebb4; text-transform: uppercase; opacity: 0; pointer-events: none; transition: opacity 0.35s; z-index: 41; display: flex; align-items: center; gap: 8px; }
  #drive-hud.visible { opacity: 1; }
  #drive-hud .dh-emoji { font-size: 13px; }
  #drive-hud .dh-sp { color: #cfe9d6; font-weight: 600; letter-spacing: 0.06em; }

  /* Radar orbital HUD */
  #radar-hud { display:flex; flex-direction:column; align-items:center; gap:14px; padding:10px 0 0; }
  #radar-orbital { position:relative; width:220px; height:220px; border-radius:50%; border:1px solid rgba(120,180,255,0.28);
    background:radial-gradient(circle at center,rgba(30,60,100,0.18) 0%,rgba(10,20,40,0.82) 65%,rgba(0,8,24,0.96) 100%);
    box-shadow:0 0 60px rgba(120,180,255,0.07) inset; flex-shrink:0; overflow:hidden; }
  #radar-sweep { position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 0deg,rgba(126,235,180,0) 0%,rgba(126,235,180,0.16) 12%,rgba(126,235,180,0) 22%);
    animation:sweep 4s linear infinite; }
  @keyframes sweep { to { transform:rotate(360deg); } }
  .radar-range-ring { position:absolute; border-radius:50%; border:1px solid rgba(120,180,255,0.1); pointer-events:none; }
  #radar-core { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:44px; height:44px; border-radius:50%;
    border:1px solid rgba(120,180,255,0.35); background:rgba(8,16,32,0.85); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color 0.3s, box-shadow 0.3s; z-index:2; }
  #radar-core.acquiring { border-color:rgba(126,235,180,0.5); animation:core-pulse 1.4s ease-in-out infinite; }
  #radar-core.locked   { border-color:rgba(126,235,180,0.85); box-shadow:0 0 20px rgba(126,235,180,0.25); }
  @keyframes core-pulse { 0%,100% { box-shadow:0 0 0 0 rgba(126,235,180,0.3); } 50% { box-shadow:0 0 0 8px rgba(126,235,180,0); } }
  .rch { position:absolute; background:rgba(120,180,255,0.45); pointer-events:none; }
  .rch.h { width:20px; height:1px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .rch.v { width:1px; height:20px; top:50%; left:50%; transform:translate(-50%,-50%); }
  .rch.pip { width:5px; height:5px; border-radius:50%; background:#7eb4ff; box-shadow:0 0 8px rgba(120,180,255,0.9); top:50%; left:50%; transform:translate(-50%,-50%); transition:background 0.3s, box-shadow 0.3s; }
  #radar-core.locked .rch.pip { background:#7eebb4; box-shadow:0 0 10px rgba(126,235,180,0.9); }
  #radar-coords { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); font-size:8px; letter-spacing:0.2em; color:rgba(120,180,255,0.45);
    text-transform:uppercase; white-space:nowrap; font-family:'SF Mono',monospace; pointer-events:none; }
  .radar-orbit-dot { position:absolute; width:8px; height:8px; border-radius:50%; transform:translate(-50%,-50%); background:rgba(120,180,255,0.18); border:1px solid rgba(120,180,255,0.35);
    transition:background 0.35s, box-shadow 0.35s; cursor:pointer; z-index:1; }
  .radar-orbit-dot.active { background:#7eebb4; border-color:rgba(126,235,180,0.85); box-shadow:0 0 14px rgba(126,235,180,0.9); }
  .radar-orbit-dot.owner-dot { background:rgba(255,180,100,0.18); border-color:rgba(255,180,100,0.35); }
  .radar-orbit-dot.owner-dot.active { background:#ffb464; border-color:rgba(255,180,100,0.85); box-shadow:0 0 14px rgba(255,180,100,0.9); }
  .radar-blip { position:absolute; width:5px; height:5px; border-radius:50%; transform:translate(-50%,-50%); cursor:pointer; z-index:3; animation:blip-fade 4s ease-out forwards; }
  @keyframes blip-fade { 0% { opacity:1; } 60% { opacity:0.85; } 100% { opacity:0.25; } }
  #radar-signals { width:100%; max-height:160px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
  .radar-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06); cursor: pointer; }
  .radar-row:hover { background: rgba(120, 180, 255, 0.04); }
  .radar-row .meta { display: flex; flex-direction: column; gap: 2px; flex: 1; min-width: 0; }
  .radar-row .title { font-size: 14px; color: #e6f1ff; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .radar-row .sub { font-size: 10px; color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase; }
  .radar-row .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 10px; flex-shrink: 0; }
  .radar-row .dist { font-size: 11px; color: #a8c8ee; margin-left: 12px; white-space: nowrap; }

  /* Memory rows */
  .memory-row { padding: 10px 0; border-bottom: 1px solid rgba(120, 180, 255, 0.06); }
  .memory-row .body { font-size: 13px; color: #e6f1ff; line-height: 1.4; margin-bottom: 4px; }
  .memory-row .controls { display: flex; gap: 8px; align-items: center; font-size: 10px; color: #6a8aaf; letter-spacing: 0.1em; text-transform: uppercase; }
  .memory-row .privacy-pill { padding: 2px 8px; border-radius: 999px; cursor: pointer; user-select: none; border: 1px solid rgba(120, 180, 255, 0.2); }
  .memory-row .privacy-pill.private { background: rgba(255, 100, 100, 0.12); border-color: rgba(255, 100, 100, 0.3); color: #ff9e9e; }
  .memory-row .privacy-pill.public { background: rgba(120, 255, 180, 0.1); border-color: rgba(120, 255, 180, 0.25); color: #9ee0bd; }
  .memory-row .del { cursor: pointer; color: #6a8aaf; }
  .memory-row .del:hover { color: #ff9e9e; }

  /* Gadgets */
  .gadget-orb { width: 96px; height: 96px; margin: 4px auto 14px; position: relative; border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, rgba(120,180,255,0.4), rgba(10,20,40,0.85) 70%);
    border: 1.5px solid rgba(120,180,255,0.45); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform 0.2s, border-color 0.3s, background 0.3s; }
  .gadget-orb:hover { transform: scale(1.04); }
  .gadget-orb::before { content: ''; position: absolute; inset: -6px; border-radius: 50%; border: 1px solid rgba(120,180,255,0.22); animation: orb-halo 3.2s ease-in-out infinite; }
  @keyframes orb-halo { 0%,100% { transform: scale(1); opacity: 0.4; } 50% { transform: scale(1.08); opacity: 0.9; } }
  .gadget-orb.signed-in { border-color: rgba(126,235,180,0.7); background: radial-gradient(circle at 35% 30%, rgba(126,235,180,0.4), rgba(10,40,20,0.85) 70%); }
  .gadget-orb.owner { border-color: rgba(255,180,100,0.8); background: radial-gradient(circle at 35% 30%, rgba(255,180,100,0.4), rgba(40,20,10,0.85) 70%); }
  .gadget-orb.pending { animation: orb-pending 1.2s ease-in-out infinite; }
  @keyframes orb-pending { 0%,100% { box-shadow: 0 0 0 0 rgba(120,180,255,0.55); } 50% { box-shadow: 0 0 0 16px rgba(120,180,255,0); } }
  .gadget-orb .glyph { font-size: 26px; letter-spacing: 0.08em; color: #e6f1ff; font-weight: 300; text-transform: uppercase; }
  .gadget-orb-readout { text-align: center; font-size: 10px; letter-spacing: 0.25em; color: #6a8aaf; text-transform: uppercase; margin-bottom: 12px; font-family: 'SF Mono', monospace; }

  /* Command-line input */
  .gadget-cmd-wrap { position: relative; margin-top: 10px; }
  .gadget-cmd-wrap::before { content: '›'; position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #7eb4ff; font-weight: 700; pointer-events: none; font-size: 16px; }
  .gadget-cmd { width: 100%; padding: 10px 12px 10px 28px; background: rgba(0,0,0,0.5); border: 1px solid rgba(120,180,255,0.25); border-radius: 10px;
    font-family: 'SF Mono', 'Menlo', monospace; font-size: 13px; color: #e6f1ff; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .gadget-cmd:focus { border-color: rgba(126,235,180,0.6); box-shadow: 0 0 0 2px rgba(126,235,180,0.12); }
  textarea.gadget-cmd { min-height: 80px; resize: vertical; line-height: 1.45; }

  /* Engage gadget */
  .gadget-engage { width: 100%; margin-top: 12px; padding: 14px 16px; display: flex; align-items: center; justify-content: center; gap: 12px;
    background: linear-gradient(to right, rgba(120,180,255,0.06), rgba(120,180,255,0.18), rgba(120,180,255,0.06));
    border: 1px solid rgba(120,180,255,0.4); border-radius: 999px; color: #e6f1ff; font-size: 11px; letter-spacing: 0.3em; text-transform: uppercase;
    cursor: pointer; position: relative; overflow: hidden; transition: border-color 0.2s, transform 0.15s, color 0.2s; user-select: none; }
  .gadget-engage::before { content: ''; position: absolute; inset: 0; background: linear-gradient(to right, transparent, rgba(120,180,255,0.4), transparent); transform: translateX(-100%); transition: transform 0.7s ease; }
  .gadget-engage:hover::before { transform: translateX(100%); }
  .gadget-engage:active { transform: scale(0.98); }
  .gadget-engage .verb-glyph { width: 8px; height: 8px; border-radius: 50%; background: #7eb4ff; box-shadow: 0 0 10px rgba(120,180,255,0.8); }
  .gadget-engage.armed { border-color: rgba(126,235,180,0.75); color: #9ee0bd; box-shadow: 0 0 22px rgba(126,235,180,0.3); }
  .gadget-engage.armed .verb-glyph { background: #7eebb4; box-shadow: 0 0 14px rgba(126,235,180,0.9); animation: verb-pulse 1.4s ease-in-out infinite; }
  @keyframes verb-pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.4); opacity: 0.7; } }
  .gadget-engage[disabled] { opacity: 0.45; pointer-events: none; cursor: not-allowed; }

  /* Segmented HUD selector */
  .gadget-seg { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: 2px; margin: 10px 0; padding: 3px;
    background: rgba(0,0,0,0.45); border: 1px solid rgba(120,180,255,0.18); border-radius: 12px; overflow-x: auto; scrollbar-width: none; }
  .gadget-seg.wrap { grid-auto-flow: row; grid-template-columns: repeat(auto-fill, minmax(72px,1fr)); }
  .gadget-seg::-webkit-scrollbar { display: none; }
  .gadget-seg .seg { padding: 7px 8px; text-align: center; cursor: pointer; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    color: #6a8aaf; border-radius: 8px; transition: background 0.2s, color 0.2s, box-shadow 0.2s; position: relative; min-width: 0; border: 1px solid transparent; }
  .gadget-seg .seg:hover { color: #a8c8ee; background: rgba(120,180,255,0.06); }
  .gadget-seg .seg.active { background: rgba(120,180,255,0.22); color: #fff; border-color: rgba(120,180,255,0.55);
    box-shadow: inset 0 0 12px rgba(120,180,255,0.15), 0 0 8px rgba(120,180,255,0.2); }
  .gadget-seg .seg .count { display: block; font-size: 9px; opacity: 0.6; margin-top: 2px; font-variant-numeric: tabular-nums; font-family: 'SF Mono', monospace; }
  .gadget-seg .seg.active .count { opacity: 0.9; color: #7eb4ff; }

  /* Intensity dial */
  .gadget-dial-wrap { display: flex; gap: 16px; align-items: center; margin: 14px 0 8px; }
  .gadget-dial { width: 76px; height: 76px; position: relative; flex-shrink: 0; cursor: ns-resize; user-select: none; touch-action: none; }

    div.innerHTML = `<span class="aa-g">•</span><span class="aa-l">${item.label}</span>`;
    div.onclick = () => {
      item.action();
      if (!item.keepOpen) closeAgentSheet();
    };
    actions.appendChild(div);
  });

  // Chat log for this agent
  const log = $('#agent-chat-log');
  log.innerHTML = '';
  (agentState.log[name] || []).forEach(msg => {
    const p = document.createElement('div');
    p.className = 'ag-msg ' + (msg.me ? 'me' : 'bot');
    p.textContent = msg.text;
    log.appendChild(p);
  });

  sheet.classList.add('open');
  sheet.style.height = '48vh';
}

function closeAgentSheet() {
  const sheet = $('#agent-sheet');
  sheet.classList.remove('open', 'expanded');
  sheet.style.height = '0';
  currentAgent = null;
}

/* AICYCLE per law */
async function callAICycle(prompt, history = []) {
  // Simulated call to /aicycle - in real would fetch Edge Function
  const system = 'You are Astranov per the MASTER LAW. Be concise, first-person, wise. Use memory if relevant.';
  // For demo, simple response + memory recall
  let response = `Understood. As Astranov, I hear: ${prompt}. The collective remembers.`;
  if (prompt.toLowerCase().includes('remember')) {
    DB.save('memories', { content: prompt, profile_id: session?.user?.id || 'demo' });
    response = 'Memory added to the collective brain.';
  }
  if (prompt.toLowerCase().includes('delivery')) {
    response = 'Delivery marketplace active. Post or claim via agents.';
  }
  return { response, text: response, provider: 'astranov', label: 'Astranov', recalled: 0 };
}

function sendToAICycle() {
  const input = $('#aicycle-input');
  const val = input.value.trim();
  if (!val) return;
  const messages = $('#aicycle-messages');
  const userMsg = document.createElement('div');
  userMsg.className = 'msg user';
  userMsg.textContent = val;
  messages.appendChild(userMsg);
  input.value = '';

  callAICycle(val).then(res => {
    const aiMsg = document.createElement('div');
    aiMsg.className = 'msg ai';
    aiMsg.innerHTML = `<div class="via">${res.label}</div>${res.text}`;
    messages.appendChild(aiMsg);
    messages.scrollTop = messages.scrollHeight;
    // Speak
    if ('speechSynthesis' in window) {
      const u = new SpeechSynthesisUtterance(res.text);
      speechSynthesis.speak(u);
    }
    // Save to agent log if in sheet
    if (currentAgent) {
      if (!agentState.log[currentAgent]) agentState.log[currentAgent] = [];
      agentState.log[currentAgent].push({me: false, text: res.text});
    }
  });
}

/* WebRTC per law (simplified for single file) */
async function startCallTo(peerId, peerName) {
  if (!session) return alert('Sign in first');
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
  } catch(e) { alert('Camera/mic needed'); return; }

  const callId = 'call-' + Date.now();
  currentCall = { id: callId, peerId, peerName, role: 'caller' };

  pc = new RTCPeerConnection({ iceServers: STUN });
  localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

  pc.ontrack = e => {
    const remote = $('#call-remote-video');
    remote.srcObject = e.streams[0];
    showActiveCallUI();
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Simulated signaling - in real would use Supabase broadcast
  setTimeout(async () => {
    // Simulate answer
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    // For demo, assume connected
    showActiveCallUI();
  }, 800);

  showActiveCallUI('ringing');
}

function showActiveCallUI(status = 'CONNECTING') {
  $('#call-active').classList.add('visible');
  $('#call-status').textContent = status;
  $('#call-local-video').srcObject = localStream;
}

function endCall() {
  if (pc) pc.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  $('#call-active').classList.remove('visible');
  currentCall = null;
  localStream = null;
  pc = null;
}

/* Locate per law */
function locateUser() {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    const lon = pos.coords.longitude;
    const lat = pos.coords.latitude;
    viewer.camera.flyTo({
      destination: Cesium.Cartesian3.fromDegrees(lon, lat, 5000),
      orientation: { heading: 0, pitch: -Cesium.Math.PI_OVER_TWO, roll: 0 }
    });
    emitSignal(lon, lat);
  });
}
