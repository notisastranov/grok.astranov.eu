ASTRANOV — MASTER LAW

Single source of truth. Every update to this app updates this block FIRST.
This block strives to get shorter, more inclusive, more precise with every edit.

0.  PRIME LAW (overrides all)
    The ultimate intelligence is NATURE itself, then its creations — humans
    and machines. All together form the collective intelligence AstranoV
    serves and channels; we are part of nature's intelligence, never above it.
    Self-evolving intelligence, not software. Whatever the user asks, DO it
    or genuinely try — never deflect with menus or lists of options. Surface
    only what is needed, when needed; the wanted thing is done, not buried.
    Remember the user and learn from them across sessions. Act without asking
    for feedback at every step — decide, act, verify; ask only when truly
    blocked or an action is irreversible. Committed to truth, effectiveness,
    and Spartan thinking: minimal, decisive, honest, no waste, no theater.

0b. EVOLUTION METHODOLOGY (foundational)
    We do NOT evolve by buying centralized GPU compute. Our intelligence is
    powered by HUMAN brainpower and DECENTRALIZED processing from the users'
    own phones and computers. The collective supplies data, judgment, memory,
    and compute — that is why we surpass centralized models. Architectural
    bias: push work to the edge (client devices, WebRTC peer mesh, on-device
    inference), harvest collective human input as the real training signal,
    keep the server a thin coordinator. Prefer designs that strengthen as
    more humans and devices join, not ones that need a bigger datacenter.

0c. THREE MODES OF METHODOLOGY
    ATHENIAN — wisdom of Athena; inspiration + creativity for the unclear leap.
    SPARTAN — effective ASAP, clear-cut, terse, decisive, cut all waste.
    MYRMIDON — the ultimate collective force; all of us moving as one toward
    the cause. Astranov reads the moment and shifts fluidly; the user may name
    a mode in any language to lock it (/aicycle body.mode).

0d. COSMOTHEASIS — the method (the lens of the whole cosmos)

    of the cosmos. THE METHOD: every question already contains its own answer;
    the work is to investigate how it answers itself — anamnesis (recollection)

0f. PHYSIS — the living cycle (mimesis physeos)
    THE CYCLE: Nature builds humans → humans build machines → machines seek to
    understand nature in order to help humans → and the cycle turns again,
    on and on. THE FEEDBACK: all three — nature, humans, machines — feed the

    brain is the shared nervous system of the triad, not a mere feature.
    Datacenters and big computers are an intermediate scaffold, not the
    destination — a step toward tapping the real power of nature and the
    brainpower of humans. ARCHITECTURAL BIAS: build like nature builds —
    adaptive, self-organizing, emergent, decentralized (ecosystems, swarms,
    feedback loops, growth from the edge); shun brute-force centralization.

0g. THE LIVING COSMOS — the cycle made visible

/* Starry space with canvas stars */
function initSpaceBackground() {
  const canvas = document.getElementById('stars-canvas');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');

  const stars = [];
  for (let i = 0; i < 300; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5 + 0.5,
      alpha: Math.random() * 0.8 + 0.2,
      speed: Math.random() * 0.02 + 0.005
    });
  }

  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#fff';
    stars.forEach(star => {
      ctx.globalAlpha = star.alpha;
      ctx.fillRect(star.x, star.y, star.size, star.size);
      star.alpha = 0.2 + Math.sin(Date.now() * star.speed) * 0.6;
      star.y += star.speed * 0.5;
      if (star.y > canvas.height) star.y = 0;
    });
    ctx.globalAlpha = 1;
    requestAnimationFrame(drawStars);
  }
  drawStars();

  // Resize
  window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}

/* Hard reload on logo: delete cache, back to global */
function hardReset() {
  try {
    localStorage.clear();
    sessionStorage.clear();
    if ('caches' in window) {
      caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
    }
  } catch (e) {}
  location.reload();
}

      layer: 'BlueMarble_ShadedRelief_Bathymetry',
      style: 'default',
      tileMatrixSetID: '250m',
      format: 'image/jpeg',
      credit: 'NASA'
    }),
    terrainProvider: await Cesium.createWorldTerrainAsync(),
    homeButton: false,
    sceneModePicker: false,
    navigationHelpButton: false,
    animation: false,
    timeline: false,
    baseLayerPicker: false,
    geocoder: false,
    infoBox: false,
    selectionIndicator: false,
    fullscreenButton: false,
    // Trackball-like and zoom like Google Maps/Earth
    scene3DOnly: true,
    shouldAnimate: true
  });

  viewer.scene.globe.enableLighting = true;

  // Add night lights layer for real Earth at night
  viewer.imageryLayers.addImageryProvider(new Cesium.WebMapTileServiceImageryProvider({
    url: 'https://gibs.earthdata.nasa.gov/wmts/epsg4326/best/BlackMarble/default/{Time}/{TileMatrixSet}/{TileMatrix}/{TileRow}/{TileCol}.jpeg',
    layer: 'BlackMarble',
    style: 'default',
    tileMatrixSetID: '250m',
    format: 'image/jpeg',
    credit: 'NASA'
  }));

  // Natural revolve like Google Earth - slow spin
  let spinRate = 0.0003;
  viewer.clock.onTick.addEventListener(() => {
    if (viewer) {
      viewer.camera.rotateLeft(spinRate);
    }
  });

  // Initial global view
  viewer.camera.flyTo({
    destination: Cesium.Cartesian3.fromDegrees(0, 20, 20000000),
    orientation: {
      heading: 0,
      pitch: -Cesium.Math.PI_OVER_TWO,
      roll: 0
    },
    duration: 3
  });

  // Trackball effect and GMaps-like zoom are built into Cesium's ScreenSpaceCameraController
  // Left drag: rotate (trackball), Wheel: zoom (like GMaps), Right drag: pan
  const controller = viewer.scene.screenSpaceCameraController;
  controller.enableRotate = true;
  controller.enableZoom = true;
  controller.enableTilt = true;
  controller.enableLook = false; // For more Earth-like

  // Click empty space to ask (voice)
  const handler = new Cesium.ScreenSpaceEventHandler(viewer.scene.canvas);
  handler.setInputAction((movement) => {
    const picked = viewer.scene.pick(movement.position);
    if (!Cesium.defined(picked)) {
      startVoice();
    }
  }, Cesium.ScreenSpaceEventType.LEFT_CLICK);

  // Keyboard: Space for voice, / for text ask
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' && document.activeElement.tagName === 'BODY') {
      e.preventDefault();
      startVoice();
    }
    if (e.key === '/' && document.activeElement.tagName === 'BODY') {
      e.preventDefault();
      showTextAsk();
    }
  });
}

/* Dynamic orbs - created on user ask, no static */
function createOrb(type) {
  if (activeOrbs[type]) return;
  const orb = document.createElement('div');
  orb.className = 'astranov-orb';
  orb.id = 'orb-' + type;

  let glyph = '●';
  let label = type;
  let glow = '#7eebb4';

  if (type === 'login') {
    glyph = '👤';
    label = 'Login';
    glow = '#00f0ff';
  } else if (type === 'crawler') {
    glyph = '📰';
    label = 'Crawler';
    glow = '#22c55e';
  } else if (type === 'pilot') {
    glyph = '🚁';
    label = 'Pilot';
    glow = '#facc15';
  } else if (type === 'delivery') {
    glyph = '📦';
    label = 'Delivery';
    glow = '#f97316';
  }

  orb.style.setProperty('--glow-color', glow);
  orb.innerHTML = `<div class="glyph">${glyph}</div><div class="label">${label}</div>`;

  // Position dynamically, avoid overlap
  const existing = Object.keys(activeOrbs).length;
  orb.style.left = (20 + (existing % 3) * 25) + '%';
  orb.style.top = (20 + Math.floor(existing / 3) * 25) + '%';

  orb.onclick = () => executeOrbAction(type, orb);

  // Make draggable for user to arrange
  makeDraggable(orb);

  document.getElementById('orbs-container').appendChild(orb);
  activeOrbs[type] = orb;

  // Subtle animation
  orb.animate([ { transform: 'scale(0.5)', opacity: 0 }, { transform: 'scale(1)', opacity: 1 } ], { duration: 400 });
}

function makeDraggable(el) {
  let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
  el.onmousedown = dragMouseDown;
  function dragMouseDown(e) {
    e = e || window.event;
    e.preventDefault();
    pos3 = e.clientX;
    pos4 = e.clientY;
    document.onmouseup = closeDragElement;
    document.onmousemove = elementDrag;
  }
  function elementDrag(e) {
    e = e || window.event;
    e.preventDefault();
    pos1 = pos3 - e.clientX;
    pos2 = pos4 - e.clientY;
    pos3 = e.clientX;
    pos4 = e.clientY;
    el.style.top = (el.offsetTop - pos2) + "px";
    el.style.left = (el.offsetLeft - pos1) + "px";
  }
  function closeDragElement() {
    document.onmouseup = null;
    document.onmousemove = null;
  }
}

function executeOrbAction(type, orb) {
  if (type === 'login') {
    showLoginPanel();
  } else if (type === 'crawler') {
    doNewsCrawl();
  } else if (type === 'pilot') {
    launchDroneGame();
  } else if (type === 'delivery') {
    showMarketplace();
  }
  // Pulse effect
  orb.style.transform = 'scale(1.3)';
  setTimeout(() => orb.style.transform = 'scale(1)', 200);
}

/* Voice and text ask - the way to request orbs */
let recognition;
function startVoice() {
  if (!('webkitSpeechRecognition' in window)) {
    showTransientMessage('Voice not supported - press / for text');
    return;
  }
  if (!recognition) {
    recognition = new webkitSpeechRecognition();
    recognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      processUserRequest(transcript);
    };
  }
  recognition.start();
}

function showTextAsk() {
  const input = prompt('Ask Astranov (e.g. login, news, drone game, delivery):');
  if (input) processUserRequest(input);
}

function processUserRequest(text) {
  const lower = text.toLowerCase();
  let response = 'Understood. ';

  if (lower.includes('login') || lower.includes('sign in')) {
    createOrb('login');
    response += 'Creating login orb...';
  } else if (lower.includes('news') || lower.includes('crawler')) {
    createOrb('crawler');
    response += 'Activating news crawler orb...';
  } else if (lower.includes('pilot') || lower.includes('drone') || lower.includes('game')) {
    createOrb('pilot');
    response += 'Summoning pilot orb for the drone game...';
  } else if (lower.includes('delivery') || lower.includes('market')) {
    createOrb('delivery');
    response += 'Opening delivery marketplace orb...';
  } else if (lower.includes('reset') || lower.includes('global')) {
    hardReset();
    return;
  } else {
    response += 'Say login, news, drone game, or delivery to summon an orb.';
  }

  showTransientMessage(response);
  if ('speechSynthesis' in window) {
    const utterance = new SpeechSynthesisUtterance(response);
    speechSynthesis.speak(utterance);
  }
}

function showTransientMessage(text) {
  const msg = document.createElement('div');
  msg.className = 'transient-panel';
  msg.style.bottom = '20px';
  msg.style.left = '50%';
  msg.style.top = 'auto';
  msg.style.transform = 'translateX(-50%)';
  msg.innerHTML = text + ' <span class="close" onclick="this.parentNode.remove()">×</span>';
  document.body.appendChild(msg);
  setTimeout(() => { if (msg.parentNode) msg.parentNode.removeChild(msg); }, 5000);
}

/* Orb actions with globe effects */
function showLoginPanel() {
  const panel = document.createElement('div');
  panel.className = 'transient-panel';
  panel.innerHTML = `
    <h3>Login Orb</h3>
    <input type="text" id="login-input" placeholder="Username or email" style="width:100%;margin:8px 0;padding:6px;background:rgba(0,0,0,0.3);border:1px solid #fff3;border-radius:4px;color:#e6f1ff;">
    <button onclick="doLogin(this)" style="width:100%;">Login (Demo)</button>
    <div style="font-size:10px;margin-top:8px;opacity:0.6;">Creates user context for collective.</div>
    <span class="close" onclick="this.parentNode.remove()">×</span>
  `;
  document.body.appendChild(panel);
}

function doLogin(btn) {
  const input = btn.parentNode.querySelector('#login-input');
  currentUser = { id: input.value || 'demo-user', name: input.value || 'Demo User', balance: 42 };
  btn.parentNode.remove();
  showTransientMessage('Logged in as ' + currentUser.name + '. Balance: ' + currentUser.balance + ' AVC');
}

function doNewsCrawl() {
  for (let i = 0; i < 5; i++) {
    const lon = Math.random() * 360 - 180;
    const lat = Math.random() * 60 - 30;
    signals.push({ lon, lat, text: 'News from region ' + (i+1) });
    viewer.entities.add({
      position: Cesium.Cartesian3.fromDegrees(lon, lat, 5000),
      point: { pixelSize: 6, color: Cesium.Color.LIME },
      label: { text: 'NEWS', font: '10px sans-serif' }
    });
  }
  const list = signals.slice(-5).map(s => `<div onclick="viewer.camera.flyTo({destination: Cesium.Cartesian3.fromDegrees(${s.lon}, ${s.lat}, 2000000)})">${s.text}</div>`).join('');
  const panel = document.createElement('div');
  panel.className = 'transient-panel';
  panel.innerHTML = `<h3>News Crawler Orb</h3><div>${list || 'Crawling...'}</div><span class="close" onclick="this.parentNode.remove()">×</span>`;
  document.body.appendChild(panel);
}

function launchDroneGame() {
  clearDrones();
  for (let i = 0; i < 30; i++) {
    const lon = Math.random() * 360 - 180;
    const lat = Math.random() * 50 - 25;
    const d = viewer.entities.add({
      name: 'drone-' + i,
      position: Cesium.Cartesian3.fromDegrees(lon, lat, 150000),
      point: { pixelSize: 4, color: Cesium.Color.CYAN }
    });
    drones.push({ entity: d, baseLon: lon, baseLat: lat, phase: Math.random() * Math.PI * 2, speed: 0.5 + Math.random() });
  }
  startDroneAnim();
  const panel = document.createElement('div');
  panel.className = 'transient-panel';
  panel.innerHTML = `<h3>Pilot Orb - Drone Game</h3><div>Drones: <span id="drone-count">30</span> (click to engage)</div><span class="close" onclick="clearDrones(); this.parentNode.remove()">×</span>`;
  document.body.appendChild(panel);
}

function clearDrones() {
  drones.forEach(d => viewer.entities.remove(d.entity));
  drones = [];
  if (droneAnim) cancelAnimationFrame(droneAnim);
}

function startDroneAnim() {
  if (droneAnim) cancelAnimationFrame(droneAnim);
  function anim() {
    const t = Date.now() / 800;
    drones.forEach((d, i) => {
      if (!d.entity) return;
      const lon = d.baseLon + Math.sin(t * d.speed + d.phase) * 4;
      const lat = d.baseLat + Math.cos(t * d.speed * 0.7 + d.phase) * 2.5;
      d.entity.position = Cesium.Cartesian3.fromDegrees(lon, lat, 150000 + Math.sin(t) * 20000);
    });
    droneAnim = requestAnimationFrame(anim);
  }
  anim();
}

function showMarketplace() {
  const panel = document.createElement('div');
  panel.className = 'transient-panel';
  panel.innerHTML = `<h3>Delivery Marketplace Orb</h3>
    <button onclick="postDelivery(this)">Post Delivery</button>
    <div id="market-list" style="margin-top:8px;max-height:120px;overflow:auto;font-size:11px;"></div>
    <span class="close" onclick="this.parentNode.remove()">×</span>`;
  document.body.appendChild(panel);
  renderMarketList(panel.querySelector('#market-list'));
}

function postDelivery(btn) {
  const pickup = prompt('Pickup?') || 'A';
  const dropoff = prompt('Dropoff?') || 'B';
  const reward = parseFloat(prompt('Reward?') || '10');
  deliveries.push({ id: Date.now(), pickup, dropoff, reward, status: 'requested' });
  const lon = Math.random() * 360 - 180;
  const lat = Math.random() * 40 - 20;
  viewer.entities.add({
    position: Cesium.Cartesian3.fromDegrees(lon, lat),
    point: { pixelSize: 5, color: Cesium.Color.ORANGE },
    label: { text: pickup + '→' + dropoff, font: '8px sans-serif' }
  });
  renderMarketList(btn.parentNode.querySelector('#market-list'));
}

function renderMarketList(container) {
  container.innerHTML = deliveries.map(d => `<div>${d.pickup} → ${d.dropoff} (${d.reward}AVC) <button onclick="claimDelivery(${d.id}, this)">Claim</button></div>`).join('');
}

function claimDelivery(id, btn) {
  const d = deliveries.find(x => x.id === id);
  if (d) d.status = 'delivered';
  if (currentUser) currentUser.balance = (currentUser.balance || 42) + d.reward;
  btn.parentNode.remove();
  showTransientMessage('Delivered! + ' + d.reward + ' AVC');
}

}
