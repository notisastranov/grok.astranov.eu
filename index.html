<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRANOV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Exo+2:wght@600;700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Inter', system_ui, sans-serif;
            background: #000;
            color: #e0f0ff;
            overflow: hidden;
            height: 100vh;
            position: relative;
        }
        
        /* Deep space background matching reference */
        #space-bg {
            position: absolute;
            inset: 0;
            background: 
                radial-gradient(circle at 50% 30%, #0a1a3a 0%, transparent 60%),
                radial-gradient(circle at 50% 80%, #001133 0%, #000 70%),
                #000;
            z-index: 1;
        }
        
        #nebula {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 45%;
            background: 
                radial-gradient(ellipse at center bottom, rgba(0,100,255,0.15) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }
        
        /* Logo - Exact style from reference (glowing blue text, no pill) */
        #logo {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            font-family: 'Exo 2', 'Inter', sans-serif;
            font-size: 4.2rem;
            font-weight: 700;
            letter-spacing: 8px;
            color: #00d4ff;
            text-shadow: 
                0 0 20px #00d4ff,
                0 0 40px #0088ff,
                0 0 80px #0066cc;
            cursor: pointer;
            user-select: none;
            white-space: nowrap;
        }
        
        #logo:hover {
            text-shadow: 
                0 0 30px #00d4ff,
                0 0 60px #0088ff,
                0 0 100px #0066cc;
        }
        
        /* Status */
        #status {
            position: absolute;
            top: 28%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(0,20,50,0.4);
            padding: 4px 16px;
            border-radius: 9999px;
            font-size: 0.8rem;
            border: 1px solid rgba(0,212,255,0.25);
            color: #00d4ff;
            letter-spacing: 1px;
        }
        
        /* Globe */
        #globe-container {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }
        
        #globe-canvas {
            width: 520px;
            height: 520px;
            border-radius: 50%;
            cursor: grab;
        }
        
        #globe-canvas:active {
            cursor: grabbing;
        }
        
        /* Pilot orb */
        #pilot-orb {
            position: absolute;
            bottom: 60px;
            right: 50px;
            width: 72px;
            height: 72px;
            background: radial-gradient(circle at 30% 30%, #fff, #00d4ff, #006688);
            border-radius: 50%;
            box-shadow: 0 0 50px #00d4ff, inset 0 0 25px #fff;
            border: 2px solid rgba(0,212,255,0.5);
            cursor: pointer;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #000;
            letter-spacing: 1px;
        }
        
        #pilot-orb:hover {
            transform: scale(1.08);
            box-shadow: 0 0 80px #00d4ff;
        }
    </style>
</head>
<body>
    <div id="space-bg"></div>
    <div id="nebula"></div>
    
    <!-- Logo: Exact glowing blue style from reference -->
    <div id="logo" onclick="hardReset()">ASTRANOV</div>
    
    <!-- Status -->
    <div id="status">1 ALIVE • OUR MIND</div>
    
    <!-- Globe -->
    <div id="globe-container">
        <canvas id="globe-canvas" width="520" height="520"></canvas>
    </div>
    
    <!-- Pilot orb -->
    <div id="pilot-orb" onclick="activatePilot()">PILOT</div>
    
    <script>
        function hardReset() {
            if (confirm('Hard reset to global view?')) {
                localStorage.clear();
                sessionStorage.clear();
                location.reload();
            }
        }
        
        // Three.js Globe
        let scene, camera, renderer, globe, isDragging = false, previousMouseX = 0;
        
        function initGlobe() {
            const canvas = document.getElementById('globe-canvas');
            renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(520, 520);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
            camera.position.z = 2.6;
            
            const geometry = new THREE.SphereGeometry(1.5, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0x2255aa,
                emissive: 0x0a2244,
                shininess: 10
            });
            globe = new THREE.Mesh(geometry, material);
            scene.add(globe);
            
            // Atmosphere
            const atmGeo = new THREE.SphereGeometry(1.58, 64, 64);
            const atmMat = new THREE.MeshPhongMaterial({
                color: 0x00d4ff,
                transparent: true,
                opacity: 0.12,
                side: THREE.BackSide
            });
            scene.add(new THREE.Mesh(atmGeo, atmMat));
            
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 3, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x334466, 0.5));
            
            globe.userData.rotationSpeed = 0.0007;
            
            // Drag controls
            canvas.addEventListener('mousedown', e => { isDragging = true; previousMouseX = e.clientX; });
            window.addEventListener('mouseup', () => isDragging = false);
            window.addEventListener('mousemove', e => {
                if (!isDragging) return;
                globe.rotation.y += (e.clientX - previousMouseX) * 0.005;
                previousMouseX = e.clientX;
            });
            
            animate();
        }
        
        function animate() {
            requestAnimationFrame(animate);
            if (globe && !isDragging) globe.rotation.y += globe.userData.rotationSpeed;
            renderer.render(scene, camera);
        }
        
        function activatePilot() {
            const orb = document.getElementById('pilot-orb');
            orb.style.boxShadow = '0 0 100px #00d4ff, 0 0 40px #ffd700';
            setTimeout(() => {
                orb.style.boxShadow = '0 0 50px #00d4ff, inset 0 0 25px #fff';
                alert('Pilot engaged. (Full system next)');
            }, 500);
        }
        
        window.onload = () => {
            initGlobe();
        };
    </script>
</body>
</html>
