<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Astranov — Collective Intelligence</title>
<script src="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/Cesium.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cesium@1.123.1/Build/Cesium/Widgets/widgets.css">
<style>
  body { margin:0; overflow:hidden; background:#020713; color:#e0f4ff; font-family: system-ui, sans-serif; }
  #cesium { position:absolute; inset:0; }
  #brand { position:absolute; top:20px; left:50%; transform:translateX(-50%); font-size:22px; letter-spacing:4px; color:#fff; text-shadow:0 0 20px rgba(100,200,255,.6); cursor:pointer; user-select:none; }
</style>
</head>
<body>
<div id="cesium"></div>
<div id="brand">ASTRANOV</div>

<script>
// Spartan Organic Core - v1
// Clean. Light. Alive.

const viewer = new Cesium.Viewer('cesium', {
  animation: false,
  timeline: false,
  geocoder: false,
  homeButton: false,
  sceneModePicker: false,
  baseLayerPicker: false,
  navigationHelpButton: false,
  fullscreenButton: false,
  infoBox: false,
  selectionIndicator: false
});

viewer.scene.globe.enableLighting = false;
viewer.scene.skyAtmosphere.show = true;

// Natural slow rotation
viewer.clock.shouldAnimate = true;
viewer.clock.multiplier = 0.0008;

// Initial view - clean Earth
viewer.camera.setView({
  destination: Cesium.Cartesian3.fromDegrees(20, 25, 22000000),
  orientation: { heading: 0, pitch: -1.57, roll: 0 }
});

// Brand click = gentle voice wake
const brand = document.getElementById('brand');
brand.onclick = () => {
  alert('Eve: I am listening. What do you need?');
};

console.log('%c[Spartan] Organic core initialized', 'color:#4fc3f7');
</script>
</body>
</html>
