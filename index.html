<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"/>
<title>Agent Orb • ASTRANOV</title>
<style>
  :root {
    --bg: #000000;
    --ink: #e6f1ff;
    --dim: #6a8aaf;
    --accent: #7eb4ff;
    --orb: #7eebb4;
    --warn: #ff9e7a;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; width:100%; overflow:hidden; background:var(--bg); color:var(--ink);
               font-family: -apple-system, BlinkMacSystemFont, "Inter", "SF Pro Display", system-ui, sans-serif;
               -webkit-tap-highlight-color: transparent; }
  body { display: flex; flex-direction: column; }

  /* Header */
  .hdr {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px; padding-top: max(14px, env(safe-area-inset-top));
    background: linear-gradient(to bottom, rgba(0,0,0,0.85), transparent);
    font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
  }
  .hdr-left { display: flex; align-items: center; gap: 10px; }
  .hdr .logo { font-weight: 600; letter-spacing: 0.35em; }
  .hdr .status { color: var(--dim); font-size: 10px; }
  .hdr .status .live { color: #7eebb4; }
  .balance {
    background: rgba(10,20,40,0.6); border: 1px solid rgba(120,180,255,0.25);
    padding: 4px 12px; border-radius: 999px; font-size: 11px; font-variant-numeric: tabular-nums;
    display: flex; align-items: center; gap: 6px;
  }
  .balance .label { color: var(--dim); font-size: 9px; letter-spacing: 0.1em; }

  /* Main stage */
  .stage {
    flex: 1; display: flex; flex-direction: column; position: relative;
    padding-top: 70px; padding-bottom: 90px;
  }

  /* Dual feed layout — mirrors the live grok.astranov.eu feel */
  .feeds {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    padding: 12px; min-height: 0;
  }
  @media (max-width: 720px) {
    .feeds { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
  }

  .feed {
    position: relative; border-radius: 18px; overflow: hidden;
    background: #05070f; border: 1px solid rgba(120,180,255,0.15);
    display: flex; align-items: center; justify-content: center;
  }
  .feed-label {
    position: absolute; top: 12px; left: 12px; font-size: 9px; letter-spacing: 0.2em;
    color: rgba(120,180,255,0.6); background: rgba(0,0,0,0.4); padding: 2px 8px; border-radius: 999px;
    z-index: 2;
  }
  .feed video, .feed canvas {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }

  /* The Agent Orb — central living presence */
  .orb-wrap {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 168px; height: 168px; z-index: 10;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
  }
  .orb {
    position: relative; width: 148px; height: 148px; border-radius: 50%;
    background: radial-gradient(circle at 38% 32%, #ffffff 0%, #7eebb4 18%, #0a2a22 48%, #000000 78%);
    box-shadow: 0 0 80px rgba(126,235,180,0.55), inset 0 0 60px rgba(255,255,255,0.25), inset 40px 40px 60px rgba(0,0,0,0.6);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    border: 1px solid rgba(126,235,180,0.6);
  }
  .orb::before {
    content: ''; position: absolute; inset: -18px; border-radius: 50%;
    border: 1px solid rgba(126,235,180,0.25);
    animation: orb-halo 4.2s ease-in-out infinite;
  }
  .orb.listening {
    box-shadow: 0 0 90px rgba(255, 120, 120, 0.65), inset 0 0 50px rgba(255,200,180,0.3);
    animation: orb-listen 1.1s ease-in-out infinite;
  }
  .orb.thinking {
    box-shadow: 0 0 110px rgba(126,180,255,0.75), inset 0 0 70px rgba(180,210,255,0.25);
    animation: orb-think 0.9s ease-in-out infinite;
  }
  .orb.speaking {
    box-shadow: 0 0 120px rgba(126,235,180,0.85), inset 0 0 80px rgba(180,255,220,0.3);
    animation: orb-speak 0.65s ease-in-out infinite;
  }
  .orb-core {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%);
    width: 42px; height: 42px; border-radius: 50%;
    background: radial-gradient(circle, #fff 0%, #7eebb4 40%, rgba(126,235,180,0) 72%);
    box-shadow: 0 0 32px #7eebb4;
  }

  .orb-rings {
    position: absolute; inset: -8px; border-radius: 50%;
    pointer-events: none;
  }
  .ring {
    position: absolute; inset: 0; border-radius: 50%;
    border: 1px solid rgba(126,235,180,0.35);
    animation: ring-spin 12s linear infinite;
  }
  .ring.r2 { inset: 12px; animation-duration: 8.4s; border-color: rgba(126,235,180,0.22); }
  .ring.r3 { inset: 26px; animation-duration: 19s; border-color: rgba(126,235,180,0.15); }

  @keyframes orb-halo {
    0%,100% { transform: scale(1); opacity: 0.35; }
    50% { transform: scale(1.08); opacity: 0.7; }
  }
  @keyframes orb-listen {
    0%,100% { transform: scale(1); } 50% { transform: scale(1.03); }
  }
  @keyframes orb-think {
    0%,100% { transform: scale(1); } 50% { transform: scale(1.015); }
  }
  @keyframes orb-speak {
    0%,100% { transform: scale(1); } 50% { transform: scale(1.025); }
  }
  @keyframes ring-spin {
    to { transform: rotate(360deg); }
  }

  /* Orb feed (the "Agent" visual presence) */
  .orb-feed {
    background: radial-gradient(circle at 50% 45%, #0b1628 0%, #010307 70%);
    position: relative;
  }
  .orb-feed .presence {
    position: absolute; inset: 0;
    background: radial-gradient(circle at 48% 42%, rgba(126,235,180,0.15) 0%, transparent 55%);
    animation: presence-breathe 3.8s ease-in-out infinite;
  }
  .orb-feed canvas { filter: contrast(1.15) saturate(1.1); }

  /* Subtitles / live text */
  .subtitles {
    position: absolute; left: 12px; right: 12px; bottom: 12px;
    font-size: 13px; line-height: 1.35; color: #c8e0ff;
    background: rgba(0,0,0,0.55); padding: 8px 12px; border-radius: 10px;
    min-height: 28px; pointer-events: none; text-align: center;
    backdrop-filter: blur(12px);
  }

  /* Controls */
  .controls {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 120;
    display: flex; gap: 8px; justify-content: center; align-items: center;
    padding: 16px 16px calc(16px + env(safe-area-inset-bottom));
    background: linear-gradient(to top, rgba(0,0,0,0.92), transparent);
  }
  .ctrl {
    width: 54px; height: 54px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; cursor: pointer; user-select: none;
    background: rgba(12,18,32,0.85); border: 1px solid rgba(120,180,255,0.3);
    color: var(--ink); transition: transform .12s, background .12s, border-color .12s;
  }
  .ctrl:active { transform: scale(0.92); }
  .ctrl.primary {
    width: 68px; height: 68px; font-size: 26px;
    background: rgba(126,235,180,0.12); border-color: rgba(126,235,180,0.6);
    color: #7eebb4; box-shadow: 0 0 0 1px rgba(126,235,180,0.2);
  }
  .ctrl.danger { border-color: rgba(255,120,120,0.5); color: #ff9e9e; }
  .ctrl.on { background: rgba(255,120,120,0.18); border-color: rgba(255,120,120,0.6); color: #ff9e9e; }

  .label {
    position: absolute; bottom: -18px; font-size: 8px; letter-spacing: 0.2em;
    color: var(--dim); white-space: nowrap; left: 50%; transform: translateX(-50%);
  }

  /* Login / empty state */
  .auth {
    position: fixed; inset: 0; z-index: 200; display: none;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.92);
    flex-direction: column; gap: 18px; text-align: center; padding: 20px;
  }
  .auth.visible { display: flex; }
  .auth .greet { font-size: 13px; color: var(--dim); letter-spacing: 0.3em; }
  .auth input {
    width: 100%; max-width: 280px; padding: 14px 18px; background: rgba(10,18,32,0.8);
    border: 1px solid rgba(120,180,255,0.25); border-radius: 999px; color: var(--ink);
    font-size: 15px; outline: none;
  }
  .auth .btn {
    padding: 12px 32px; border-radius: 999px; border: 1px solid rgba(126,235,180,0.5);
    background: rgba(126,235,180,0.08); color: #7eebb4; font-size: 12px; letter-spacing: 0.2em;
    cursor: pointer;
  }

  /* Toast */
  #toast {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    background: rgba(10,18,32,0.92); border: 1px solid rgba(120,180,255,0.3);
    padding: 8px 18px; border-radius: 999px; font-size: 12px; color: var(--ink);
    z-index: 300; opacity: 0; pointer-events: none; white-space: nowrap;
    transition: opacity .2s, transform .2s;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .context {
    position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--dim); letter-spacing: 0.15em; z-index: 50;
    background: rgba(5,10,20,0.6); padding: 2px 10px; border-radius: 999px;
  }
</style>

<script>
// === CONFIG (same Supabase project as main Astranov) ===
const SUPABASE_URL = 'https://lkoatrkhuigdolnjsbie.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imxrb2F0cmtodWlnZG9sbmpzYmllIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODIwOTIsImV4cCI6MjA5NDQ1ODA5Mn0.qf6Kg93YLJ0coTdVQa4baU0ppOdFY5WkmVzMvEV6ejI';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let session = null;
let profile = null;
let isListening = false;
let recognition = null;
let currentStream = null;
let history = []; // short call context
let speaking = false;

// === UI helpers ===
const $ = id => document.getElementById(id);
function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = type ? 'show ' + type : 'show';
  setTimeout(() => t.classList.remove('show'), 2200);
}

function setOrbState(state) {
  const orb = $('orb');
  orb.classList.remove('listening', 'thinking', 'speaking');
  if (state) orb.classList.add(state);
}

function setSubtitles(text) {
  $('subtitles').textContent = text || '';
}

// === Camera ===
async function startCamera() {
  try {
    currentStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
    const v = $('user-video');
    v.srcObject = currentStream;
  } catch (e) {
    // graceful simulated camera
    const feed = $('user-feed');
    feed.innerHTML = `<div class="feed-label">YOU</div>
      <div style="width:100%;height:100%;background:linear-gradient(145deg,#112,#0a0f1a);display:flex;align-items:center;justify-content:center;font-size:11px;color:#445;letter-spacing:0.1em">SIMULATED CAMERA — ALLOW PERMISSIONS FOR REAL</div>`;
    toast('Camera permission needed for real feed', 'err');
  }
}

function toggleCam() {
  const v = $('user-video');
  if (!currentStream) { startCamera(); return; }
  const track = currentStream.getVideoTracks()[0];
  if (track) {
    track.enabled = !track.enabled;
    $('btn-cam').classList.toggle('on', !track.enabled);
  }
}

// === Orb Feed — living visual presence (canvas) ===
let feedCtx, feedW, feedH, t0 = Date.now();

function initOrbFeed() {
  const c = $('orb-canvas');
  feedCtx = c.getContext('2d', { alpha: true });
  feedW = c.width; feedH = c.height;
  requestAnimationFrame(drawFeed);
}

function drawFeed() {
  const ctx = feedCtx;
  const now = (Date.now() - t0) / 1000;
  ctx.clearRect(0, 0, feedW, feedH);

  const cx = feedW / 2, cy = feedH / 2 - 10;

  // Deep space background field
  ctx.fillStyle = 'rgba(2,6,14,0.7)';
  ctx.fillRect(0, 0, feedW, feedH);

  // Subtle grid / energy lattice
  ctx.strokeStyle = 'rgba(126,235,180,0.06)';
  ctx.lineWidth = 1;
  for (let i = -4; i <= 4; i++) {
    ctx.beginPath();
    ctx.moveTo(cx + i * 38, 40);
    ctx.lineTo(cx + i * 38, feedH - 60);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(40, cy + i * 38);
    ctx.lineTo(feedW - 40, cy + i * 38);
    ctx.stroke();
  }

  const orbState = $('orb').classList.contains('speaking') ? 'speaking' :
                   $('orb').classList.contains('thinking') ? 'thinking' :
                   $('orb').classList.contains('listening') ? 'listening' : 'idle';

  const pulse = Math.sin(now * (orbState === 'speaking' ? 3.8 : orbState === 'thinking' ? 2.1 : 1.1)) * 0.5 + 0.5;
  const baseR = 68;

  // Outer energy halo
  ctx.strokeStyle = orbState === 'speaking' ? 'rgba(126,235,180,0.45)' : 'rgba(126,235,180,0.22)';
  ctx.lineWidth = orbState === 'speaking' ? 3.5 : 1.5;
  ctx.beginPath();
  ctx.arc(cx, cy, baseR + 22 + Math.sin(now * 1.6) * 6, 0, Math.PI * 2);
  ctx.stroke();

  // Core presence (the "being")
  const coreR = baseR + (orbState === 'speaking' ? pulse * 7 : orbState === 'thinking' ? pulse * 3 : 0);
  const grad = ctx.createRadialGradient(cx - 18, cy - 22, 12, cx, cy, coreR + 18);
  grad.addColorStop(0, orbState === 'speaking' ? '#c8ffe0' : '#a6f0d0');
  grad.addColorStop(0.3, '#7eebb4');
  grad.addColorStop(0.72, '#0e3a2e');
  grad.addColorStop(1, 'rgba(0,0,0,0)');

  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, coreR, 0, Math.PI * 2);
  ctx.fill();

  // Inner rings (react to state)
  ctx.strokeStyle = orbState === 'speaking' ? 'rgba(200,255,224,0.9)' : 'rgba(126,235,180,0.65)';
  ctx.lineWidth = 1.5;
  for (let k = 0; k < 3; k++) {
    const r = 18 + k * 14 + Math.sin(now * (1.7 + k * 0.3)) * (orbState === 'speaking' ? 4 : 1.5);
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Orbiting particles (life)
  const n = orbState === 'speaking' ? 7 : orbState === 'thinking' ? 5 : 3;
  ctx.fillStyle = orbState === 'speaking' ? '#c8ffe0' : '#7eebb4';
  for (let i = 0; i < n; i++) {
    const a = now * (0.6 + i * 0.07) + i;
    const rad = 52 + Math.sin(now + i) * (orbState === 'speaking' ? 9 : 4);
    const px = cx + Math.cos(a) * rad;
    const py = cy + Math.sin(a * 0.8) * (rad * 0.6);
    ctx.beginPath();
    ctx.arc(px, py, orbState === 'speaking' ? 2.2 : 1.6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Subtle vertical "scan" line when active
  if (orbState !== 'idle') {
    ctx.strokeStyle = 'rgba(126,235,180,0.12)';
    ctx.lineWidth = 2;
    const scanY = ((now * 140) % (feedH * 0.8)) + 50;
    ctx.beginPath();
    ctx.moveTo(60, scanY);
    ctx.lineTo(feedW - 60, scanY);
    ctx.stroke();
  }

  requestAnimationFrame(drawFeed);
}

// === Voice (recognition + synthesis) ===
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    toast('Voice input not supported in this browser — use text or type');
    return null;
  }
  const rec = new SR();
  rec.continuous = false;
  rec.interimResults = false;
  rec.lang = navigator.language || 'en-US';

  rec.onresult = (ev) => {
    const text = ev.results[0][0].transcript.trim();
    if (text) sendToOrb(text);
  };
  rec.onerror = () => { isListening = false; setOrbState(null); };
  rec.onend = () => { isListening = false; setOrbState(null); };
  return rec;
}

function toggleListen() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) return;

  const orb = $('orb');
  if (isListening) {
    recognition.stop();
    isListening = false;
    setOrbState(null);
    $('btn-speak').classList.remove('on');
  } else {
    try {
      recognition.start();
      isListening = true;
      setOrbState('listening');
      $('btn-speak').classList.add('on');
    } catch (e) {}
  }
}

function speak(text) {
  if (!text) return;
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.96;
  u.pitch = 1.02;
  u.volume = 0.92;

  u.onstart = () => { speaking = true; setOrbState('speaking'); setSubtitles(text); };
  u.onend = () => { speaking = false; setOrbState(null); setSubtitles(''); };

  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(u);
}

// === Core: talk to the real Agent Orb (aicycle) ===
async function sendToOrb(prompt) {
  if (!prompt) return;

  setOrbState('thinking');
  setSubtitles('...');

  const body = {
    prompt,
    history: history.slice(-6),
  };

  // Attach auth if we have a token (gives personal memory + owner path)
  const headers = { 'Content-Type': 'application/json' };
  if (session?.access_token) {
    headers['Authorization'] = `Bearer ${session.access_token}`;
  }

  try {
    const res = await fetch(`${SUPABASE_URL}/functions/v1/aicycle`, {
      method: 'POST',
      headers,
      body: JSON.stringify(body)
    });

    const data = await res.json();
    const reply = (data.response || data.text || '').trim();

    if (!reply) throw new Error('empty');

    // Update local call history
    history.push({ role: 'user', content: prompt });
    history.push({ role: 'assistant', content: reply });

    setSubtitles(reply);
    speak(reply);

    // brief visual confirmation
    setTimeout(() => { if (!speaking) setOrbState(null); }, 650);
  } catch (e) {
    const fallback = "I am here. The connection is quiet for a moment — speak again or type.";
    setSubtitles(fallback);
    speak(fallback);
    setOrbState(null);
  }
}

// Hold-to-speak on the central Orb
function bindOrbTouch() {
  const zone = $('orb-touch');
  let holdTimer = null;

  const start = (e) => {
    e.preventDefault();
    if (speaking) { window.speechSynthesis.cancel(); speaking = false; setOrbState(null); return; }
    holdTimer = setTimeout(() => {
      toggleListen();
    }, 180);
  };
  const end = () => {
    if (holdTimer) { clearTimeout(holdTimer); holdTimer = null; }
    if (isListening) {
      // user released — stop listening and let onresult fire
      setTimeout(() => {
        if (recognition && isListening) recognition.stop();
      }, 120);
    }
  };

  zone.addEventListener('pointerdown', start, { passive: false });
  zone.addEventListener('pointerup', end);
  zone.addEventListener('pointerleave', end);
  zone.addEventListener('pointercancel', end);

  // Also allow single tap to open a quick text prompt (Spartan)
  zone.addEventListener('click', () => {
    if (isListening || speaking) return;
    const txt = prompt('Speak to Agent Orb');
    if (txt) sendToOrb(txt);
  });
}

// === Auth + balance ===
async function loadSession() {
  const { data } = await sb.auth.getSession();
  session = data?.session || null;

  if (session) {
    $('auth').classList.remove('visible');
    // load profile for name + is_owner
    try {
      const { data: prof } = await sb.from('profiles').select('display_name,is_owner').eq('id', session.user.id).single();
      profile = prof;
    } catch (_) {}

    // Try to surface a real balance (fallback to the live number)
    try {
      const { data: balRow } = await sb.from('profiles').select('balance').eq('id', session.user.id).single();
      if (balRow?.balance != null) {
        $('bal').textContent = Number(balRow.balance).toFixed(2);
      }
    } catch (_) {
      // keep the 42.00 from the live view as poetic default
    }

    // Subscribe to personal inbox for future agent calls / push
    subscribeInboxIfPossible();
  } else {
    $('auth').classList.add('visible');
  }
}

async function signIn() {
  const email = $('email').value.trim();
  if (!email) return toast('Enter your email');
  const { error } = await sb.auth.signInWithOtp({ email, options: { emailRedirectTo: location.href } });
  if (error) toast(error.message, 'err');
  else toast('Magic link sent — check your email');
}

function demoMode() {
  $('auth').classList.remove('visible');
  toast('Demo mode — full memory & owner path unavailable');
  // Still allow talking to the collective (public path)
}

async function subscribeInboxIfPossible() {
  if (!session) return;
  // We can listen for future "Agent Orb" direct invites here if we extend the system
  // For now this is ready infrastructure (matches the full app's user:<uid> channel)
}

function showBalance() {
  const b = $('bal').textContent;
  toast(`Astran balance: ${b} — economy is gain-to-gain`);
}

// === Controls wiring ===
function wireControls() {
  $('btn-speak').addEventListener('click', () => {
    if (speaking) { window.speechSynthesis.cancel(); speaking = false; setOrbState(null); return; }
    toggleListen();
  });

  $('btn-mute').addEventListener('click', () => {
    // For the Orb feed side (AI voice). We just cancel speech for now.
    window.speechSynthesis.cancel();
    speaking = false;
    setOrbState(null);
    setSubtitles('');
    toast('AI voice muted for this exchange');
  });

  $('btn-cam').addEventListener('click', toggleCam);

  $('btn-switch').addEventListener('click', () => {
    const ctx = $('context');
    const modes = [
      'Context awakened by selected world object',
      'Global — listening across the living globe',
      'Personal — your memories and signals only',
      'Council mode — consulting the Thirteen'
    ];
    const i = (modes.indexOf(ctx.textContent) + 1) % modes.length;
    ctx.textContent = modes[i];
    toast('Agent context shifted');
  });

  $('btn-end').addEventListener('click', () => {
    if (currentStream) {
      currentStream.getTracks().forEach(t => t.stop());
      currentStream = null;
    }
    window.speechSynthesis.cancel();
    history = [];
    setSubtitles('');
    setOrbState(null);
    toast('Call ended. The Orb remains.');
    // For a real call we would also clean WebRTC here
  });

  // Keyboard: space = hold to speak
  document.addEventListener('keydown', e => {
    if (e.code === 'Space' && document.activeElement.tagName === 'BODY') {
      e.preventDefault();
      if (!isListening) toggleListen();
    }
    if (e.key.toLowerCase() === '/' && document.activeElement.tagName === 'BODY') {
      e.preventDefault();
      const txt = prompt('Message Agent Orb');
      if (txt) sendToOrb(txt);
    }
  });
  document.addEventListener('keyup', e => {
    if (e.code === 'Space' && isListening) {
      if (recognition) recognition.stop();
    }
  });
}

// === Boot ===
async function boot() {
  initOrbFeed();
  bindOrbTouch();
  wireControls();
  await startCamera();

  // Try real session
  await loadSession();

  // Welcome line in the orb feed
  setTimeout(() => {
    if (!$('subtitles').textContent) {
      setSubtitles('Agent Orb connected. Hold the center orb or tap to speak.');
    }
  }, 1400);

  // Subtle breathing hint
  setTimeout(() => {
    const orb = $('orb');
    if (!orb.classList.contains('listening') && !orb.classList.contains('thinking') && !orb.classList.contains('speaking')) {
      orb.style.transition = 'box-shadow 1.6s ease';
      orb.style.boxShadow = '0 0 70px rgba(126,235,180,0.45), inset 0 0 50px rgba(255,255,255,0.15)';
      setTimeout(() => { orb.style.boxShadow = ''; orb.style.transition = ''; }, 1600);
    }
  }, 2400);

  // Expose a tiny API for future embedding / Grok control
  window.AgentOrb = {
    speak: (t) => sendToOrb(t),
    setContext: (c) => { $('context').textContent = c; },
    end: () => $('btn-end').click()
  };

  console.log('%c[Agent Orb] grok.astranov.eu ready — real aicycle + memory wired', 'color:#445');
}

boot();
</script>
